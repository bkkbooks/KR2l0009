body:
  text: 翰林記卷二十明黃佐撰館閣題詠太宗朝內閣七人者在館閣相與倡和有直閣即事諸詩侍講胡儼嘗有句云清曉朝回祕閣中坐看宫樹露華濃緑窗朱戶圖書滿人在蓬萊第一峯楊溥直𢎞文閣詩曰千載絲綸屬翰林西清瑣闥晝沈沈地嚴徒有交游念恩篤難忘犬馬心玉漏聲髙三殿近彤庭日轉八磚隂幾回欲寫封章進只恐迂踈論未深時長史金實召入西掖纂述以偹顧問和溥韻曰自昔聲華藹禁林幾年出處嘆浮沈漢文未許馮唐老鮑叔應知管仲心賜食每當瓊署曉退朝長傍落花隂眼中親舊無多在白髮相看意轉深餘各見所著集今不能廣採也公署題詠公署題詠多不可考惟正統中公署落成時本院諸同官有志喜詩歌學士楊溥詩曰都邑羣工和㑹日朝家三殿慶成時經營翰苑勞宸慮珍重斯文職論思畫棟雲飛翔鳯閣玉河冰出濯龍池精勤喜有賢中貴冰雪情懷檜柏姿國史硯宋濓修國史時遂以官名其硯勒銘于隂曰誕敷帝制宣人文赤光如虹燭乾坤後千百年𫝊愈新劉井劉井學士劉定之所浚在公署後堂之左柯亭柯亭學士柯潛捐俸所建在公署後堂之右前後二間凡八楹院中竹學士黃淮有憶院中竹寄楊士竒學士詩曰一别詞垣數月餘娟娟修竹近何如夢回還想林間醉詩就誰從節下書翠色凝烟春院寂清隂籠月夜窗虛料得同袍能愛護平安莫遣信音踈今公署無竹蓋南京舊院也學士柏公署後堂有二柏亦柯潛所種潛教庶吉士時李東陽承詔受業及東陽復教庶吉士出學士柏為題汪俊有一日百匝行樹底之句悵然感之因衍為一篇曰我行樹隂日千匝雨葉風枝自蕭颯惟有諸生識我情旁人不解空嘲狎我見先生種樹年我身尚短樹及肩枝蟠江山地可縮手斡造化天無權瓊臺翠閣何森爽院栁庭花敢爭長芘䕃長留六月隂盤回直與孤雲上材堪五鳯難為用根到九泉終不枉零落青袍幾故人琤琮玉佩空遺響當時院長文安公柯亭劉井相西東百年遺愛豈獨此此樹欲比人中龍柏猶如此我何似已愧斑白非兒童名收榱桷有先後夀比金石無終窮下堂再拜想顔色仰面正拂長髯風於是倡和成卷以遺潛之子使藏焉蓋潛能汲引後進令人不忘如此賞花倡和景泰中內閣賞芍藥賦黃字韻詩本院官皆和之有玉堂賞花集盛行於時成化末少傅徐溥在內閣賞芍藥賦吟扉二韻次年又有詩二韻本院官亦皆和之正德中大學士梁儲楊一清賞芍藥倡和則用東冬清青為韻人各四首云按宣德八年十一月本院諸寮有文淵閣賞雪詩蓋詞林紀事多有題詠不特賞花而已節㑹倡和永樂七年中秋之夕學士胡廣合同院之士㑹于北京城南公宇之後酒酣分韻賦詩成卷學士王景為之序此節㑹倡和之始也天順甲申庶吉士同館者修撰羅璟輩為同年宴㑹定春㑹元宵上已夏㑹端午秋㑹中秋重陽冬㑹長至叙㑹以齒每㑹必賦詩成卷上㑹者序之以藏于家非不得已而不赴㑹與詩不成者俱有罰有宴集文㑹録行于時聚奎堂宴集大學士楊榮家于長安東門之內宣德三年三月學士楊溥掌院事率寮友迎首甲馬愈等三人宴其中楊士竒因名其堂曰聚奎為文以識之衆皆賦詩自是遂為例不知何時此禮遂廢然館閣相與宴集猶謂之聚奎宴蓋自此始也杏園雅集正統二年三月館閣諸人過楊榮所居杏園燕集賦詩成卷楊士竒序之且繪為圖題曰杏林雅集預者三楊二王錢習禮李時勉周述陳循與錦衣千户謝庭循也榮復題其後人藏一本亦洛社之餘韻云瀛洲雅㑹𢎞治中南京吏部尚書倪嶽吏部侍郎楊守址戶部侍郎鄭紀禮部侍郎董越祭酒劉震學士馬廷用皆發身翰林者相與醵飲倡為瀛洲雅㑹㑹必序齒正德二年七月吏部尚書王華侍郎黃珣禮部尚書劉忠侍郎馬廷用户部尚書楊廷和祭酒王敕司業羅欽順學士石珤太常少卿羅玘復繼之皆倡和成卷以梓行于時翰林記卷二十
