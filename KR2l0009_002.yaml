body:
  text: 翰林記卷二明黃佐撰殿閣大學士洪武十五年十二月戊午倣宋制置殿閣學士以禮部尚書邵質為華蓋殿大學士翰林院學士宋訥為文淵閣大學士檢討吳伯宗為武英殿大學士典籍吳沈為東閣大學士文華殿亦設大學士是月辛酉以命耆儒鮑恂余詮張長年皆辭不拜遂以全思誠為之永樂二十二年九月丁酉仁宗昭皇帝增設謹身殿大學士命太子少傅楊榮兼之其序次華蓋殿謹身殿文華殿武英殿文淵閣東閣凡六大學士至今因之而文華殿則不常設內閣親擢洪武之末翰林不及十數人壬午六月太宗即位首詔吏部及本院舉文學行誼才識之士授職始聞待詔解縉名稍親近之召對喜其豪傑敢言益見信用七月侍書黃淮改中書舍人入見上與語大奇之凡侍朝特命與縉立於御榻之左以備顧問上以萬幾叢脞日御奉天門左室每夕召語至夜分上或就寢賜坐榻前論議幾密同列不得與聞是時吳府審理副楊士奇在翰林充修史官亦有譽望親擢為編修已而改給事中金幼孜桐城縣知縣胡儼為檢討尋升縉為侍讀修撰胡靖為侍講編修楊子榮為修撰而改子榮名榮繼又升淮為編修九月遂開內閣於東角門內召七人者諭以委任腹心之意俾入處其中專典密務雖學士王景輩不得與焉明日賜織金羅衣各一襲時幾務孔殷每旦奏事退內閣之臣造扆前進呈文字商幾務承顧問率漏下十數刻始退十一月升縉為侍讀學士靖淮儼皆侍讀榮士奇幼孜皆侍講尋復改靖名廣永樂元年九月上御右順門召縉等諭之曰朕即位以來爾七人者朝夕相與共事鮮離左右朕嘉爾等恭慎不懈皆賜五品公服二年正月七人皆賜二品織金衣且勞之曰天下事咸朕與若等同計非若六卿之分理也三月册立皇太子進縉為學士兼左春坊大學士奉議大夫淮為左春坊左庶子廣為右春坊右庶子皆奉議大夫仍兼侍讀儼為左春坊左諭德仍兼侍讀榮為右春坊右諭德仍兼侍講士奇以本官兼左春坊左中允幼孜以本官兼右春坊右中允各賜袍笏九月儼出為國子祭酒四年縉坐事去廣遂進學士兼左春坊大學士奉政大夫五年二月淮進右春坊大學士仍兼侍讀尋進學士仍兼右春坊大學士士奇進左春坊左諭德幼孜進右春坊右諭德俱奉訓大夫仍兼侍講十二年淮坐事去十四年四月廣進文淵閣大學士榮幼孜進學士三人仍兼春坊原職十五年二月士奇進學士仍兼春坊原職十六年五月廣卒十八年閏正月命榮幼孜並為文淵閣大學士兼學士十九年正月改士奇為左春坊大學士終永樂之世內閣之臣不過五品而華蓋等殿大學士亦不復設蓋雖不崇以穹秩然皆出於親擢寄以天下大政而且諫行言聽得以奏其啓沃之功此所以為儒者之至榮也英宗復辟思復永樂之舊時修撰嶽正每開口論大事以世務自許上亷知其名吏部尚書王翺亦薦之天順元年六月召見文華殿上遙見遽曰好既升陛登殿連曰好好問年若干對曰四十上曰正好問何處人對曰漷縣上曰又是此北方人問治何經曰尚書上曰是書經尤善問何科進士對曰正統十三年上益喜曰又是我所取者乃顧謂曰今用汝內閣參預機務凡事為朕主張許彬老矣不足恃也正頓首辭至再乃出赴閣九月上御文華殿召太常少卿兼侍讀彭時入見令近榻前問曰汝是正統十三年狀元耶對曰不才誤蒙聖恩拔擢至今感戴不忘因叩頭三又曰第二名是陳鑑第三名嶽正時對曰是又問今年幾何對曰臣犬馬之齒四十二上笑曰正好用出外吃酒飯去時叩頭而已命下著文淵閣辦事蓋前此未嘗無親擢者而其事弗傳觀此則列聖禮重儒臣之意赫赫猶目前也咨詢必及其年者豈不以老成謀國必有壯猷新進少年或至敗事與用人慎始如此真可為後世之法內閣視事坐次殿閣大學士雖設自洪武中然同在內閣視事則自永樂初年始其坐次不敢正席者以車駕所嘗臨故也天順中大學士李賢疑與外衙門同將欲正席而坐同列彭時不可乃止時嘗記其事曰文淵閣在午門之外迤東文華殿南面磚城凡十間皆覆以黃瓦西五間中揭文淵閣三大字牌扁牌下置紅匱藏三朝實録副本儘前楹設凳東西坐餘四間皆後列書匱隔前楹為退休所李公自吏部進以傍坐不安令人移紅匱壁後欲設公座豫曰不可聞宣德初年聖駕至此故不設公座李曰事久矣今設何妨豫曰此內府也亦不宜南面正坐李曰東邊食處與各房却正坐如何豫曰此有牌扁故為正彼皆無扁故也李曰東閣有扁亦正坐何必拘此豫曰東閣西面非正南也李詞氣稍不平曰烏有居是官而不正其位乎豫曰正位在外諸衙門則可在內決不可如欲正位則華蓋謹身武英文華諸殿大學士將如何耶蓋殿閣皆至尊所御原設官之意止可侍坐以備顧問決無正坐理李語塞然意猶未巳踰數日上遣太監傅恭送範銅飾金孔子并四配像一龕來敬置於中間又數日遣太監裴富送聖賢畫像一副來懸於龕後壁上乃罷不設焉參預幾務內閣參預幾務雖肇自文皇踐阼之初然職惟大學士暨學士而已永樂二十二年八月仁宗繼統以文淵閣大學士楊榮等輔導東宫積有年勞於是升榮為太常寺卿金幼孜為戶部右侍郎俱兼前職楊士奇為禮部左侍郎兼華蓋殿大學士起前左春坊大學士黃淮為通政司通政使兼武英殿大學士四人俱掌內制不預所升職務內閣帶三品官銜始此上每退朝還宫遇有幾務須計議者必親御翰墨書榮等姓名識以御寶或用御押封出使之規畫榮等條對用文淵閣印封入人不得聞九月加士奇少保仍兼前職榮太子少傅兼謹身殿大學士幼孜太子少保兼武英殿大學士內閣位至三孤始此尊師重傅之禮至是極矣十一月士奇復進少傅兼職如故洪熙元年正月淮進少保戶部尚書士奇進兵部尚書幼孜進禮部尚書俱兼大學士如故內閣帶尚書官銜亦始此是年閏七月宣宗即位罷𢎞文閣命太常寺卿兼學士楊溥與士竒等同視事宣德元年三月升行在禮部右侍郎張瑛為左侍郎兼華蓋殿大學士九月淮致仕二年二月升行在户部左侍郎陳山為本部尚書兼謹身殿大學士瑛亦進本部尚書兼職如故二人者東宫舊僚也自是每新朝必晉陟侍從謂之從龍恩云然山與瑛皆不厭人望山直內閣無何被踈斥即致仕去久之瑛亦改南京禮部尚書六年十二月幼孜卒九年八月溥進禮部尚書兼職如故九月瑛起復入見上老之留為尚書兼大學士仍前銜幾務不復得與聞英宗之嗣位也在東宫未及出閣講學故無推恩者正統元年七月瑛卒三年四月士竒暨榮俱進少師兼職如故溥進少保兼武英殿大學士內閣以實録成進官始此五年七月榮卒九年三月士奇卒十一年二月溥卒於是老成盡矣是時侍講學士陳循進戶部左侍郎兼學士入閣參預幾務侍讀苗衷侍講學士髙榖馬愈侍講曹鼐以經筵日講官命與循同視事未幾鼐進學士又進吏部左侍郎兼學士衷進兵部左侍郎兼侍讀學士愈進禮部右侍郎榖進工部右侍郎俱兼侍講學士愈尋卒十四年八月鼐扈從北征沒於土木之難景帝以郕王監國擢修撰商輅彭時入閣辦事及即位藩府舊僚推恩官止侍郎不得厠內閣而循榖各進本部尚書兼學士時皆進侍讀時以憂去又擢户部右侍郎江淵兼學士入閣參預幾務尋又以命禮部左侍郎俞綱綱在內閣三月改南京禮部去蓋朝廷欲修文皇故事故擢用諸人然進退亦頗輕矣景泰元年二月𠂻進本部尚書兼學士尋致仕九月輅進學士十一月以禮部左侍郎王一寧國子監祭酒蕭鎡各兼學士俱入閣參預幾務尋加循少保兼文淵閣大學士榖少保兼東閣大學士仍兼尚書如故四月命循榖俱兼太子太傅升淵一寧鎡俱太子少師輅兵部左侍郎學士兼左春坊大學士一寧尋卒十月命太子太保兼都察院左都御史王文入閣辦事外官不由翰林得參預幾務者始此初文與中官王誠結為兄弟謀入閣嘗私以語髙榖會中旨增內閣員陳循舉蕭維禎榖遂舉文奏上果用文人皆駭愕四年二月命文為太子太保吏部尚書兼學士尋加少保兼東閣大學士尚書如故七年五月改循兼華蓋殿大學士榖文俱兼謹身殿大學士鎡進本部尚書兼職如故英宗復辟天順元年正月命都察院左副都御史徐有貞兼學士入閣參預幾務有貞始名珵由侍講升任以迎復功故有是命是日升太常寺卿許彬為禮部左侍郎兼學士與有貞同視事明日升有貞為兵部尚書兼職如故詔罪謀立襄藩者王文伏法陳循江淵謫戍蕭鎡商輅發為民蓋事關社稷有所不得已故也又明日升大理寺卿薛瑄為禮部右侍郎兼學士入閣參預幾務又數日榖致仕去三月命吏部右侍郎李賢兼學士入閣參預機務有貞為奉天翊運推誠宣力守正文臣特進光祿大夫封武功伯兼東閣大學士尋改兼華蓋殿大學士掌文淵閣事曰掌文淵閣事有貞所自署也閣在御府大內非人臣所可掌識者譏之矧非軍功而冒封爵固占知其不終矣尋進賢為本部尚書兼官如故五月彬瑄轉左侍郎仍兼職六月命通政司左參議兼侍講吕原繼命修撰嶽正俱入閣參預機務有貞賢坐事左遷賢為吏部左侍郎瑄遂致仕去瑄制行純慤邃於理學其去也蓋見幾而作云七月有貞革爵逺竄彬坐黜復賢官視事如故永樂中胡儼自內閣出不復再入再入自賢始也正尋坐事去九月命太常寺少卿兼侍讀彭時復入閣參預機務十二月時進兼學士改原為侍讀學士二年五月原進學士六年七月加賢太子太保八月原以憂去十一月卒七年二月升詹事府詹事陳文為禮部右侍郎兼學士入閣參預機務十一月召正還八年正月憲宗嗣位三月復正原職不預機務加賢少保兼華蓋殿大學士尚書如故文吏部左侍郎時吏部右侍郎仍兼原職十月時進兵部尚書成化元年三月文進禮部尚書二年十二月命太常寺少卿兼侍讀學士劉定之入閣參預機務是年賢以憂去奪情起視事尋卒三年三月復商輅原職視事如故八月文時俱加太子少保仍前尚書兼文淵閣大學士定之進工部左侍郎兼學士四年四月文卒十月輅進本部尚書定之轉禮部左侍郎俱兼職如故七年六月定之卒十一年正月時進少保三月卒四月輅進文淵閣大學士十二年六月加太子少保改吏部十三年二月進兼謹身殿大學士十四年輅致仕去加少保終成化之世又有劉珝萬安劉吉尹直彭華𢎞治中則徐溥丘濬劉健李東陽謝遷正德中則焦芳劉宇曹元王鏊劉忠楊廷和梁儲費宏靳貴楊一清蔣冕毛紀若芳與宇元由逆瑾進者也其末也惟廷和惟儲惟冕惟紀得奉遺詔翊新政焉以近事尚在人耳目不復悉記夫內閣密勿之地寄以幾務即鄒孟氏之所謂親臣也始雖以待儒彥而其後則元老巨寮為天下具瞻者乃得與焉非惟親臣亦重臣也百餘年來政治之樞要實在於此國朝不設丞相而世以宰相稱之過矣嗟乎用非其人固足以覆餗然或不見親且信焉雖有真儒安所宣其效哉傳旨條旨唐宋以來傳旨屬之執政故有所謂三旨宰相者若臣寮奏章凡有所批答皆臣下代言中書省及集賢院翰林院學士專之國朝始猶設中書省丞相政事由之以出納其後革去分任五軍九卿衙門中外奏章皆上徹睿覽每斷大事決大疑臣下惟面奏取旨有所可否則命翰林儒臣折衷今古而後行之故洪武中批答與御前傳旨為一事當筆者所書即天語也永樂洪熙二朝每召內閣造膝密議人不得與聞雖倚毗之意甚專然批答出自御筆未嘗委之他人也宣廟時始令內閣楊士竒輩及尚書兼詹事蹇義夏原吉於凡中外章奏許用小票墨書貼各疏面以進謂之條旨中易紅書批出上或親書或否及遇大事大疑猶命大臣面議議既定即傳旨處分不待批答當時公移每書曰某學士某傳於某殿某門欽奉聖旨即孝宗謂大學士劉健曰先生輩亦傳得旨是也自正統後始專命內閣條旨然中每依違或徑由中出是時上方幼沖委政宦官王振一至於此上下蒙蔽乃及土木之難英宗復辟每事與內閣面議然後批行𢎞治末上攬乾綱內閣條旨多出御筆事涉重大至厪宣問幾復祖宗之舊正德時批答大率與正統相類今之建議者徒知批答當依內閣所條而不知有面議傳旨故事或誤以條為調和之義也審爾則是漫無可否以聽上裁惟恐見忤矣豈所望於以道事君者哉茍利社稷死生以之可也密疏言事內閣密務有難揚言敷奏者太宗許密封進呈謂之密疏永樂十七年十二月乙丑學士楊榮密疏進言十事皆斥五府六部三法司積弊太宗覽而嘉之密諭榮曰汝言實切時病但汝為腹心之臣若遽進此言恐羣臣益相猜疑不若使慎密御史言之於是得監察御史鄧真畀入奏衆皆股栗免冠請罪詔諸司即日悛改怙終者不赦蓋榮所為奏留中真則受其意者也仁宗初即位兵部尚書李慶言於上曰民間馬畜蕃甚已散之軍伍尚餘數千請令朝覲官領之少蘇民力大學士楊士竒獨密奏謂朝廷求賢任官今乃使養馬而課責與民同非貴賢賤畜之意明日面請內批罷其事不報明日又入對請罷上曰吾偶忘之當即批出不爽也午刻上御思善門召諭曰批豈真忘之念卿孤立為衆所傷不欲因卿言而罷耳今有名矣出示一章乃陜西按察使陳智所言者命士竒據此草敕止之已領者準洪武中官員乘例不責生息虧損不責償未給者止勿給復謂曰繼今令有不便惟密與朕言李慶輩不識大體不足語也二十二年十一月學士楊溥密疏言事上嘉納御札奬諭之曰覽卿所奏為國家之計誠合朕心但望卿始終如一知無不言相朕致治以承天休感卿忠􅈤特用酬報今賜卿綵幣一雙鈔一千貫卿其領之夫機事不密則害成上所以委曲為之處者如此而又寵以旌賞真可謂一德一心矣其後內閣言事循此例類用題奏揭帖不宣聞於外云天順癸未空中有聲大學士李賢密奏曰傳言無形有聲謂之鼓妖上不恤民則有此異因條不便於民者十事上皆從之即詔天下賢又請罷江南所造緞匹磁器清錦衣衛囚止各邉守臣進貢下畨所遣使臣停中外買辦采辦上不從賢執之數次止取前十條行之左右見賢力爭皆寒心同列亦為賢懼賢曰古之大臣知無不言今雖不能盡然至於利害繫國家安危者豈可默默以茍祿位然上聖明亦不以為忤也蓋嘗論之嘉謀嘉猷入告于內與揚言敷奏者不同必利害繫國家安危而後言之又與爭一事之得失陳一時之利害者不同內閣事功稱三楊一李然其所遭際可考也夫惟聲色不動而誠意潛孚閲歷既多而識見素定乃可以當此然亦難矣嶽正在內閣嘗密言吉祥石亨罪惡二人譖之被黜有士人告之曰先生犯孔子戒矣問之云何則曰未信而諫是也正曰初上用我左右責任教誡甚至敢不盡心若子以諫官處我則恐未然夫正之言誠是也沃心之論造膝之謀初不事於表暴而天下自隂受其賜此內閣之所以異於諫官也若先朝之委任楊李真可以為萬世之法會議宣德以前每有政事與羣臣面議正統十年始命內閣官與六部都察院通政司大理寺堂上官六科掌印官會議遂為例徐有貞曰景泰四年十月上以河決沙灣久弗克治集左右丞弼暨百執事之官於文淵閣議舉可以治水者僉以有貞應詔即其事也葉盛曰凡中外陳奏皆禮部於內府會議禮部侍郎宣言其要諸部院正官面決可否自正官外更無出一言者天順中罷之近例凡朝廷有大事當會議者該部奏請如合會儒臣則本院詹事府左右春坊司經局及國子監皆預繕寫疏章太宗時內閣進學者二十八人皆面稽而身教之王英王直德器才學尤為儕輩所推首擢為修撰以皆慎密可任並入祕閣書進呈機密奏疏永樂末纍擢至講讀學士蓋嘗試以為大用之地云宣宗時復增左春坊大學士曽棨俾入直未幾棨卒二王亦出理部事繕寫章疏之任遂廢書辦大明會典云凡內閣所掌制勑詔旨誥命册表寶文玉牒講章碑額及題奏揭帖等項一應機密文書及王府勑符底簿皆制勑房書辦文官誥勑及畨譯勑書并四裔來文揭帖兵部紀工勘合底簿等項皆誥勑房書辦各用中書舍人等官於本院或各該衙門帶俸遇有升遷仍舊供職其有堪别用者亦從吏部推舉內閣嚴禁袓宗規制嚴內閣之禁凡一應官員間雜人等不許擅入違者治罪今內閣門額懸挂聖旨葉盛云文淵閣宥密之地外臣非公事不能至遷升機宜無敢泄者楊文貞文定文敏三先生典型尚存文貞間遇知己或問近日外間有何事或某事便否亦甚鮮也後來者則有稍稍傳聞於人甚而方面官見辭後必造謁或舉子入考文字又甚而造膝之言代言之筆不待莫出禁門而已遍告多人矣此蓋指景泰中之用事者故云然官員入見凡本院官入見內閣必先使孔目通姓名而後見初授官謝恩後入見例留飯可齋雜記云豫官修撰謝恩後偕同年陳緝熙嶽季方詣閣下見曹陳苖髙四先生遂留早餐酒飯隨光䘵寺所供不增設諸先生笑曰此是本院故事儒官清淡只如此蓋以寮友待之也其後內閣官尊或有座主門生之分遂令六品以下揖於階下五品及詹事府官送迎如寮友禮若朝見及冬至正旦行禮後不暇易服往見焉非公事不復至或議朝政質問可否使孔目請入乃入外官入見亦以公事會典所載凡各衙門領勑官員俱赴內閣會有勑書方赴鴻臚寺報名辭朝領勑其他則國子監官送書課提督四夷館送畨譯文字之類具有定規云𢎞文館閣洪武三年四月庚辰置𢎞文館設學士一員及校書郎等官九年閏九月定官制遂罷之居是職者劉基詹同羅復仁胡鉉也仁宗在東宫潛心問學及即位建𢎞文館於思善門外蓋法聖祖遺意永樂二十二年八月命本院學士楊溥掌之與侍講王進時承顧問討論經籍又擢編修楊敬給事中何澄俾預焉又起用檢討陳繼凡在閣者五人上嘗臨幸講論經史不倦洪熙元年閏七月溥等奏納𢎞文閣印各還原任宣宗可之仍命溥與楊士竒等同治內閣事正德初建議者謂宜倣𢎞文閣故事命侍從文學之臣更畨入直或召天下之文學而恬退者一二人如起用陳繼之例聽政之暇遊息之間特至閣中略去威嚴從容訪問或講經書或論古今成敗有暇則至不必拘其時有疑則問不必嚴其禮如是則聖學緝熙義理純熟凡百玩好自不暇及而所召必皆一時之聞人則亦可以收拾天下之遺才矣此亦復祖宗君臣同逰之漸也惜論建未及上徒付之空言而已東閣儲用正統丁卯詔選本院官之有譽望者入東閣讀中祕書修撰劉儼商輅編修陳文吕原等凡十人且命之侍經筵日在內府進學不倦蓋儲之以待大用也其後多入內閣為名臣者然非職掌之舊殆與庶吉士同矣翰林記卷二
