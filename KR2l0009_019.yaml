body:
  text: 翰林記卷十九明黃佐撰學士榮選丘濬曰宋人有言宰相有責任之憂神仙乏爵位之寵既都榮顯又享清間惟學士然也學士之職在前代為榮選然所掌者大封拜大詔令大制作之外下至於青詞齋文口宣致語之類無大關係者皆俾為之殆無虛日榮則榮矣然謂之清間則恐未也較之他曹局稍為優爾我朝之制制誥詔敕之外編纂講讀之餘一切屏去浮文凡前所謂禱祈宴會之事恆希有焉其職務尤為清間也若南京則諸司留務比舊為簡而翰林殆甚焉又曰太宗始簡儒臣入內閣司王言遂預幾密故事非負宿望通經術有文藝者弗得與列聖相承率用翰林儒臣為之其選至嚴也一時臺省巨僚雖有竒才異能亦皆安然遜避不敢萌毫髮覬覦意近世乃有以攀援來自他途者於館閣故事多有所更革蓋學士之選至永樂以後責任重矣濬常與楊守陳諸人賦學士四榮詩謂經筵進講史局修書殿試讀卷禮闈主試也然人臣之義以盡職為榮以寵光為館閣故事惟宣德以前為可遵法然至今有未能復者率舊章以成德業不能無厚望於新政也儲養人才劉儼曰士莫先於涵養涵養久則德性堅定知慮精純言行操履正大篤實出而居大位任大事豈惟不動心哉且有執而不失也今之涵養於官莫如翰林所聞者聖賢之言所習者聖賢之行於凡錢穀簿書之事機械變詐之巧一無所動於中而其養純矣故前後自翰林出者率非尋常可及蓋當因儼是言而求國朝建設本院之初意矣官無定員凡以儲英俊也職無專掌凡以求通儒也置之中祕凡以廣器識也列之近侍凡以資薰陶也然必已德既修而後上德可成如徒曰文藝而已矣則所以輔導者先無其本而何以為任大負重之地哉故前輩官是院者上體朝廷造就儲用之意以涵養德器變化氣質為先茍以交結趨走為圓機視聖賢學術為長物而事業不能少自見則雖謂之冗員可也前輩學行前輩學行世皆稱學士薛瑄為館閣傑然者瑄以復性為教嘗曰格物只是格箇性吾於日用之間必體察之何事是仁之發見何事是義之發見至於萬物各具一理萬物同出一原是貫通處也每以聖賢為師隨其所寓圖書針規一言一動於理稍有遺失便覺身心不安取與必揆諸義一毫不茍於富貴利達泊如也然劉定之則病其無著述謂其直躬慕古談道淑徒然與朱子諸徒相並若黃直卿輔廣之親承微言金履祥許謙之推衍諸説尚未知何如也今瑄有所著讀書録行于世亦可以見其躬行之大略矣近世士論又推祭酒章懋蓋皆學有所得者後進之士所當師也前輩風節洪武五年正月待制王禕使雲南六月達其境已故元梁王不屈六年十二月遇害洪武壬午內難平禮部侍中黃觀修撰王叔英皆死之觀由修撰升者有司請戮上曰彼食其祿自盡其心爾皆置不問正統間上恭儉與民休息第蔽於權幸政務乖張災異數見侍講劉球上疏言事太監王振假他事下之獄遂罹極刑此皆遇變故者洪熙中侍讀李時勉言事纍被箠不死繫之獄宣德元年冬駕幸萬嵗山召問以激怒先帝之由詢至再四乃誦言之至第六事少止上曰事尚有何以不言對曰天威嚴重臣不能悉記其詳上微笑曰是第難言耳汝有諫稿在否對曰已焚矣遂得宥仍授侍讀稍遷侍讀學士上一日懷金錢至史館撒之于地令諸臣拾取時勉獨正立上呼至前以袖中餘錢賜之其風節始終不渝如此後遂襲為故事正統景泰中踵行之侍講髙榖年老擁腫不能俯拾同列代拾與之上望見以為笑英宗復辟聞時勉事覺其非禮乃罷不行世以是益賢時勉云天順初編修楊守陳被旨授徒內侍監辭不許後所教中人已多貴幸凡預教者率因之以進獨守陳泊然無少藉有欲出力援之則謝曰我嫠婦也抱節三十年矣乃垂老而改志邪縉紳往往傅誦其言蓋授徒內侍監始自陳山張瑛後有檢討錢溥遂以為例溥纍遷侍講學士以漏泄禁中語謫知縣云後竟有援之以起者官至南京吏部尚書而守陳竟不大顯學士吕原在內閣忠國公石亨與宦者吉祥用事每相視輒曰吾輩行當為先生易緋屢言之原自若也修撰嶽正與原共列吉祥罪狀于上未發亨等覺之乃共摘正與原所草承天門詔語以激上怒上御便殿召近臣厲聲曰正欺罔敢爾原素謹厚乃助之何也既退人危之原曰死生天也懼何為正謫去原得免然官竟不遷而卒是時朝士多附亨等庶子童緣不往世以是稱之成化中司禮監太監黃賜母死省寺監院無弗弔祭翰林獨未之詣一日侍講徐瓊言於衆曰時且如此獨得不往乎衆或應或默侍講陳音奮然怒作而言曰堂堂翰林相率而拜內臣之門天下其謂何斯文其謂何詞氣憤激聲淚俱下於是言者大沮事遂已汪直之在西厰也氣熖烜赫出沒如鬼神一日有校士突入兵部郎中楊仕偉家收縛仕偉拷掠及其妻屬衆莫敢闖音其鄰也登墉呵之曰爾何人敢爾不畏國法其人曰爾何人敢爾不畏西厰曰爾欲知我乎翰林侍講陳音也聞者為之縮頸劉瑾煽虐時諸翰林多不為之屈掌院者久不遷時有一青學之謡已而焦芳輩比瑾加擠排於是官尊者左遷南京講讀而下皆外補一時氣節殷殷有聞者最多不能悉記云顯晦有時可齋雜記云天順元年徐李被黜負權寵者語人曰我欲薦彭時入閣因未與相識故未果其人傳言曰可往一見之彼必喜豫對曰素不慣往見人有相愛者曰今人持重賂求見且不可得子徒手一見何傷豫曰承厚愛然決不能往去年當諸公合謀時有邊司歷者三次來家邀豫避不敢見蕭郎中聰又謂豫曰彼是有力者使來進用之機在此今不見後將有悔豫曰我本無他望何悔之有及入內閣之命下始知顯晦自有時決非人謀所能與也時之自記如此所謂持重賂者當時士風蓋可想見禍福有命洪武壬午內難平翰林尹昌隆名在姦黨見太宗叩首曰臣嘗上書建文謂宜避位上得其藁釋之後坐事下獄死太宗一日於宫中持建文時羣臣所上封事千餘通覽一二有干犯者命侍讀解縉等編閲關係軍馬錢糧數目則留餘干犯者悉焚之既而從容問縉等曰爾等宜皆有之衆稽首未對修撰李貫進曰臣實無之上曰爾以獨無為美耶食其祿思任其事當國家危急之際在近侍獨無一言可乎朕非惡夫盡心於建文者但惡導誘建文壞祖法亂政紀耳爾等前日事彼則忠於彼今日事朕則忠於朕正不必曲自遮蔽也後貫亦以罪死嗚呼貫與昌隆之死視黃觀王叔英之死果何如也禍福之來非人所能趨避者君子亦惟行義以順命而已同寮交誼華盛云正統間名臣稱三楊二王文貞為西楊文敏為東楊蓋以姓同因居第以别之文貞因出江西而文定郡望每書南既乃因以南楊號文定焉東王則抑庵西王則泉坡蓋亦然也文貞文定最交厚嘗曰交之久知之深者余兩人庶幾可無愧也文定撰文貞神道碑則曰溥自出仕與公交遊在館閣議事彼此不能無可否退而歡如也抑庵自內閣為禮部侍郎出文貞意文敏蓋嘗甚惜之然抑庵為文貞作本傳極其稱揚又曰山東參政孫子良與同年庶吉士楊相交遊極厚相為主事坐谷府纍卒子良懼不敢往弔由是為東里楊公所薄右都御史耿九疇初以石氏事補外繼而及其子檢討裕門外邏者猶紛紛未已裕治裝間謝絶親友非至親亦無敢入門者而惟孫狀元賢日一至焉裕以彼此無益謝之則曰誰無朋友噫此所以為狀元也與又曰劉詹事鉉居家忽報云髙先生使人來言有保薦矣劉不怡者終日曰爾自保薦何與我事髙世用亦為是邪蓋髙與劉最厚以有旨即當入謝欲劉知之蓋出無心而其言如此則其為人可知已觀於此數事前輩同寮交誼皆可師法師生執禮座主之義自有科舉以來有之蓋凡出於其門者或登堂而拜或分屏而坐有不同於塗之人者既其甚也乃至於徇私忘公故宋之初嘗革其弊蓋亦矯枉而過直者國朝設科目士子禮座主如師所謂士伸於知己者亦禮當然也大學士楊溥鄉試為首選時胡儼與文衡批所刋文曰立玉階三寸地必能為董子之正言而不效公孫𢎞之阿曲人以儼為知人後儼為祭酒溥已在禁垣位益髙終身執門生禮儼亦不辭人兩髙之貽書規誡洪武末侍講方希直被召時修撰王叔英與之書略曰天下之事固有行於古而亦可行於今者亦有行於古而難行於今者如夏時周冕之類此行於古而亦可行於今者也如井田封建之類可行於古而難行於今者也可行者行之則人之從之也易難行者而決行之則人之從之也難從之易則民樂其利從之難則民受其患此君子之用世所貴乎得時措之宜也意蓋諷希直之泥古及希直用事頗宗周禮於是政事不能無更變或謂廢北方學校以行井田實出希直叔英言益驗正統初君臣之情遏隔不通靜慈母后名號未正之類議者責有所歸及至土木之變尚書王直在朝為元寮學士周敘貽書有曰吾吉安賢才輩出為世道重者敘於永樂宣德間嘗仰東里先生然迹其舉措究其底裡士大夫公論不能掩也今日處大事濟大艱在於用君子逺小人而已蓋小人易進難退君子未有不為所擠者今某公某公皆君子也同朝者宜傾竭倚注之其在逺在家者宜即日馹召以來之凡內外防微之政宜與三四君子因人所建白不動聲色以漸處之可也得非謹始執要之一幾邪蓋三楊輔政之初一幾也不深思熟慮身任其責惟陽斂隂施掩人耳目雖曰自保其實誤國故致今嵗七月禍此時先生與諸君子輔政之初又一幾也宜鑒覆轍為宗社生靈永逺之謀開天下後世太平之治失今不圖恐異日噬臍之悔莫及矣敘所謂逺謀蓋即其建言謹微漸數事也後亦不能用景泰初奉迎上皇不如禮貽書責內閣者乃出一武辨陳循輩力主易儲館閣相視莫敢言嗚呼受善言盡忠告信亦難事哉語曰臣能受諫則可以諫君矣此之謂也門第館閣中門第最盛者曽鶴齡舉進士第一其子蒙簡舉進士二甲第一蒙簡子追舉進士第二三世皆傳臚大學士謝遷以解元及第第一丕亦以解元及第第三會試皆為魁倫文敘以會元及第第一子以訓亦以會元及第第二其科目尤顯洪武中唐肅子愚士永樂中儀智子銘裴璉子綸正統以後商輅子良臣倪謙子嶽楊鼎子時暢父子皆官翰林今大學士楊廷和子慎為狀元尤東閣郎君之僅見者兄弟官翰林者永樂中有王汝玉王璉周述周孟簡及沈度沈粲天順成化間楊守陳守址𢎞治正德間則汪俊偉佃也今大學士費宏從弟宷從子懋中皆官翰林若大學士彭時彭華於編修琉為從子時以狀元華以會元先後入閣世有大小彭之目雖為踈逺從兄弟然亦衣冠盛事云文運國初學士宋濓太史令劉基待制王禕皆以文章冠天下三人者浙産也同時者有胡翰蘇伯衡張孟兼之屬後進有方希直王叔英之屬又皆浙産也濓子璲基子璉禕子紳亦皆能文章然皆不由科目丘濬曰國朝文運盛於江西開國之四年䇿士以文即得倫魁於金溪又十餘年始定今制會試天下士褎然舉首者分宜人也永樂甲申選庶吉士讀書中祕以應二十八宿其中十二人出江西而官翰林者七人宣德甲寅合丁未庚戍癸丑三科選之亦如甲申之數出江西者七人留翰林者四人奉勑教之者前則吉水解公大紳後則西昌王公行儉是又皆江西人也蓋當時有翰林多吉安之謡首甲三人或純出江西者凡數科間亦有連出福建者士論或以為楊士竒榮互相植黨豈其然耶士竒嘗曰宣德五年春翰林進兩朝實録賜宴賚既勑吏部進纂修以下官侍講余學夔不俟吏部覆奏不謀於相知即入疏自陳老疾致仕上可之竟不加官而去士竒交學夔踰三十年同在京二十五六年其為人明經博古負直氣侃侃遇事徑發不肯茍有阿徇是時江西士風如此不特文運之盛而已目以植黨蓋私言也文體三變國初劉基宋濓在館閣文字以韓栁歐蘇為宗與方希直皆稱名家永樂中楊士竒獨宗歐陽修而氣焰或不及一時翕然從之至於李東陽程敏政為盛成化中學士王鏊以左傳體裁倡𢎞治末年修撰康海輩以先秦兩漢倡稍有和者文體蓋至是三變矣至於詩則名家者猶罕國初詩人生勝國亂離時無仕進路一意寄情於詩多有可觀者如編修髙啓蓋庶幾古作其後舉業興而詩道大廢作者皆不得已應人之求豈特少天趣而學力亦不逮矣大學士李賢嘗議欲場屋中添詩賦以求博雅之士正為此也𢎞治檢討陳獻章莊昶養髙山林以詩鳴謂之陳莊體為世所宗李東陽極力變之至正德初有李夢陽何景明輩追迹漢魏世亦尚焉然東陽之論文精矣其言曰詩與文各有體而每病於不能相通夫文言之成章而詩又其成聲者也文章之為用貴於紀述鋪敘發揮而藻飾操縱開闔惟所欲為而必有一定之凖若詩歌詠嘆流通動蕩之用則存乎聲而髙下長短之節亦截乎其不可亂雖律之與度未始不通而規其制則判而不合及乎考得失施勸戒用于天下則各有所宜而不可偏廢古之六經易書春秋禮樂皆文也惟風雅頌則謂之詩今其為體固在也學者可以知所從事矣例贈本院官凡奉使給假侍親養疾致事遷官賀夀暨之任南京館閣中推一人相厚者為序餘皆賦詩贈之謂之例贈嘗聞詹事劉紘賦詩贈一同官之任南京有一尊傾罷雨蕭蕭客思離情總不消之句詩成慟哭不能語忠誠之發感動左右前輩相與情每由衷如此應酬學士宋濓文章名世荒夷朝貢者數問安否日本得潛溪集板刻國中髙句麗安南使者至購文集不啻拱璧權要及有力者茍非其人雖置金滿槖求一字不肯與縱不得已與之亦不受其餽謝日本使奉勑請文以百金為獻郤不受上以為問濓對曰天朝侍從之官而受小夷金非所以崇國體也上深然之解縉為學士求文與書者日輻湊率與之無倦色或言有不當與者笑曰雨露豈擇地而施哉且人孰不可與進者二人性度不同如此胡廣不喜序人家譜以多牽合不實也楊士竒平生所敘譜幾五十餘家自昔文人序譜莫盛於此然廣自附胡銓之後世亦有譏之者矣李時勉在成均時松江士子新刋孫鼎詩義説成請序却之請之固則曰解經書自難為文六經已有傳注學者自當力求此等書吾平生不喜以其專為進取計能怠學者求道之心故也吳訥集解小學書成蘇人有求序於祭酒吳節者亦却之曰思庵豫鄉先生也其人達尊况豫所述未能出其右吾何敢序也節乃時勉弟子也大學士丘濬文字雄渾壯麗四方求者沓至茍非其人雖以厚幣請之終却不與故世謂濬有三不可及居宅至老不易讀書至老不怠拒絶權貴至老不變是也其後程李輩詩文最顯然性度大類解縉云評隲學士楊溥與修撰張益檢討王振善相見輒出所作就二人評有所改易即樂從溥亦善改人文字陳循當筆撰祭文溥欲有所易循忿然不平見於言色溥即已之正統九年春修國子監成溥奉敕撰御製碑文以重建太學為題具稿呈命范太監傳示楊士竒時士竒己臥病乃作一篇以新建廟學為題封進溥不悅執用其題士竒具本論曰凡言重建謂己作之後又重作之廟學建自前元非國朝事今既悉撤而新之只當云新建其廟與學二事若只書建太學而不云廟於理未安請改作新建廟學為宜廷議雖韙士竒之言然己刻石無及矣溥之性度至是又與平昔不同何也豈文人爭勝自古然邪葉盛曰文字著述稱謂器物名號以至歌謡戲謔之言多有徴應亦皆有當避諱者文字如王言制䇿之類視草者尤不可以不慎也誤用古人爵諡文章字義近世名人不免胡祭酒以程明道所答御史之問為御吏馬狀元以余襄公為忠襄許道中詩多以壇場為擅場之類是也陳檢討繼擅文名一日見同官於碑志敘還金事太繁曰使繼為之則十二字爾扣之則曰嘗得白金於道伺其主而還之又嘗以文示後生詫之曰吾此文何出後生應聲曰氣脈頗類下武詩繼默然知詩者近稱楊東里而好議論者或以千古葬靈輀謂靈輀非可葬也素不元不忝謂君其位而行經語非可詩也此豈所謂不知詩者非邪大抵詩文貴得朋友麗澤商量評隲以求盡善則謬誤可免繁簡適中庶可以垂世而不為徒作不然則轅輪飾而人不庸之喻豈能免邪書銜洪武中修撰答祿與權為人作文不書官銜上聞而切責之御製責文一篇以戒在官故前輩詩文未嘗不書銜也楊士竒曰國初循元之舊翰林有國史院院有編修官階八品而無定員多或至五六十人若翰林學士待制等官兼史事則常兼修國史銜其後更名官制罷國史院不復設編修官而以修撰編修檢討專為史官𨽻翰林院自侍讀侍講以下為屬官官雖異然實不分職史官皆預講讀講讀官亦預史官所兼預職事不以書銜近年官翰林者多循國初之制書兼修國史甚者編修已升為七品正員而仍書國史院編修官亦有書經筵檢討官者蓋初襲舊制故也正統以後內閣大學士多書知經筵事或同知經筵事學士而下書知制誥兼經筵官或經筵日講官又有書某書總裁副總裁者則出近時云經學疑辨洪武中大學士朱善最邃於經學所著有詩説解頥發明朱子之意未嘗與之辨也編修王廉經書多有疑辨然未有成書天順間侍讀學士周洪謨著疑辨録皆取經傳中可疑者辨論之每讀書有所得欣然謂人曰進我兩階不足言也及為祭酒日與太學士等正訛訂舛凡數百條梓行於時蓋多有與先儒異者近世儒臣未有主兩京教者有之自洪謨始抗顔師席論難經學得失獨與諸儒異者亦自洪謨始也成化初學士楊守陳所著三禮周易尚書詩孝經大學中庸論孟私抄凡數百卷雖經文亦多以己意更置次第之自謂正其錯簡定其章句擇諸家傳注而傅以私見雖大儒之説不茍從豈惟是也雖昔人所遵以為出於孔子刪述者亦不盡從矣蓋又不特疑辨而已真草篆𨽻國初令能書之士專𨽻中書科授以中書舍人永樂二年始詔吏部簡士之能書者儲翰林給廪祿使進其能用諸內閣辦文書然一時翰林善書者有解縉之真行草胡廣之行草滕用亨之篆八分沈度王汝玉梁潛之真楊文定之行皆知名當世而三楊用事各舉所知以相角勝楊士竒薦長樂陳登以浮梁縣丞選入翰林時滕用亨工篆籀自視天下無愈己者且恃春秋髙輕後進往往折屈之稠人廣坐中登初至謹默謙下用亨連三日折之文淵閣六卿大臣皆在旁視不可耐登怡然從容就用亨語其戾許慎者十數事相辨難登道許氏説娓娓皆用亨素所忽者用亨乃始默默斂鋒鍔不復自矜大聲譽遂起時王尹實者篆書擅名海內至考據精博亦推讓登焉蓋自永樂以後能書之士皆𨽻內閣制勑兩房而中書科視事者與所謂習字秀才之屬大率徒有其名爾正統中程南雲以篆𨽻顯官至太常卿自是兩房書辦中書舍人加部屬寺正等官有至二品者正德末周惠疇拜尚書大見寵幸然實不能書也翰林記卷十九
