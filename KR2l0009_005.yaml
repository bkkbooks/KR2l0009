body:
  text: 翰林記卷五明黄佐撰到任燕㑹本院官銓注後吏部題本以到任管事請有旨俞允具公服謝恩擇日詣外公署與同寮相見謂之到任本院自内閣學士至孔目皆出燕錢置盛筵於後堂用樂學士列坐於上新任者坐於前之左講讀坐於前之右餘皆旁坐公燕之盛葢諸衙門所無又數日新任者囬席比前務加盛若甲首則狀元出燕錢倍第二第三人其後併在一日同寮先設小席以待新任者序賔主東西列坐飲數行即徹去就新任者之席勸酬大率成禮而已然五品以上博士以下不預唯講讀史官在焉非舊典也聚金之燕或久乃舉行云庶吉士入館則内閣學士而下皆送至外公署備燕席待之諸士亦囬席然不謂之到任者以非職官故也考滿本院官凡歴俸連閏計三年例給由考滿六年九年皆然先具脚色事蹟及過名有無呈掌印官以憑考覈乃徃吏部相見六品以下循廊至堂上送迎待以殊禮五品以上冢宰迎至後堂賓主坐談送出移咨都察院掌院官皆迎至後堂坐談送出不計以崇卑云洪武十四年十月壬申定考覈之法翰林院等衙門為近侍不係常選官員任滿黜陟取自上裁盖未嘗徃吏部也十六年六月己卯吏部奏定考覈之制在京翰林院等衙門屬官俱從正官考覈各以功過稱職與否開具送部覈考從之永樂元年吏部奏准本院五品以下堂上官照例不考五年奏准詹事府六品以上官亦不考俟九年奏請黜陟而凡左右春坊司經局中書舍人俱不咨都察院惟吏部考覈而本院官猶咨都察院劄付河南道覆考稍與洪武時異矣近凡考滿皆吏部引奏復職六年亦然九年則考功司例差官送題作文不知起自何時大率皆非祖宗禮待文學侍從之舊也九年考滿該陞品級具奏取自上裁尚循舊典焉若考察之法或間一舉行成化四年令翰林院屬官并帶俸官譯字等官本院學士㑹同内閣考察𢎞治元年令翰林院官亦從吏部考察十年令兩京官照例考察惟翰林學士不在五品之例百餘年來儒臣未嘗玷清議自考察之典行修撰錢福編修孫清盖由兹退者夫惟祖宗之世日勤晉接照臨雖逺不遺而何邇臣之能掩然既著為令甲耳目有攸寄矣嗟乎慎名檢者盍自勵哉遷轉聖祖定本院官為近侍清貴之職凡遷轉皆出自上裁未嘗付諸銓衡百餘年來遵之不易然洪武中自本院官遷轉者多大拜二年十月以應奉雎稼為中書省㕘政十九年二月以待詔朱善為文淵閣大學士三月以檢討茹太素為戸部尚書二十七年九月以少詹事任亨泰為禮部尚書二十八年四月以編修齊麟為禮部右侍郎盧原質為太常寺少卿六月命編修馬京署通政使司事己而拜禮部左侍郎二十九年正月以詹事府丞杜澤為吏部尚書左贊善門克新為禮部尚書又有依資格者三年十二月以侍讀學士魏觀為國子祭酒太史令劉基為𢎞文館學士十二年十一月以修撰迮原霖為通政司右㕘議十五年四月以正字魏徳壽為春坊司直郎八月祭酒呉顒有罪以文淵閣大學士宋訥代之二十九年二月以修撰黄觀為尚寳司卿編修張顯宗為太常寺丞凡此皆出自親擢故也又有止在本院者如侍讀學士朱升為學士之類永樂遷轉亦止在本院獨元年十一月為異典時舉人王偁以薦為檢討既命下上問左右曰檢討之下何官曰博士典籍侍書待詔問已除人否復以已除對上歎曰古所謂用人如積薪此類是也國家用人以賢以勞偁之賢既未可知勞亦未有而令賢有勞者居其下何以服士心遂命吏部凡翰林自博士以下皆陞職與偁同遂陞博士張伯頴王汝玉典籍沈度潘畿侍書蘇伯厚待詔王延齡劉宗平解榮皆檢討其後内閣陞擢漸至三孤仁宣二朝任益隆矣事見前卷自是本院遷轉非九年考滿則纂修書籍名雖親擢實則循資格也惟正統末侍講楊鼎徐珵擢副都御史檢討王詢擢大理寺丞各廵撫河南山東貴州等處地方成化初修撰張頤擢僉都御史廵撫特殊餘惟始遷詹事府左右春坊司經局轉則吏部尚書侍郎以至内閣不及他途云天順二年學士李紹陞禮部右侍郎實出上命及履任公卿徃賀吏部尚書王翺舉酒酹曰天選侍郎也前此倖進者多㫖授故云然已而權幸不平伺間譛紹奏事多南音上曰大臣以徳選何以聲音為㑹祭酒缺吏部請以紹兼領之上謂王翺曰吏部不可無此人其别選代之翺退語同列曰我不知李侍郎見重於上如此孝宗登極推恩宫寮擢少詹事兼侍講學士楊守陳為吏部右侍郎初當筆者猶擬南京上覽疏以筆塗去南京二字列聖禮重儒臣若此者尚多姑記其畧貤恩封贈凡貤恩受封贈三年考滿及特恩始有之本院正官頒給誥命取自上裁吏部奏聞其手本開冩合授散官并年籍脚色送中書舍人候書冩完備吏部仍具手本於御前用寳訖具奏御前頒給講讀以下官亦如之第用同寮勘給送吏部驗封司為不同耳其最異者洪武九年十一月學士承㫖宋濓致仕詔贈其父原贈禮部侍郎文招為嘉議大夫禮部尚書母宜人陳氏為淑人祖徳政贈亞中大夫太常寺少卿祖妣金氏贈淑人妻賈氏封亦如之誥辭皆上所親製稱濓有曰徳量之𢎞如千頃陂澄之不清撓之不濁天下榮之成化十五年少詹事兼學士王獻滿三載乞恩移封父母許之時制凡朝臣五品已封者即四品不封獻父已贈諭徳於是加贈少詹事皆兼兩銜妣亦由宜人加恭人人罕與為嫓時又工部右侍郎兼學士劉定之太常寺卿兼侍讀劉珝以親老陳情未經一考乞貤恩給封誥詔從之𢎞治中禮部右侍郎謝鐸考績奏言祖母趙氏以節死請輟所得封誥移為旌典詔特表為貞節之門仍予誥命皆出異數也改調外擢呉二年修撰朱夢炎轉山西行省員外郎此改調外擢之始也洪武三年學士陶安出為江西行省㕘政八年編修朱右以稽古不能詳上譴之出為晉府長史九年編修張鳳擢廣西行省㕘政十六年八月以侍講學士李翀為浙江右布政使左春坊正字魏徳壽為江西右布政使二十五年八月左春坊大學士董倫坐東宫事出為河南左㕘議自是近侍文學之臣或遂以為例而或有出自上怒者永樂初淇國公丘福以儲位未建請立漢王高煦上詔學士解縉定議立仁宗然秘未發明年立皇太子又明年福等所議泄於外高煦言於上曰藩府之舊泄者其惟縉乎遂出縉為廣西右㕘議又有出自薦舉者正統元年正月大學士楊士竒舉侍講劉永清材堪繁劇出為廣東右布政使十三年十月侍講陳文亦以大學士高榖薦出為雲南右布政使成化二十三年司經局洗馬羅璟服闋至京師為鄉人所陰中調南京禮部員外郎𢎞治十一年庶子王世以事出為廣西左㕘政若太祖時起居注王褘出為南康府同知特賜金帶寵勞之後復召自漳州判為待制特歴試以難劇且出於寵勞非左遷也正徳時學士張芮或咎其無文名逆瑾用事遂出為鎮江府同知修撰何瑭以抗直不跪逆瑾出為開州同知大率本院官外擢皆升高位無有對品調者若王褘則出自聖祖親擢事體不同不宜援以為例也降謫洪武中本院官降職為屬官或國子及風憲等職元年十月以直學士詹同侍讀學士秦裕伯為待制此降職之始也三年十一月學士宋濓待制王褘坐失朝降為編修八年七月降編修荅禄與權為典籍九年十月降編修朱孟辨為中書舍人十二年十二月降待制呉沉為編修十三年六月復官㝷降典籍拜東閣大學士十六年八月降東閣大學士呉沉為侍書以進講後期考功監劾之故也㝷改為國子博士十五年華盖殿大學士邵質降監察御史二十二年十二月降學士劉三吾為國子博士侍講學士葛鈞為助教三吾等受命授晉王世子經吏部侍郎侯庸劾奏三吾等在職怠惰而黜降别用上曰儒者不任劇事俱令教國子未幾俱復職二十四年鈞以稽古不稱㫖仍降助教三十年編修景清改御史其後侍講戴徳彛編修尹昌隆亦然洪熙初侍講李時勉以言事降交阯道御史修撰羅汝敬亦以言事降河南道御史此皆内任者洪武四年八月侍讀學士魏觀坐考禮不以時謫龍南知縣編修宋濓坐祭孔子遲慢謫安逺知縣五年二月召致仕學士詹同等至京師賜宴奉天門復同官觀與濓皆禮部主事十二月擢觀國子祭酒濓太子贊善大夫此外謫復任之始也九年六月修撰朱善以家屬不完謫教遼東未至賜還鄉十五年三月謫編修呉沉為臨洮府渭原縣學教諭未行復以為典籍十六年典籍呉伯宗降太常寺丞不拜又除國子司業又辭忤㫖貶金縣知縣正統中編修賴世隆坐事降浙江台州府經歴後召還已卒天順中修撰岳正謫廣東欽州同知未行復令編戍曹石譖之故也學士李賢亦外謫復留成化元年學士黄諫坐罪降廣州府通判二年侍讀學士錢溥坐罪降順徳知縣三年修撰羅倫以言大學士李賢奪情起復事忤㫖降福建泉州市舶司副提舉五年編修章懋黄仲昭檢討莊㫤同疏諫上元燈火不宜令詞臣應制賦詩上怒杖之調懋及仲昭為知縣㫤為判官未行用給事中毛𢎞言改懋及仲昭南京大理寺評事㫤南京行人司副未幾倫亦召還時人謂之翰林四諫十二年學士江朝宗坐事降廣東市舶司提舉正徳初修孝宗實録擠黜大半修㑹典者亦退降其陞職於是侍讀徐穆等調南京員外郎亦有降知縣者皆以擴充政務為名事出逆瑾非上意也㝷皆召復後編修王思直諫謫廣東三河驛丞上南廵修撰舒芬等以諫亦謫副提舉等官觀諸聖祖時降謫雖或不免而其牽復眷顧之恩與各衙門自不同矣優待儒臣夐出前代盖未嘗有一斥不復者此所以為文明之世也起用洪武元年起故元學士承㫖危素學士張以寧王時等至京師以素及時為侍講學士以寧為侍讀學士又起前起居注王禕為待制兼國史院編修官十六年驛召金縣知縣呉伯宗除檢討㝷拜武英殿大學士以薦舉失人出知三河縣復召還為檢討十七年上思用老成驛召前修撰朱善於家至則授待詔㝷拜文淵閣大學士三十一年起前河南左㕘議董倫至自雲南拜禮部左侍郎兼學士前山西右㕘政王景亦謫雲南召以為侍讀又起漢中府學教授方孝孺為侍講前御史解縉為待詔永樂二十二年八月仁宗起左春坊大學士兼侍讀學士黄淮於獄命為通政使兼武英殿大學士又起前司經局洗馬兼編修楊溥復其官㝷陞學士正統四年查夲院剩員檢討李紹等放歸田里期年驛召復任天順八年前修撰岳正自戍所召還未及用而上晏駕憲宗即位有詔仍原職吏部言當調南京有㫖其勿調命充經筵官成化二年閏三月復順徳知縣錢溥為侍讀學士致仕㝷起為南京禮部侍郎三年三月起用前學士商輅於内閣五年七月起前學士倪謙復職㝷進禮部右侍郎六年復市舶提舉羅倫為修撰𢎞治初侍講謝鐸編修張元禎起於謝病編修王勅起自外謫為四川提學僉事南京禮部員外郎羅璟起為福建提學副使十年五月侍讀學士致仕程敏政前左庶子張昇皆復官正徳五年逆瑾誅起南京兵部員外郎徐穆等為侍讀等官處州府同知張芮亦起為南京尚寳司卿㝷擢南京太常寺卿檢討劉瑞起自外謫為浙江提學副使十六年前修撰何瑭亦起自外謫為副使提學山西云起復國初隆重儒臣惟以孝徳故學士宋濓待制王禕皆當丁憂未嘗奪情起復其起復者扣算年月以為差葢以詔臣子之移孝為忠也惟永樂中始有制中起復之事六年夏學士楊榮居父喪給傳歸既葬遂命起復是年冬復居母喪奏歸守制時已下詔廵北京不許九年春奉命始奔喪遣中使䕶送榮還時洗馬楊溥侍春宫丁父憂詔奪情起復侍讀二十二年大學士黄淮丁母憂乞守制不許特命乘傳奔喪起復内閣視事洪熙元年大學士金幼孜亦丁母憂宣宗召修兩朝實録起為總裁官正統十四年八月修撰彭時居母憂忽校尉至門宣喚入朝傳郕王令㫖著時與商輅同陳循等辦事時具啓辭不允令奪情辦事内官促送入内閣乃去景泰七年少詹事劉鉉養母死朝廷欲奪情力求終制從之成化初大學士李賢遭喪去官詔留之臺諫不敢論說修撰羅倫詣其私第告以不可賢始以其言為然既數日倫上疏陳古今起復之非是且曰如其不然必凖富弼故事終喪劉珙故事言事卒不允七年四月有詔起復學士柯潛為祭酒具疏懇乞終制許之時内閣大學士劉吉罹艱起復侍講陳音勸使終制且與之書言當身綱常以先百僚吉終身衘之嗚呼昔嘗讀宋人起復陳升之為宰相之制也未嘗不掩卷而三嘆息焉其言曰閔子絰而服政先賢稱得事君之宜晉侯墨而即戎前志謂達變化之用嗚呼升之果如何人哉自羅倫之疏播傳於世此風稍革然正徳中尚有起復大學士楊廷和之命不果行云恩澤奏改㑹典云凡父兄伯叔任堂上官其弟男子姪有任科道者對品改調然未始改入翰林也天順元年右都御史耿九疇子裕方為給事中建言父子同在要地非宜遂改裕為檢討恩澤奏改始此九疇㝷坐事裕亦出為泗州判官正徳中吏部尚書許進援九疇例奏改其子户科給事中誥為檢討監察御史讚為編修後進為逆瑾所擠於是調誥全州判官讚臨江知縣添設洪武十六年十月增本院尚書博士二人秩從八品以儒士饒仲恭張庸為之令仲恭於潭王府說書庸於魯王府說書添設始此成化中改修撰羅倫為南京翰林院修撰倫養病而去二十三年修撰曾彦編修楊守阯同以秩滿有嗾之者俱陞南京侍讀食從五品俸𢎞治改元召還本院皆添設也然非初制矣乞外洪武六年編修孫作辭不拜乃乞外得太平府學教授七年編修張翀入對乞外命為南陽府學教授永樂中編修李貞為高州府學教授陳景著為福州府學教授貞以痼疾景著以養母俱乞外而景著得任原籍云原聖祖所以處之於風化之職者盖優之也其後作復起為司業翀復起為御史貞暨景著未久卒於任焉又其後檢討潘畿黄約仲欲致仕不可皆告除本縣教授以去英宗時始擇文學之臣出任憲司總學政正統元年修撰王鈺自致仕起用辭疾乞外任詔擢江西僉事提督學校未幾編修彭琉出為廣東提學僉事檢討陳璲出為廣西提學僉事康政亦出為四川提學僉事自是本院官乞外者後以為例成化中侍講焦芳編修敖山𢎞治中編修蘇葵檢討李遜學劉瑞正徳中編修余本檢討盛端明張邦竒皆然歴俸稍深則擢副使若葵則以事忤權貴而去者學士王鏊贈之詩有曰嚴生久厭承明直楊億俄成乞外書盖有所為而發給假在京官凡省親展墓歸娶及送子還鄉改塟先墓具有定制獨本院儒臣多出特恩宋濓事太祖壬寅年八月告歸省親有白金文綺之賜洪武初編修張藻仲歸娶詔給驛舟并賜寳鈔七年十月皇太子臨大本堂召東宫贊讀及諸王府侍讀凡二十五人立庭下諭之曰爾等離父母去墳墓者三年矣今冬氣向深草木搖落寧不惻然動懷土之情乎吾已為爾請於上宜各旋歸歸即遄至毋久淹為也因出内府錢分賜以為道塗費永樂元年七月侍講楊榮請告歸省詔馳驛徃還十月榮以妻喪復詔乘傳歸葬仁宗即位詔百官有親違離三年以上者聽給告歸省於是大學士金幼孜首奏歸省其母左春坊大學士王英亦乞歸省皆俾馳驛徃還賜賚甚厚宣宗初特詔翰林諸詞臣還鄉焚黄宣徳元年三月學士楊溥得告歸省其母於時不得見者十有八年矣十月大學士張瑛給假省父侍讀曾鶴齡告歸省亦俞允宣徳六年二月編修謝璉初考得貤封二親遂給假歸省正統初大學士楊士竒還鄉展墓甫數旬而還詔勞賚之於是侍讀林環侍講邢寛編修陳全江淵龔錡皆得請二年十二月右諭徳黎恬在任甫五年謁告歸展先墓賜道里費給驛舟修撰連景賢展墓亦如之三年六月學士李時勉以歴三年賜展墓五年二月少師楊士竒奉勅展墓寵錫便蕃前此未有也是年庶吉士雷復等亦歸省予告十二年四月學士馬愉以父病乞歸省詔許之賜以驛騎并藥餌費實異數云天順初洗馬兼修撰柯潛拜尚寳少卿兼職如故即告歸省得允修撰黄獻入仕僅五年亦得賜歸省皆給驛徃還成化元年南京禮部尚書倪謙致仕而南其子編修岳予告省親及謙疾再乞歸省因得終制二年大學士彭時乞歸省詔馳驛徃還太監許安致道里費長隨張敬䕶送抵家未踰月手勅促還朝明年二月至上慰勞之𢎞治中侍讀學士傅瀚在官二十四年矣上疏歸省許之學士張芮右諭徳蔣冕乞歸省母上皆許給傳焉編修謝丕授官踰年給假省親亦從其請正徳中編修孫紹祖修撰唐臯乞歸改葬先墓詔允之檢討張星給假送母南還亦從其請大率近侍衙門多沾恩賜而本院尤渥故予告之典亦多曠見者姑識所聞如此侍親皇朝以孝治天下侍養之典著在令甲其在近臣予告尤多洪武中太子贊善大夫和希文言於東朝曰小臣有母春秋之高八十有四矣無他兄弟以為養臣行年亦且六十雖有子僅四歲耳烏鳥私情其能已乎言訖澘然出涕東朝以其言聞於聖祖詔許歸養焉此後侍親者多見俞允不能悉記正統中則有檢討何瑄之屬皆終養起用𢎞治四年南京侍講學士張元禎以母老再謝病歸越五年召修㑹典遷學士充日講官兼侍東宫講讀數月以母憂去六年編修劉存業乞歸侍養以五年為期從之後存業起復先母而卒論者俱有遺憾迎養國初嘗令在京官員有親在者許迎養永樂中修撰羅汝敬之父以明就養京師朝上於奉天門見皇太子於文華殿特加問勞命大官賜膳人皆榮之黄淮之父性累封至右春坊大學士仁宗監國屢問安否嘗賜瓊玉膏一器天順中李賢之父昇封少保吏部尚書兼大學士以貤恩詣闕謝就養者數月及昇陛辭上特賜寳鏹三千貫因顧謂賢曰先生已盡天倫之樂乎賢頓首曰臣父子所以有今日者皆陛下之賜也迎養父母者尚多有之而其特䝉優賜惟三數公為然養疾國初乙巳年春三月起居注宋濓卧病京師之官舍不入侍者六日上顧問近臣曰老宋起居何久不見耶因言其致疾之時上憂形於色曰宋起居純飭之士不參以分毫人偽侍十五年猶一日也不知何以有斯疾乎越一日又問病勢稍損否對曰如初越二日又問復對如初上惻然曰爾徃傳命俾歸養金華山中父子祖孫驩然同聚疾必易愈愈且速造朝國家文翰庶有賴哉及宣上㫖濓力疾起拜命越翼日陛辭上勅黄門内使出大府金籍以束帛賜之自後候問之使相屬於道時方嚴肩輿之禁雖相國亦不之許特命造安車給健卒十六人以載此尤異數也又數日皇太子以舊學故復遣内臣存問賚以繒幣白金之屬又二日上道夏四月十七日始抵金華故居十八日具謝表一通進上并致書太子上謂太子曰此書汝當日誦一過復親御翰墨賜書褒答其文則上所自製字乃侍臣代書其外封九字内年月六字及花押封上之親筆也復出官局文綺白金各一命太子署名緘封遣使者即其家以賜六月七日也濓之自叙如此聖明之禮遇文儒可謂隆矣宣徳初大學士黄淮乞骸骨不許固請始令歸田養疾賜楮鏹萬貫陛辭加賜萬貫既歸遂乞致仕丁外艱賜祭塟以一品禮淮入謝賜逰西苑召淮之子采從行且特命乘肩輿登萬歲山賜宴於山之麓淮獻詩以謝上悅比辭宴餞於太液池親洒宸翰製詩送之給路費賜金織紗衣一襲且諭之曰明年朕生日卿其復來如期至上留之數月乃還又明年英宗即位淮入朝進香亦留月餘乃辭歸去正統元年編修楊珙養疾詔許之天順末禮部侍郎兼學士李紹為修實録副總裁書垂成沾㣲疾即上章求解任累不獲俞允成化二年八月上察其誠許暫歸候疾愈復來七年用洪武初起致仕尚書劉崧署司業例起為祭酒降勅召之未及門而紹卒矣三年編修張元禎謝病得允家居者二十年孝宗即位乃起為左贊善二十三年太子少保禮部尚書兼學士彭華始得風疾上命醫徃視遣中官賜羊酒蔬米越三月辭禄不許又三月詔令官賜麒麟服再辭辭益懇乃得俞㫖俾歸就醫藥疾已即來瀕行又賜金綺襲衣輿疾出都城過闕門匍匐稽顙因泣下沾臆而去𢎞治四年少詹事兼侍讀學士汪諧疾作在告三月上疏請停俸給不許毎時節珍味即賜於家憲廟實録成以副總裁陞禮部右侍郎明年復懇辭乃許之仍詔疾愈當復用十六年禮部右侍郎掌國子監事謝鐸以疾在告累疏乃許歸就醫命給驛以行令有司俟疾愈奏聞盖養疾得給驛者惟本院遂為制焉移疾在内臣工或以事移疾者祖宗以來未嘗沮盖順人情以為治也惟成化初編修陸簡之叔刑部主事愷卒於京邸簡移疾乞恩䕶其喪歸塟上特許之詞林皆高其誼辭職不拜洪武初故元温州路教授江寧陳遇隠居於寧以謀臣秦從龍薦召見上與語大悅即拜學士固辭不受命上不之强也其後徴聘之士膺館職不拜者多從其請國子學士蘇伯權擢國史編修官以聵辭歸已而學士承㫖宋濓致仕將還上命舉可自代者即以伯權應詔既至復固辭上憫其誠賜文綺賞之俾老焉天順中呉與弼辭左諭徳語在薦舉類皆高尚不事者也優老呉元年十一月詔以侍講學士朱升年老特免朝謁洪武二年以危素為侍講學士㝷兼𢎞文館學士賜小車免朝謁七年五月命學士承㫖兼吏部尚書詹同致仕六月復召以為學士承㫖罷所兼職務以優之又以學士宋濓老而艱於行步特詔皇太子選良馬以賜上親作馬歌令羣臣𢋫和示寵澤焉永樂中學士曾棨年踰六十老疾一日侍朝遄引退上見之輒免當日朝宣徳中上念先朝老臣尚書兼詹事蹇義大學士楊榮等四人皆春秋高並賜勅褒諭命輟職務朝夕左右侍論議賜玉帶及御製詩畫以見優寵正統時學士王直累遷至尚書年近八十以上特詔免朝謁學士王英亦累遷至禮部侍郎上章乞休者屢次十三年八月上特陞英為南京禮部尚書謝恩之日内傳㫖曰以卿久仕先朝多効勤勞進秩南京俾得安逸𢎞治十年少傅兼太子太傅吏部尚書謹身殿大學士徐溥年七十以疾在告疏上辭不許命醫診視遣中使賜羊酒楮幣仍令風雨及大寒暑免朝盖成周尊禮黄耉俾膳飲從於遊不啻如此致仕優禮洪武七年學士承㫖詹同既復任欲以年請老不敢言上知之八月甲辰詔致仕官其一子魯召同入賜坐從容慰勞之夜漏下十刻始勅内官扶掖而出乙巳親製文一篇以賜九年十二月學士承㫖宋濓致仕將行上曰卿去何時復來見朕乎幸相待數日姑徐徐行由是留者數月十年二月遂辭歸瀕行賜鈔幣文綺及御製文集皇太子贈以衣三襲上諭曰朕最慎於賞予嘉卿忠誠可貫金石故以是賜卿今年幾何矣曰六十有八上曰藏此綺三十二年後作百歲衣也濓叩首謝上復曰大江漲不可舟宜循内河達家庶幾無虞仍俾其孫中書舍人慎䕶行濓至家即拜表遣慎詣闕稱謝復上箋皇太子申明正心治國之要上賜詔褒答謂忠良之臣勲榮既著文章必傳功成身退惟卿得全耳濓辭時請歲一來朝是年九月朔遂入朝越十有四日見上於端門上佇想已久廷問屢矣及見大喜加勞再三皇太子諸王皆驩動顔色翌日上降勅特遣儀習奉醪膳諸物抵寓館以賜自是日侍上逰歴觀闕盤旋禁籞咨詢備至便殿侍食日晏始退恩禮之優羣臣莫敢望上嘗喟然歎曰純臣哉爾濓純臣哉爾濓方今四方皆知卿名卿其自愛濓避謝不敢當凡所諫論皆古之格言朝廷百官惟恐濓不見留寺人衛卒見濓亦皆以手加額推排迎拜留凡七旬餘以歲暮力辭還復選中貴人賜上尊至於道所經行皆上為之指畫既行數日上問其子璲曰爾父道中無恙否璲以安對未幾復謂璲曰朕疇昔之夜夢見爾父笑談如曩時爾父雖去其容儀儼然在朕目中也璲叩首謝曰非陛下垂念臣父之至何以形諸夢寐於是中書舍人史靖可太子正字桂彦良皆為詩歌以紀之八年正月修撰李叔兌以年老乞致仕從之七月待制王僎致仕賜以綺帛給舟車還鄉十年八月賜應奉陳傳還鄉御製詩文賜之十一年四月賜編修張美和致仕製文賜之有曰千載一遇古人之通言然全於始終者罕矣今卿善始善終不亦美乎八年七月賜待制王僎致仕十四年九月賜修撰趙楫致仕十五年十二月賜文華殿大學士兼左中允全思誠致仕並加優禮皆年老之致也十八年九月文淵閣大學士朱善遘危疾上命醫治月餘增劇遣其子逢掖詣闕上訴得告歸十九年二月左司直郎汪仲魯請老上期秋至乃俞其請三月朏上御奉天門召仲魯至賜坐顧曰若知所以見召乎起對曰不知日昨期秋方許爾歸已乃思之若年光隂有限矧喘嗽誠未易痊今即還鄉無庸再來矣所戒者近侍之歸郡邑官或來見當閉門謝之否則筆之於簡俾僮僕示之答曰仲魯幸䝉聖恩予告還鄉理宜杜門謝客輸租應役則有恒制矣其敢以是自速厥戾如是則可以考終矣仲魯叩首謝明日陛辭而還洪熙元年春國子祭酒兼侍講掌本院事胡儼以疾辭加授太子賔客致仕賜璽書褒美復其子孫詔給舟車賜楮幣為道里費未幾侍講余鼎修撰桂宗儒以疾陳乞致仕許之英宗復辟大學士高榖懇乞骸骨上憫其老特允所請賜白金楮幣織金襲衣給驛舟送歸其鄉賜勅褒之學士薛瑄入閣數月見將臣石亨等竊㺯威福歎曰君子見幾而作豈俟終日乎遂引疾乞致仕去成化十三年太子少保吏部尚書兼謹身殿大學士商輅以疾致仕詔陞少保兼職如故賜璽書金幣襲衣珤鏹給驛以歸孝宗即位少師兼大學士萬安等老當致仕上風之使退安居位自若勅遣中官解其牙牌乃去𢎞治十年少師兼大學士徐溥以目眚致仕上加優渥焉正徳初逆瑾用事少師兼大學士劉健少保兼大學士謝遷皆致仕而少傅兼大學士李東陽獨留其和遷登舟見寄詩有曰天外㝠鴻君得志池邊蹲鳳我何人盖自傷也東陽於是調和其間瑾誅後累加至少師食正一品俸致仕歲時賜鮮及頒上尊珍饌與任事時同郊祀慶成光禄猶致宴皆先是所未有者宥過本院刑名屬刑部山西清吏司及大理寺左寺紏覈過名則屬河南道御史然祖宗時禮待儒紳多見宥免洪武初有御史言學士陶安隱微之事者上曰朕素知安安豈有此且爾何由知之對曰聞之道路上曰御史但聽道路之言以毀譽人以此為盡職乎不聽已而本院官以失儀見呵太子正字桂彦良奏言當取其長而畧其短上曰不然吾因其長而後責其短以造其全耳九年十月壬午上御午門樓學士承㫖宋濓編修傅藻等奏事由左門入監察御史吉昌等劾之詔皆宥之他日濓又以事情見責上製其誥詞有曰使爾檢閱則有餘用之施行則甚有不足盖惜之也二十二年八月監察御史秦新奏劾諸司案牘稽遲者請速問之詔貸其罪以移文責報惟翰林院勿問二十五年閏十二月學士劉三吾自陳子婿户部尚書趙勉夫婦坐贓皆緣失教自當引退以勵亷恥遂免其官明年九月復職永樂中侍講曾棨起復扈從同邑有坐奸黨事連棨者人以為危太宗特原之曰朕惜爾才也所居西長安門外家人不戒火延及禁門止亦以棨故不問編修楊敬便道過家有司奏其冐支廪給擅使驛遞人夫上怒曰敬奉朕命奈何辱之詔不問水東日記云凡大班奏事有常規亦多所司預進事目惟正統戊辰狀元彭時謝恩以夜坐久誤入朝被劾上赦之國家之禮重儒臣如此曲宥私親永樂六年上北巡皇太子監國留左諭徳兼侍講楊士竒輔導明年其同母弟羅京以事當徙北京為民士竒顧其子尚幼而母墓無守之者乃以情白仁宗乞留京不徙且言京兄弟二人兄從戍逺方京復當徙困苦流離有足矜者辭意甚懇切監國憫之遂以京給士竒并開羅氏軍籍學士楊溥江陵産也國初江陵人有南徼之戍什伍連屬楊氏亦𨽻籍焉其地在瘴鄉徃戌者多不得生還追逮無虛歲溥母甚厭苦之溥乘間以聞上優詔復其家䘏典成憲凡學士大學士以一品兼者及贈一品者其殁也賜祭四壇若父母妻則一壇以侍郎兼學士贈尚書者賜祭二壇他官四品以下蕪有䘏典惟本院最為崇異洪武二十四年十月編修唐震卒於四川命禮部遣官徃祭之仍命還其喪於京師二十三年十月編修盧原質奔父喪詔賜驛舟楮幣遣歸辛巳年九月修撰王艮卒遣禮部左侍郎黄觀諭祭宣徳七年少詹事兼侍讀學士王英丁母憂上命禮部賜祭工部造墳遣中官阮童䕶之奔喪㝷奪哀還朝成化四年學士柯潛丁父憂有司請賜祭有㫖并與葬六年正月復丁母憂朝廷聞知遣官諭祭五品父母有䘏典自潛始也七年左庶子兼侍講徐溥丁父憂特遣官賜祭十三年溥以少詹事兼侍講學士丁母憂賜白金楮幣及葬祭二十年侍講學士李東陽丁父憂賜祭一壇正徳初學士張芮以宫恩加從四品俸丁母憂特賜葬祭翰林記卷五
