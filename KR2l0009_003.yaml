body:
  text: 翰林記卷三明黃佐撰薦舉聖祖之靖元亂也干戈未定即大召四方名儒隨所在館穀之使各以其所知薦戊戍十二月辟儒士范祖幹葉儀命為咨議己亥正月克婺州分置中書省召儒士許元胡翰十餘人皆㑹食省中日令二人進講經史敷陳治道及克處州又有薦青田劉基龍泉章溢麗水葉琛金華宋濓者即遣使以書幣徴之庚子三月至建康入見甚喜賜坐從容與論經史及咨以時事深見尊寵既而命有司即所居之西創禮賢館以處之始置儒臺校理以官儒臣時朱文忠守金華復薦王禕王天錫至皆用之尋建尚賓館以待薦舉至者丙午年置博士㕔設博士一人典籖十餘人以備顧問博士則許瑗許存仁典籖則劉秩鮑穎吳毅劉辰黃晳徐穎之屬侍從文學職實權輿於此及置翰林院則擢諸儒之最有文行者任焉洪武六年復大徴天下儒士浙江參政徐本首以桂彥良薦待詔闕下奏對稱㫖擢太子正字未幾浙江布政使安然等以懷逺縣教諭王景等薦既至命日直翰林隨班見賜燕西序七年學士宋濓侍上登武樓賜坐問及宿學之士濓以㑹稽郭傳對上索其文覽之稱善即日召見謹身殿稱㫖擢應奉翰林文字十年上聞金華儒士吳沉名侍臣復薦之十月召見稱㫖以為待制十三年五月典籍戴安薦儒士楊良卿王成季劉仲海鄒魯狂編修吳沉薦儒士吳慎明教授童冀典籍吳伯宗薦儒士宋季子皆降敕召之十五年復徴耆儒隱逸侍臣張寧以宛平儒士董倫薦召至以為太子贊善大夫賜冠帶是年置諫院官十月以耆儒劉靖為諫院左司諫兼左春坊左庶子關賢為右司諫兼右春坊右庶子趙肅為諫院左正言兼左春坊左諭德何顯周為右正言兼右春坊右諭德十七年七月下詔徴賢耆儒汪仲魯至自婺源司禮司引見上舉西伯戡黎篇命之講釋稱㫖授左春坊左司直郎又數日劉三吾至自茶陵入見上喜其莊重宏博甚禮重之即拜左春坊左贊善未幾擢本院學士十八年三月開進士科始定進士入翰林之制自此薦舉者乃不輕授云永樂初本院員少上命侍臣更薦引之於是首薦擢審理副楊士竒為編修繼擢儒士曽日章為侍讀助教鄒緝為侍讀改給事中金幼孜王洪桐城縣知縣胡儼為檢討應天訓導王汝玉蕪湖訓導張伯頴為五經博士皆異數也自後惟於進士及庶吉士內擢用宣德七年大學士楊士竒薦交址南靈州知州黎恬文學操行可任近侍遂拜右春坊右諭德恬既至不副輿論江西人在翰林者或咻之乃求歸其鄉自是薦舉進者益罕矣天順二年忠國公石亨大學士李賢交薦撫州處士吳與弼召以為左春坊左諭德固辭不拜成化十八年廣東布政使彭韶巡撫兩廣都御史朱英交薦新㑹舉人陳獻章既至吏部欲試之以疾辭自陳患病乞歸侍養詔授檢討待親終病愈仍來供職獻章即與弼門人也後纍被薦皆被詔不行二人者皆以理學鳴於時隱居求志天下髙之竊謂科目未足以盡天下之賢才矧巖居川觀抱道不售與就試有司而屢黜者豈無其人乎薦舉之典誠不可廢也進士銓注洪武初年本院官皆由薦舉進四年辛亥雖設進士科未有入翰林者十八年三月丙子以第一甲賜進士及第丁顯練安黃子澄為修撰第二甲賜進士出身馬京齊麟等為編修吳文等為檢討皆出簡用不由選法命下吏部惟銓注而已後遂為例二十一年策進士以第一人任亨泰為修撰第二人唐震第三人盧原質為編修著為令至今因之二十四年則許觀張顯宗吳言信二十七年則張信景清戴德彛三十年則陳䢿尹昌隆劉諤是年六月覆試則韓克忠王恕焦勝革除庚辰科遵洪武乙丑之例第一甲胡廣王艮李貫皆修撰第二甲吳溥楊子榮楊溥劉現皆編修永樂二年進士第一人曽棨擢修撰第二人周述第三人周孟簡仍皆編修則復遵戊辰之令也四年林環陳全劉素九年蕭時中苖衷黃晹十年馬鐸林志王鈺十三年陳循李貞陳景著十六年李騏劉江鄧珍十九年曽鶴齡劉矩裴綸二十二年邢寬梁禋孫曰恭宣德二年馬愈杜寧謝璉五年林震龔錡林文八年曹鼐趙恢鍾復正統元年周旋陳文劉定之四年施槃楊鼐倪謙七年劉儼吕原黃諫十年商輅周洪謨劉俊十三年彭時陳鑑嶽正景泰二年柯潛劉升王㒜五年孫賢徐溥徐轄天順元年黎淳徐瓊陳秉中四年王一䕫李永通鄭環八年彭教吳釴羅璟成化二年羅倫程敏政陸簡五年張升丁溥董越八年吳寬劉震李仁傑十一年謝遷劉戩王鏊十四年曽彥楊守址曽追十七年王華黃珣張天瑞二十年李旻白鉞王敕二十三年費宏劉春凃瑞𢎞治三年錢福劉存業靳貴六年毛澄徐穆羅欽順九年朱希周王瓚陳瀾十二年倫文叙豐熙劉龍十五年康海孫清李廷相十八年顧鼎臣董玘謝丕正德三年吕柟景暘戴大賔時大學士焦芳用事第二甲第一人焦黃中芳子也有中㫖以黃中及第三甲胡纘宗俱為檢討及黃中之敗也纘宗亦坐貶六年楊慎余本鄒守益九年唐臯黃初蔡昻十二年舒芬倫以訓崔桐十六年楊惟聰陸釴費懋中蓋自永樂以來進士得銓注者惟第一甲而二甲三甲必改庶吉士乃得銓注云庶吉士銓法庶吉士之選始自洪武十八年乙丑上以諸進士未更事欲優待之俾觀政於諸司俟諳練然後任之其在本院承敕監等近侍衙門者采書經庶常吉士之義俱改稱為庶吉士其在六部及諸司者則仍稱進士云是科本院庶吉士則陳淇等吏科則楊靖等戶科則郭資等禮科則徐旭等然其詳則不可考矣二十一年可考者惟解縉黃金華為中書吉士永樂二年因之本院庶吉士取數十人擇二十五人暨首甲三人俾進學內閣周忱自陳願與其列遂增忱二十九人命學士解縉領其事上親教之五年丁亥首擢王英王直為編修十年壬辰又擢羅汝敬余鼎彭汝器為編修余學䕫為檢討楊相劉欽章敞陳敬宗沈升李時勉段民倪維啓吾紳楊勉等俱刑部主事蓋上意欲作養積久因其成材次第擢用然急於進者或觖望焉故相等皆除刑部四年丙戌庶吉士陳孟潔曽春齡輩卒於京師或以教習已近十年為言上怒於是張叔頴等皆除府通判九年辛卯二甲庶吉士錢習禮陳璲黃壽生陳用劉永清等教習未久皆擢檢討十年壬辰庶吉士方復等擢除莫考十三年乙未庶吉士王翺擢大理寺左寺正宋琰鄭雍言髙榖張益俱中書舍人黃仲芳等授知縣惟曹義授編修許彬劉麟應連智授檢討十六年戊戌庶吉士周叙董璘習嘉言楊珙尹鳳岐陳詢俱授編修餘皆授諸司官有差十九年辛丑二十二年甲辰不可考宣德中合三科進士選入翰林為庶吉士者二十八人蕭鎡薩琦賴世隆吳節江淵徐圭林補授編修王玉王振姜洪李紹何瑄授檢討董鏞等授知縣是年猶有選入六科近侍諸衙門者正統元年丙辰庶吉士王鑑等十四人除擢莫考自是以後始定庶吉士止入翰林然四年七年十年進士皆不選至十三年戊辰始純選北方及蜀産者二甲萬安劉吉劉珝李泰授編修三甲邢讓李本授檢討尹旻等授給事中監察御史王恕授大理寺評事景泰二年二甲吳滙周輿戚瀾劉宣楊守陳王獻童緣授編修三甲張業江朝宗授檢討劉清等授給事中五年二甲丘濬彭華牛綸扈直授編修耿裕等授給事中三甲陳政等授御史天順四年二甲張元禎汪諧劉健授編修三甲周經鄭紀張頤授檢討八年二甲李東陽倪嶽焦芳陳音謝鐸授編修三甲傅瀚張泰吳希賢授檢討成化二年三甲林瀚章懋李傑黃仲昭宋應奎商良臣授編修三甲莊昶授檢討四年二甲費誾尹龍喬維翰王臣授編修十四年二甲梁儲張澯楊傑敖山劉中于材徐鵬鄧焲江瀾馬廷用授編修三甲劉機張芮楊廷和楊時暢武衛授檢討庶吉士之留官在翰林者至是盛矣二十三年二甲程楷蔣冕黃穆傅圭華巒吳儼羅玘蘇葵授編修三甲李遜學石珤毛紀授檢討𢎞治六年二甲顧清沈燾吳一鵬汪俊周玉黃瀾授編修三甲薛格授檢討九年二甲濮韶陳霽葉德賈詠授編修三甲汪偉王九思劉瑞授檢討十五年二甲魯鐸溫仁和李時滕霄畢濟川何瑭授編修三甲周禎盛端明授檢討十八年二甲崔銑嚴嵩湛若水陸深翟鑾徐縉授編修三甲段炅穆孔暉孫紹先易舒誥張邦竒授檢討正德三年二甲第四人劉仁宇之子也逆瑾傳中㫖併其上二名邵鋭黃芳及第三甲李志學韓守愚凡五人為庶吉士數月即拜鋭芳仁為編修瑾敗仁黜鋭芳皆坐纍左遷云六年二甲許成名劉棟張璧應良尹襄劉朴費宷張潮王思孫承恩劉泉林文俊孫紹祖授編修三甲金臯吳惠郭維藩王元正陳寰張衍慶邊寭授檢討十二年二甲汪佃余承勛黃易江暉劉世盛葉桂章葉式馬汝驥王三錫陳沂鄺灝授編修三甲張星蕭與成林時季方湯惟學授檢討二科庶吉士留用之多前此所未有也十六年二甲廖道南江汝璧童承叙黃佐王相王同祖王用賔授編修蓋自宣德以前兼授部屬中書等官正統間始有授科道者成化後不授中書正德辛未丁丑止授科道而無部屬辛巳乃復兼授焉祖宗時最重是選雖二甲第一人及禮部第一人或選而不預或預而不留其嚴如此丘濬嘗謂每科不必多選所選不過二十人每選不必多留所留不過三五輩其言誠是也然必有通融之術而後可以免遺材之嘆文皇帝之久於教習也蓋欲盡使之積學以待問蓄德以充位而後己未嘗遽出之前輩謂翰林官惟首甲即除授選為庶吉士者逺則八九年近則四五年而後除授有不堪者乃改授他職世以職清務閒稱翰林為玉堂仙好事者因稱一甲三人為天上生仙餘為半路修行亦切喻也觀此可見今公署教習不過三年即評品而去留之使有晚成者出乎其間曷由進哉竊謂當體文皇帝之意該授科道部屬等官有志進學者許自陳願就近侍他職如高榖輩授中書舍人之例榖後以學行獨優升司直郎遂入翰林為侍講宜著為令庶使華國之儒不至有遺而祖宗之制因可復也纂修擢用洪武六年十二月以儒士朱右趙塤朱濓孫作為編修以纂日厯故也作辭不拜明年五月日厯始成云纂修擢用蓋自此始洪武末年充修史官者有教諭等官王景高讓具勤趙友士端孝思張秉彛唐耕葉惠仲胡仲昭等景即拜侍讀餘各除主事及王府官永樂初修高廟實録成以太常寺博士錢仲益知縣楊覯梁潛王褒為修撰國子助教王達給事中朱紘為編修行人蔣驥為檢討國子博士金玉鉉為五經博士晉府伴讀蘇伯厚為侍書教諭解榮劉宗平為待詔謄録生員金實為典籍亦有京職擢為外任及止改本職者皆上所裁故也逮重修高廟實録及修四書五經性理大全永樂大典等書成主事李時勉陳敬宗等擢侍講等官有差其後纂修擢用者主事劉球陳叔剛改侍講御史邵宏譽改編修然或不擢入翰林者亦多自是纂修專用本院官此例遂廢擢用孝德洪武二十六年八月上聞浦江鄭氏纍世同居家範惟篤倫理里人王氏效之思選用之以風勵天下乃徴二家子弟年三十以上者詣闕既至令自推舉乃以鄭濟為左春坊左庶子王勤為右春坊右庶子徐州民權謹十歲喪父哀毁幾絶洪武中以薦知樂安縣進光祿寺署丞迎母就養母疾籲天求以身代母年九十卒負土成墳廬墓三年哭泣不輟事聞召拜文華殿大學士洪熙元年三月也謹固辭不稱朝廷不允欲以風勵天下之為人子者尋改通政司右參議致仕仍旌其門曰孝行云詩有之曰有馮有翼有孝有德以引以翼祖宗之用賢蓋本乎此後之官近侍者動以文墨自矜炫或罔修於家庭獨何心哉擢用直諫洪武十五年二月以福建儒士沈士榮為待詔士榮抗疏言天下事謂當修德省刑且請給筆札條列事宜或入侍左右劇論庶事上以其鯁直賜手詔褒諭之故有是命十六年十月秀才周煥奎高孟文入見召對時事剴切上大喜皆擢為檢討二十六年十一月天下學職入覲者咸命侍朝或試文辭詢問經史及民間政事得失在列者多應對不稱㫖獨秦州訓導門克新敷奏亮直擢左贊善紹興府學教授王俊華以善文辭擢右贊善召二人謂之曰吾所以左克新而右俊華者重直言故也皆悚然悅服他日侍臣李思迪馬懿顧問默默則黜之嗟乎聖祖之詒謀逺矣擢用耆俊太祖嘗曰古之老者雖不任以政至於詢咨謀謨則老者閲歷多而聞見廣達於人情有可資者故洪武中多擢老成之士官以本院及為東駕輔導時耆儒劉靖關賢為庶子趙肅何顯為諭德世擬諸四皓學士劉三吾文淵閣大學士朱善左司直郎汪仲魯皆年踰六十時承顧問翊贊東宫趨朝則同班賜坐則聯席衣冠儼雅修潔人望而敬之時稱翰林三老洪武十九年七月詔舉經明行修練達時務之士年七十以下者郡縣禮送京師上曰比來有司不體朕意士有耆年便置不問豈知老成古人所重文王用吕尚而興穆公不聽蹇叔而敗伏生雖老猶足傳經豈可槩以耄而棄之也若年六十以上七十以下者當置翰林以備顧問太祖之詒燕如此故百餘年來任用老成臻於至治有非前代可及者徴聘隱逸處士吳與弼之見薦也天順元年十月上遣行人曹隆賫詔起之敕有曰渴望來儀以資啓沃二年五月壬寅至京師上詔大學士李賢問曰與弼授以諭德何如對曰可然諭德有左右上曰與之左遂授左春坊左諭德與弼上疏固辭上召入文華殿從容顧問尋遣使賜紗羅羊酒柴米有㫖朝廷久聞高誼特用徴聘今惠然逺來朕甚嘉悅然幣以將誠官以命德禮非過也不允所辭或勸就職與弼曰淺陋之學衰病之軀豈堪任使敢竊祿哉再疏辭有㫖固知本心不干祿仕亦不煩以冗務特處以宫僚之職不必再辭戊申大學士李賢請㫖召入內閣講中庸己酉二疏辭且請閲中祕書有㫖固辭雖得難進之義揆之中道無乃過乎欲觀祕書可勉就職丙辰令其子􅛁赴吏部告疾七月庚寅四疏終辭奉㫖既年老有病不能供職准辭丙申進封事十策一曰崇聖志二曰廣聖學三曰隆聖德四曰子庶民五曰謹教令六曰敦教化七曰清百僚八曰齊庶政九曰廣言路十曰君相一德同心己未召入文華殿上眷注無已丁寧纂修書籍賚以銀幣給以月廪復遣行人王惟善送歸仍賜詔褒嘉示以拳拳至意與弼既辭上令中官傳㫖敕惟善曰天氣近寒吳與弼年老一路好生看顧莫教他費力聖主褒賢之盛節大臣推賢之盛舉於是乎至矣録用聖賢後裔洪武六年四月孔子五十五世孫孔克表以學行舉入見上與語經史皆稱㫖拜修撰兼國史編修官永樂以後纍舉象賢世祿之典顔子孟子周子程子朱子後裔擇宗子以聞皆授世襲五經博士惟居鄉給俸以奉祭祀而已景泰時誠意伯劉基後裔亦援此例得世襲五經博士𢎞治中孔子嫡派在浙江衢州者有司以宗子孔彥繩奏聞詔授世襲五經博士尋改劉基之後為指揮於是崇道酬勳之意始昭然矣任子洪武九年六月上謂學士承㫖宋濓曰朕以布衣為天子卿亦起草萊列侍從為開國文臣之首俾世世與國同休戚不亦美乎趣令取子孫官之屢辭謝不敢有詔不允遂徴冡子瓚之子慎為殿廷儀禮司序班未幾復召仲子璲除中書舍人上時政暇輒命題試璲與慎而戒敕之上笑與濓曰朕為卿教子孫濓或奏事久稱倦上命璲慎共扶下殿父子祖孫三世皆官內庭當世以為異事後復録濓之孫懌為本院侍書云永樂中學士胡廣卒詔以其子穜為檢討纍選至修撰洪熙時尚書兼詹事金忠之子達擢檢討以乏文學賜歸依親讀書正統末改給事中尚書王直之子䆅亦蔭檢討大學士楊士竒楊榮則皆蔭尚寶丞及中書舍人自是遂為定制無任翰林者孝宗眷注大學士丘濬輩官其後多至三四人皆出聖意然或有援以陳乞者矣獨宣德中大學士金幼孜疾革士竒榮問之惟言受國家恩重上無益朝廷下無益生民復何言傍或啓之請身後之澤者則正色曰為子弟求祿君子所恥此其最可稱者也改擢本院官祖宗時不輕改擢學士官雖五品序秩於尚書之上洪武三年七月丙申以太常寺卿魏觀為侍讀學士六年四月丙辰以兵部尚書樂韶鳳為侍講學士吏部尚書詹同為學士承㫖仍兼吏部尚書八年三月以廣西按察司僉事答祿與權為修撰十三年五月癸丑以山西右布政趙新為修撰十五年十一月戊午以禮部尚書邵質為華蓋殿大學士十六年十月以僉都御史茹太素為檢討瓊州府知府趙瑁為諭德三十四年九月以左僉都御史凌漢為左贊善蓋本院自革承㫖之後為五品衙門在外庶寮以學行著聞而超擢者品秩大都由尊改卑蓋崇儒右文之體當如是也永樂初進太祖實録列纂修官職名猶先學士王景而後及禮部尚書李至剛其尊重可知曾棨以狀元及第事太宗將二十年始得侍講學士上顧左右謂曰曾棨與學士矣意猶謂其得之早也然則庶寮之改擢詎可輕哉是時燕邸左長史金忠不得厠名翰林惟拜工部右侍郎宣宗雖擢陳山張瑛入翰林以嘗為詹事府舊寮之故也未久即斥去景帝興自郕邸其左長史儀銘亦官止禮部左侍郎未有遽擢為學士者其後一日拜六學士時人以為名器之濫兵部尚書陳汝言謂人曰昔十八學士登瀛州今六學士同登何謂多邪此景帝之治所以不終也竊謂慎重名器當自本院始葉盛所著水東日記蓋備紀之兼職本院官始惟與詹事府左右春坊司經局互兼職事洪武中未設編修時多以修撰兼國史編修官其後以修撰任亨泰為詹事府少詹事兼修撰則東宫官兼本院官之始也文華殿大學士全思誠兼左春坊左中允則學士兼宫寮之始也凡宫寮必俟儲位既正而後設然必互兼無有專任者仁宗御東駕始以尚書蹇義金忠兼詹事府詹事尚書李至剛兼左春坊大學士學士解縉兼右春坊大學士以至侍讀楊士竒等兼中允皆本太祖設官之意也洪熙以後始有三孤及太子三師三少六部尚書侍郎通政司太常寺卿少卿尚寶司卿兼本院官者正統以後始有都御史大理寺卿通政司參議兼本院與殿閣官者若詹事府詹事或不設而以尚書兼學士掌之左右論德及司經洗馬或兼講讀或兼修撰編修或兼校書等官惟上所命而已成化以後內閣止用吏戶禮三部兼職若左諭德則兼侍讀右諭德則兼侍講之類一定而不易則自𢎞治時始正德中詹事府左右春坊司經局等官通無一員百餘年來所未有也坊局諸印皆寄之本院本院學士又缺有一人帶管二印者蓋逆瑾與奸芳主之大學士李東陽嘗曰旁觀坐視不能救正咎有所歸正指此也然則東駕宫寮固不可缺然必用本院官兼之而後不失祖宗之制翰林記卷三
