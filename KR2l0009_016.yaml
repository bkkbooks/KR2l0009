body:
  text: 翰林記卷十六明黄佐撰車駕幸館閣太宗皇帝初定内難四方之事方殷内閣七人者旦夕承顧問受㫖退治職務且兼稽古纂述殆不虚寸晷上時步至閣中親閱其勞且視其所治無弗稱㫖者乃喜必有厚賚或時至閣閱諸學士暨庶吉士應制詩文詰問評論以為樂宣徳四年十月癸未車駕臨幸文淵閣周視大學士楊榮等寓直之所命増益屋宇兼賜飲饌器用榮等次日具表謝恩已而復至賜榮等詩各一章及寳鈔酒饌學士李時勉等皆與焉七年某月駕過史館有作併賦招隠之歌是時天氣清明聖心恱豫懷賢覽古天趣之髙見於吟詠侍讀學士錢習禮等迎謁俱被賜賚其過史館六言詩云蕩蕩堯光四表巍巍舜徳重華祖考萬年垂統乾坤六合為家真聖王氣象也車駕幸私第洪武初編修羅復仁者上喜其誠樸車駕一日忽幸其私第復仁方操塗具完壁不虞上之至也呼妻以凳坐上上與語良乆嘆息而去即命工部賜第城南門外尋以為𢎞文館學士及乞致仕從之賜以大布之衣謂曰表爾樸也宣徳中上微行幸大學士楊士竒私第語在第八卷賜讌洪武中學士詹同宋濓等暨諸儒臣每燕見必賜燕日以為常永樂初萬夀聖節學士侍讌奉天殿近侍及修史官宴中左門若正旦元宵端午重陽冬至臘日等節序徃徃燕于禁庭皇后皇太子千秋節亦如之若御三殿筵宴奏事於内閣學士尤隆至或有撤御筵玉食以遺其父母者十八年閏正月丙子命行在學士兼右庶子楊榮學士兼右諭徳金㓜孜並為文淵閣大學士兼學士特賜讌于禮部此陛擢賜讌之始也二十年九月己巳以榮與㓜孜扈從之勞特命讌坐前列食上殽此賞勞賜讌之始也宣徳二年九月少傅楊士竒三載考滿降勅奬諭賜宴于禮部此考滿賜宴之始也五年四月丙申召大學士楊士竒楊榮等賜燕文華殿上親待焉賜鈔一萬貫六年二月甲辰萬夀聖節賜士竒榮等宴乙巳復賜宴内庭特賜詩一章褒嘉之此又出於特恩者也八年七月丁丑吏部奏少傅楊榮滿三載上禮之如士竒自後内閣大臣考滿遂為例正統以後萬夀聖節皇太后千秋等節及節序本院官同羣臣通宴于午門外而燕見奏事特恩賜燕者遂無聞焉若初開經筵及脩書進呈殿㑹試等燕俱有定規脩實録成例宴于禮部獨水樂初宴于奉天門宣徳五年宴于中府正統三年宴于西苑為不同云賜飲饌洪武三年二月學士宋濓待制兼編修王禕等奉詔預教大本堂每召對殿廷必賜坐久則賜飲膳禕一日在史局渴甚謂濓曰得昨上所賜梨漿飲之吾渇濟矣中貴人竊聞之言于上即命齎賜之永樂五年五月學士楊榮奉命徃甘肅規畫軍務七月還京奏對武英殿上大悅時盛暑命取𤓰親剖賜之且遣中官賜以羊酒勑使休息十一年十二月學士宋濓既致仕來朝以勑勞之賜米酒十二年十二月復至賜亦如之十八年四月丙辰上在西内圓殿特召都督薛禄尚書吕震李慶學士楊榮金㓜孜至殿外命坐賜食其羮糜葢出於御前調和珍異非常且復有上尊熟食酪漿櫻桃之賜所賜上尊封識皆有墨印洞庭春色四字復用朱印篆書御用二字以葢其上葢是時上嚮用勲戚侍從之臣多所頒賚上尊珍饌無日不有此特其可紀者也宣宗初即位召侍講學士王英入便殿謂曰洪武中學士有宋濓吴沈朱善劉三吾永樂初則解縉胡廣俱有重名今汝當講經史陳道義以啓沃朕心罔俾前人獨專其美賜内醖及鈔千緡命入内閣叅中秘自是英與曽棨王直等屢被御酒珍饌之賜宣徳二年十一月乙未皇太子生大學士楊榮入見上親酌酒賜榮飲仍賜白金鈔幣鈒金器十二月召榮等至東苑訪政務賜酒饌銀鑲椰桮二年二月辛酉賜同逰萬嵗山諸臣椰子各一枚七月辛酉遊内苑賜以金銀綵幣玉杯酒饌等物葢自是同遊禁苑所至必有飲饌之賜殆不可盡紀四年八月賜楊榮等枸杞湯令中官吴誠諭㫖曰服此可以延年益夀可以祛諸疾正統以後莫考惟丁巳臘月望後大雪三日聖情悅懌賜大學士楊溥等黄封内珍成化中憲宗一日於内庫得古帖㫁爛不可讀命中使持至内館使理之適檢討傅瀚在直次為韻語須臾而成授中使以復上大悅有珍饌法酒之賜賜冠帯衣服器用洪武十四年三月賜本院官羅衣各一襲尋以儒士董倫為右贊善賜以冠帯又賜侍書楊崧等襲衣靴韈二十三年以四川永川縣知縣王佐為侍讀賜衣及靴韈是年髙麗貢玳瑁筆分賜學士劉三吾侍講學士葛均等二十九年六月癸夘以編修張顯宗為太常寺丞左僉都御史辛彦徳為詹事各賜衣一襲三十年賜學士宋訥衣㡌壬午六月賜内閣七人金織羅衣永樂二年九月上召内閣七人謂曰朕即位以來爾朝夕在左右敬慎弗懈然恒情保初易保終難朕常思保全之道爾亦宜益謹厥終庶兩盡其美皆曰臣等猥䝉委任敢不勉圖報稱上大悅賜象笏幞頭公服尋賜二品金織紵絲衣七人者入謝直言恩禮太過上曰卿在朕左右幾務所屬贊翊之功不在尚書下故特賜二品服以示旌異豈為過哉三年自正月至于九月時召七人者評議諸司事宜稱㫖賜二品金織紗羅衣自是勞賞出使扈從多賜襲衣有差十八年復賜榮等二品金織襲衣靴韈是冬連賜士竒榮等織金紵絲表裏鈔米柴炭等物其後多密加賞賚他人弗與焉十九年四月辛丑賜榮銀酒鍾古銅器各一鈔千錠酧其䕶救圖籍之勞也事見第十二卷宣徳初内閣學士楊士竒楊榮等被賜玉帯瑪瑙鶴頂龜筒琥珀花犀合香諸帯及龍骨等繋腰皮裘黒貂銀䑕㡌少詹事兼侍讀學士曽棨王直賜寳帯少詹事兼侍讀學士王英賜金鑲琥珀麒麟帯各有差或有五品賜金帯者七年十一月丙寅皇太子千秋節賜内閣綵繡麒麟襲衣十年十一月丁丑以聖節賜内閣綵繡雲鶴襲衣寳帯本院官各有差自是以為常正統初賜大學士楊士竒金織紗羅襲衣金鑲玳瑁等帯大婚禮成賜學士錢習禮等紗衣紗㡌金鑲香帯有差二年六月己巳賜内閣錦繡雲鶴紗衣十一月辛巳賜金織紵絲襲衣天順中賜大學士李賢陳文等玉帯通政司叅議兼學士吕原等金帯暨玉杯梭服貂㡌之賚嵗無虚月成化中學士王獻掌院事賜金帯侍讀學士彭華攝詹事府事亦賜金帯故事學士非典宻務侍日請者不與是賜葢異數也正徳四年吏部左侍郎兼學士白鉞賜玉帯尤前此所未有者賜鈔幣羊酒聖祖最慎於賞必有功勞者乃賚以鈔幣之屬惟文學近侍多有匪頒洪武初學士宋濓等恒受是賜十六年正月以右贊善董倫為左春坊大學士賜文綺六疋鈔五十錠十七年三月賜學士宋訥文綺帛各二疋鈔十錠尋又賜訥子安鈔十錠二十九年三月賜本院官人各髙麗布一疋永樂初内閣解縉等七人者嘗拜鈔帛之賜六年正月賜綵幣白金鈔米七年七月楊榮議事歸自甘肅賜米鈔十一月復還自甘州復命陳邊境便宜十事上嘉納之賜以襲衣鈔幣宣徳元年以後大學士楊士竒等議事稱㫖屢賜白金文綺鈔幣四年九月甲辰朔賜内閣白金珍珠鈔幣白磁器蘇合香丸等物十二月朔霜寒甚上命光禄賜在廷文臣侍讀學士錢習禮等羊酒以禦寒曰皇祖考在位每旦常有賜今朕多事忘之汝勿忘辛巳賜内閣白金鈔幣羊酒等物四年七月大學士曽棨顧問稱㫖屢賜白金文綺鈔幣使直文淵閣五年正月賜内閣大學士人各鈔一萬貫并猪羊海魚等物四月丁巳皇太后千秋節賜内閣大學士人各鈔三貫正統元年三月賜讀卷官羊酒遂以為常其後惟内閣考滿賞勞問疾給假遣中官以鈔幣羊酒賚之而五年二月丙戌楊榮以展墓行賜白金紵絲鈔幣及上尊羊豕諸饌稱是且命内侍阮江伴行最為盛典賜藥餌洪武中編修王釐患頭風上賜所御藥酒飲之而愈壬午六月太宗賜解縉等七人香藥永樂四年二月諭徳楊榮得寒疾不能造朝上聞之亟遣中官偕御醫蔣用文視之還奏賜藥物且命用文守視時時奏報至痊乃已及榮入謝上慰賚之仍令休息旬餘乃出學士黄淮留守以疾在告仁宗為太子亦遣中官偕用文賫藥視之手書畧曰卿其勉進藥食蚤獲安康以慰予懷侍讀學士王直侍上東宫嘗賜扇及藥正統九年二月楊士竒疾賜醫藥寳鈔酒饌及璽書慰之成化初大學士李賢疾上遣中官偕醫賜藥餌所以問慰之者甚厚五年至十一年大學士彭時累以病在告上輙命醫視疾遣内臣致猪羊鷄鵝酒米之賜并賚以藥餌踰月不出則必再遣焉𢎞治五年五月大學士丘濬以目疾辭位上遣醫賜藥詔今後凡大風雨雪俱免早朝七年十月又辭詔痊可之日免朝叅進來辦事使就醫藥其後大學士謝遷等稍有疾輙遣醫饋藥候問之使相踵於道賜居第太祖太宗時甞賚近侍以居第如羅復仁輩見前卷宣徳中楊溥有賜第在東安門外天順元年冬賜大學士李賢甲第一區賢上章懇辭上曰聞卿舊宅去朝頗逺特賜近居以便宣召所辭不允遷居之後上及皇太子皆有落成之賚按洪熈元年二月賜楊士竒田二頃懇辭許之則是先朝厚賚非特居第而已賜宸翰吴元年上聞侍講學士朱升家構書樓成御書梅花初月樓五大字以寵之而宋濓等甞拜宸翰之賜尤多洪武三十一年七月御書怡老堂三大字賜禮部侍郎兼學士董倫并髹几玉鳩杖各一倫具表謝恩宣徳初上甞親御翰墨作春山竹石牧牛三圖題詩其上以賜大學士楊榮并賜端硯御用筆墨及白磁酒器茶鍾瓦罐香爐之類侍讀沈粲甞獲賜御筆竹菊圖則是時近侍霑賜者不止一二人也賜御製詩文洪武六年五月戊辰上御武樓學士承㫖詹同備顧問因及於竹同謂晉戴凱之所譜至五十餘種惟吴越山中有方竹可為笻若有㢘隅不可犯之色因以一枝進於是親御翰墨草方竹記一通始言品物之夥中序格致之難及其末也謂同為人俊偉氣象且以豪俊稱之同趨拜稱謝上笑曰卿頭童齒豁矣何以謝學士宋濓嘗獲賜醉學士楚辭一章黄馬白馬等歌而本院官與賜者如張美和輩尤不可盡記畧見前卷仁宗在東宫喜為詩文贊善王汝玉徐善述梁潛等多被賜宣徳初内閣大學士楊士竒等恒賜詩章七年七月屢賜御製祖徳詩招隱歌猗蘭操九年七月南京禮部尚書張英迎復入見上特書製詩詞并緡錢二千緡賜之英退陳於堂語人曰此吾稽古之力也大學士楊士竒黄淮等被賜尢多其後列聖多用故事製詩章以寵詞臣正徳初賜御製寫懷等詩及蟠龍諸詩然未敢必其果出於宸衷也今載祖宗御製數章於此直所謂昭回之光下飾萬物者用以侈詞林之榮云洪武八年七日午時書賜醉贊善大夫宋濓西風颯颯兮金張特㑹儒臣兮舉觴目蒼栁兮裊嫋閲澄江兮水洋洋為斯悅而再酌弄清波兮流光玉海盈而馨透泛瓊斚兮銀漿宋生㣲飲兮蚤醉忽周旋兮步趨蹌蹌美秋景兮共樂但有益於彼兮何傷永樂中冬至仁宗時監國賜贊善徐好古清朝盛文治輔徳資儒耆念彼筋力倦趨朝諒非宜賦詩有佳致納誨多良規起予得深趣歡懷浩無涯新陽屇初復况此承平時酧勞見樽酒庶以勞期頥宣徳五年御製贈大學士致仕黄淮歸永嘉天香蚤折仙桂枝筆花五綵開鳯池蓬萊芝山直奎壁近侍九重天咫尺永樂聖人臨御初鞠躬稽首陳嘉謨仁皇監國文華殿左右謀猷共羣彦朕承大寳君萬方相與共理資賢良傾心寫情任舊老而卿引疾先還鄉五歴星霜復相見霜鬢蕭蕭秋滿面是時朝旭光升紫殿明相對清言良慰情留之累月未盡意歸心又欲東南行太液清泠涵碧藻楊栁芙蓉相映好鳬鷖鸂鶒弄澄波紫霧紅雲拂瓊島芳殽在俎酒在壺工歌鹿鳴續白駒君臣大義士所重心須廷闕身江湖鴈蕩峯髙青不極中有謝公舊遊迹採芝斸苓可長年應在天南憶天北九年十一月甲戌朔御製詩歌賜大學士楊榮武夷巍峩青插天建溪碧水相連延扶輿旁礴之所産徃昔奮起多名賢只今繼續揚華芬漢清白吏有逺孫明經䇿第登詞垣皇祖承天御天下竭職論思靡餘暇懷忠秉誠履堅貞臨事果達智識明禁中頗牧材卓犖風雲驥足千里輕顧予菲徳嗣天位旰食宵衣急圖治普天之下率土之濱安危休戚繋于一人大厦之興藉梁柱為邦必資輔弼臣卿事文祖兼仁考歴年固多身未老方茲倚重傅與保士有大抱負堯舜其君民朂哉弼違補闕輔吾仁齊芳昔賢耀千春賜門帖吳元年陶安為學士凡國家制度禮文之事多所擬定御製門帖賜之曰國朝謀畧無雙士翰苑文章第一家賜圖書永樂二十二年九月仁宗命範白金為圖書四枚其文曰繩愆糾繆以賜師傅五人尚書兼詹事蹇義尚書夏原吉大學士楊士竒楊榮金幼孜也而榮與幼孜同受其一上諭之曰朕有過舉卿即具疏用此封識進來葢責望臣輔之切如此士竒連上五章皆見嘉納洪熈元年四月有進言太平之政者上召義等以其章示之且謂曰去年各與繩愆糾繆圖書蹇三人皆無一言豈朝政果皆無闕生民果皆安乎三人皆頓首有慙色既退復召義諭曰爾與士竒吾監國舊輔事有未當皆須直言勿有疑諱後又朝退召義與士竒至奉天殿出二􅎁二印賜二人義得忠貞印士竒得貞一印諭曰使後世知吾三人同心一誠也􅎁皆加奬二人皆拜受而退宣徳二年二月上御文華殿召大學士楊榮賜以鍍金銀圖書五曰方直剛正曰忠孝流芳曰闗西後裔曰建安楊榮曰楊氏勉仁而楊士竒所得者曰清方貞靖云賜書籍翰墨洪武八年三月上御乾清宫召學士宋濓問前御史中丞劉基行期在何日葢基時告歸故也因扣其詳步出宫門濓從後至丹墀上忽顧内使張淵曰汝徃取新刋文集一部賜濓濓叩頭謝訖淵引至典禮紀察司與司副李彬言記濓氏名于籍始頒授焉時受賜者惟太師李善長右丞相胡惟庸及濓三人而已永樂十三年七月學士楊士竒等侍文華殿上出趙孟頫所書滕王閣序賜之其後列聖每刋刻書籍成必頒於大臣惟景泰二年賜修撰柯潛五倫書及五經四書成化二年十月賜本院官人各貞觀政要一部為異數餘不能悉計然記聖祖賜宋濓事獨詳者以見國初君臣相與之情藹然無間如此也賜遊觀永樂七年三月車駕至京命學士胡廣諭徳楊榮金幼孜修撰王英等從遊萬嵗山榮以母憂辭弗與特召之行皆賜賚之宣徳三年十二月大學士楊榮等扈駕兩遊南海子賜羊酒及鈔八年四月二十六日上以時清氣和特命勲舊輔導文學之臣遊西苑翰林惟少傅楊士竒楊榮少詹事王英王直侍讀學士李時勉錢習禮時少保黄淮來自退休與焉自成國公朱勇而下凢十五人敕中官導自西安門入聽乘輿馬及太液池而步遂得同覽竒勝首至新構圓殿殿臨太液池池之中多嘉魚殿之左右多名花東去數十步又有嘉菜竒果上每躬自採摘以奉聖母皇太后甘㫖繼至清暑殿此亦奉聖母遊覽之所規制宏敞巧妙天然花木森鬱實非世間所有既而登萬嵗山池水環之如璧磴道逶迤竒石森列千形萬狀莫可備述山之中有三殿正曰仁智左曰介福右曰延和稍上則有玉虹金露方壺瀛洲四亭而廣寒殿在其頂瑶臺玉砌畫棟雕甍蒼松翠栢盤鬱垂䕃恍然如在蓬萊仙境也良久退坐山下勑賜内庖酒饌皆珍竒之品莫不醉飽而歸榮記其詳如此學士楊溥嘗得賜觀九龍池其詳莫考可齋雜記云天順己夘四月六日有㫖賜諸大臣遊西苑命中貴人引大學士李賢吏部尚書王翺與時等數人徃苑在宫垣西中有太液池周十餘里池中架橋梁以通徃來橋東為圓臺臺上為圓殿殿前有古松數株其北即萬嵗山山皆太湖石堆成上有殿亭六七所最髙處乃廣寒殿也池西南又有一山如之最髙處為鏡殿此皆金元時所造其餘殿亭皆今制而西稍南曰南臺則宣廟常幸處也是日賜宴於此皆霑醉而歸或有醉失儀者而學士李紹執禮逾恭時與賢皆記其事明年如之又明年亦如之又云是年七月賜尚書王翺馬昂并内閣學士三人遊南城中有宫殿樓閣十餘所此宣廟與上遊幸處也是秋新作行殿一所東為蒼龍門南為丹鳯門中為龍徳殿左右曰崇仁廣智殿之北有橋橋皆白石雕水族於其上南北有飛虹戴鰲二牌樓東西有天光雲影二亭又北疊石為山曰秀巖山上有圓殿曰乾運其東西二亭曰凌雲御風山後為佳麗門又後為永明殿最後為圓亭引流水繞之曰環碧移植花木青翠蔚然如夙成者既畢工乃命時與學士李賢吕原徃觀焉受命頒行者太監裴當也宴畢乃回南城即東苑見前卷賜觀燈永樂十八年正月甲寅元宵節上御午門觀燈賜百官宴并示御製詩學士胡廣楊榮等奉和以進上覽而悅之賜以羊酒鈔幣自是車駕駐兩京皆賜觀燈于午門以為例宣徳三年正月戊戌元宵節賜文武大臣觀燈於萬嵗山命中官侍宴學士楊榮進元宵賦賞鈔三千貫侍讀錢習禮等賦詩以進咸賜鈔有差五年正月丙辰元旦大學士楊士竒等奉命觀燈於萬嵗山賜宴各以詩進賞鈔各六千錠七年正月乙亥元宵節賜觀燈於内苑仍賜内閣白金綵幣遣中官送于其第葢自宣宗即位以來凡遇時節必賜侍臣以詩章及内醖珍羞果而元宵為尤盛云英憲二朝尚或舉行成化十一年侍講程敏政元夕觀燈應制詩有曰五朝故事傳來久樂與民同上元酒想像先皇得衆心尚有燈詞播人口則是英廟曽製燈詞也賜觀撃毬射栁太宗朝端午賜觀撃毬射栁宣宗時踵行之學士楊榮等咸以詩詞進宣徳四年端午賜扇及五色長命縷繋腰等物榮復為詩識之自天順辛巳迄成化戊子凡遇端午輙賜牙骨聚扇上有御製清暑歌解愠歌及諸家繪畫金織扇袋五色圓夀絲縷虎頭條畫艾虎學士柯潛等受賜多為詩以志其榮焉而所謂毬射之戲漸不復舉豈走驃騎即其流耶賜重陽宴物宣徳四年重陽節賜宴及御製詩一章七年亦如之仍賚以内醖珍羞大學士楊士竒等皆識其事賜冬至臘日衣被冬至臘日例賜衣被宣徳二年臘日賜内閣繡衣各二襲此尤異數也賜觀走驃騎天順三年三月五日賜文武觀走驃騎于後苑其制一人馳馬執旗引于前一人馳馬繼出呈藝于馬上或上或下或左或右騰擲趫捷人馬相得如此者數百騎後至乃為畨服臂鷹走犬圍獵狀終場俗名曰走解而不知所自始豈金元之遺俗歟今嵗一舉之葢以訓武也觀畢賜宴于回廊大學士彭時識其事如此賜校獵獐兎天順二年十月十日扈駕校獵南海子海子距城南二十里方百六十里闢四門繚以崇墉中有水泉三處獐鹿雉兎不可計籍海戸千餘家守視每獵則海戸合圍縱騎士馳騎于中亦所以訓武也是日扈從官皆䝉頒賜獐兎而内閣李賢等三人比諸人差厚云賜觀閱騎射天順三年十月二十一日上御西苑閲將臣騎射召大學士李賢彭時等侍是日所閱皆侯伯都督都指揮𨽻三營把總管操者總兵官㑹昌侯孫繼宗廣寧侯劉安懷寧伯孫鏜都督趙輔具名籍進呈令逐一騎馬射箭以三箭為率上親按籍記中否有中二箭者中一箭者其中有不中而引弓發矢可觀者比中例試畢賜鈔有差而總兵暨賢等五人各賜鈔一千貫十二月閱御馬監勇士騎射亦如之先次有二三人畏避不赴者罪黜之自是將士咸感徳畏威知所奮勵云賜姓名洪武九年三月癸未以火爾赤為翰林䝉古編脩賜姓名曰霍莊水樂十六年三月上䇿㑹試士以李馬為進士第一御筆賜名騏臚傳三唱無敢應者上曰即李馬也乃出受詔二十二年三月上䇿進士内閣奏以孫曰恭為狀元上以曰恭名近暴字乃擢邢寛第一而改邢為刑志仁愛也寛後復之賜賞功金牌正徳五年寧夏平賜内閣大學士賞功金牌而詹事府事學士白鉞暨日講官皆預焉前此所未有也翰林記卷十六
