body:
  text: 翰林記卷十三明黄佐撰修日厯寳訓聖祖時設起居注後惟專設本院史官常諭學士詹同等曰國史貴直書是非善惡昔唐太宗觀史命直書建成之事其意欲以公天下也予平日言行可記其是非善惡汝等皆當明白直書勿為隱諱庶使後世觀之不失其實洪武六年七月壬寅學士承旨兼吏部尚書詹同等言自上起兵渡江以來征討平定之績禮樂治道之詳雖有紀載而未成書乞編日厯藏之金匱傳之後世上從其請八月甲申上御東黄閣命同與侍講學士宋濓為總裁官侍讀學士樂韶鳯為催纂官員外郎吳伯宗儒士朱右趙壎朱亷徐一䕫孫作徐尊生同纂修鄉貢進士黄昶國子生陳益暘等謄寫九月四日開局於西華門内分年纂輯日輪寺人守閽大官進膳羞其事甚嚴且秘同等昧爽而入至日曛始出復㑹宿於詞林虞有宣洩不敢不慎也十二月擢右壎亷為編修作為太平府教授一䕫輩以病乞歸許之七年五月丙寅朔纂修大明日厯成自上起兵泗濠至即位六年癸丑冬十二月凡征伐次第禮樂沿革行政設施羣臣功過四夷朝貢之類莫不具載合一百卷同等率諸儒上進命藏之金匱其副藏於秘書監同與亷又言於上曰日厯藏之天府人欲見之有不可得臣請依唐太宗貞觀政要分類更輯聖政為書以傳天下後世從之於是分為四十類自敬天至制蠻夷釐為五卷總四萬五千五百餘言名曰皇明寳訓自是以後凡有聖政史官紀録之隨類増入按永樂以後日厯之修遂廢學士王直在館閣私自紀述及纂修太宗實録輯以為寳訓然列聖以來所謂實録寶訓大都出于繼世之後旁蒐汎索盖有不得其真者矣詹宋所言足為成憲誠使史館載筆之臣日事編纂則所謂紀言動者不至鰥官而後世觀之足以傳信也修實録洪武三十一年九月勑修太祖高皇帝實録不知成於何年始不可考三十五年十月己未勅景隆等重修庚申諭修實録官曰此建文中信用方孝孺等纂述實録任其私見以致盛美弗彰爾等其以古良史自期必詳必公用光昭我皇考創業垂統武功文治之盛與乾坤相為無窮斯無忝厥職矣永樂元年六月辛酉景隆等以實録成表上之凡一百八十三卷大行賞賚仍賜宴奉天門命公侯伯五府六部都察院通政司大理寺國子監應天府太醫院欽天監堂上官皆預焉九年十月上以太祖實録建文時修多失其實永樂初再修亦倉卒未偹命史臣重修勑户部尚書夏原吉與太子少師姚廣孝監修學士胡廣楊榮等為總裁金㓜孜等與纂修未幾廣孝死原吉獨專其事凡七年始成十六年五月庚戌朔原吉等以實録進凡若干卷共二百五册寳訓凡若干卷十五册上御奉天殿受之披閱良久嘉奬再四曰庶幾少副朕心辛亥賜宴于禮部洪熙元年五月庚午朔勅修仁宗實録宣德五年正月壬戌書成太宗實録凡一百三十卷一百二十四册寳訓凡若干卷十五册仁宗實録凡十卷二十册寳訓凡若干卷六册太師英國公張輔等表上之上御奉天殿受焉癸亥賜宴于中府賞賚如永樂時宣德十年九月庚午勑修宣宗皇帝實録賜宴禮部正統三年四月己巳實録成凡一百一十五卷一百一十六册寳訓凡十二卷十册太師英國公張輔等具表上御奉天門慰勞再三加陞賞焉賜宴於禮部一云西苑天順八年三月勑修英宗皇帝實録附以景泰時事成化三年八月實録成凡若干卷三百六十册寳訓凡若干卷十二册郕戾王附太保㑹昌侯孫繼宗等具表上進成化二十二年二月勑修憲宗皇帝實録𢎞治四年八月實録成凡若干卷二百九十三册寶訓凡若干卷十册太傅兼太子太師英國公張懋等具表上進𢎞治十八年五月勑修孝宗皇帝實録正德四年五月實録成凡一百二十四巻若干册寳訓凡十巻若干册太傅兼太子太師英國公張懋等具表上進自成化以來宴賚一如故事進實録儀則具載㑹典云按國初儒臣徐一䕫曰元朝制度文為務從簡便且聞史事尤甚疎畧不置日厯不置起居注獨中書置時政科以一文學掾掌之以事付史館及繼世之後則國史院據所付修實録而已詹事楊守陳在史館嘗言古人謂國可滅史不可滅我太祖定天下即命儒臣撰元史太宗靖内難其後史臣不紀建文君事遂使建文數年朝廷政事及當時忠於所事者皆湮没不傳及今采輯尚可補國史之缺景皇帝已復位號而英宗實録標目猶書郕戾王附是宜改正舊例羣臣章疏留中者雖有可傳皆不得書乞以留中之奏悉付史館擇而書之盖國初修纂聖政以為日厯故言動猶詳後之所據以為實録者惟中外臣僚章疏與所行事例焉耳二人所論良足箴也焚藁凡進呈實録之日其草稿内閣大臣㑹司禮監官於内府燒燬李東陽曰正德四年五月二十五日在海子西岸焚實録稿事畢尚膳供宴是日入西苑門望南臺登廣寒殿過芭蕉園而還是時焚稿例供宴也修玉牒凡玉牒每十年一次宗人府具各王府宗支開報内閣奏請學士等官二員纂修其修合用紙劄洪熙元年勑司禮監别造本院委官一員公同附注宣徳三年命本院一員同宗人府經歴於史館内附寫其後合用紙劄𢎞治十年命刑部闗領附注之日令吏部撥辦事吏三名宣宗宣德五年四月重修玉牒成少傅楊士竒太子少傅楊榮以進上覽之因言國家族屬之盛士竒等請逺法帝堯明峻德以親九族上以為然孝宗時太常寺少卿兼侍講學士楊時暢進玉牒按宋制於正殿登受前此所未有也修書洪武中稽古右文以開至治故纂述之事殆無虛日元年六月命禮部尚書陶凱輯自古太子諸王之嘉言善行為書既成上未慊意更令修撰王僎等刪定之二年二月書成凡一百一十餘條為二巻賜名昭鑒録又命學士朱升等同本院儒士修女戒是年三月辛未朔書成四年七月存心録成六年三月宋濓進辨姦録分賜皇太子親王濓嘗被命輯自古奸宄之迹為書至是進呈七年九月孝慈録成命翰林定服制也十三年五月臣戒録成先是上命本院儒臣纂録歴代諸侯王宗戚宦官之屬悖逆不道者二百二十人備其行事以類書之既成賜今名命頒布中外十四年五月朔編修吳沉典籍劉仲質吳伯宗進千家姓凡為姓一千九百六十有八十六年二月東閣大學士吳沉等進精誠録類編聖賢所言三事曰敬天曰忠君曰孝親十八年三月省躬録成初上命翰林儒臣編集歴代帝王祭祀祥異感應可為鑒戒者為書名曰存心録朝夕觀覽後復命贊善劉三吾編類漢唐以來灾異之應於臣下者别為一書名曰省躬録至是成詔頒行之二十一年九月頒武士訓戒録亦翰林儒臣所修也二十六年諸司職掌成先是命吏部同本院儒臣倣唐六典自五府六部都察院以下職務類編為書至是成刋布中外又嘗詔本院稽考漢唐宋功臣封爵食邑多寡及名號虛實等第為書名曰稽制録至是亦頒示功臣十二月永鑑録成頒賜諸王世臣總録成頒示中外羣臣皆本院儒臣所修也二十七年七月寰宇通志成時上以輿地之廣不可無書以紀之乃命本院儒臣及廷臣以天下道里之數總類為書復編洪武誌書二十八年十二月成刋行之二十九年十一月頒稽古定制亦翰林儒臣所定勛舊食禄之家禁例禮節也他如皇明祖訓大誥三編大誥武臣資世通訓御製詩文御註洪範御註尚書御註道徳經皆出宸𠂻而令本院儒臣商確之又有志戒録忠義録為政要録彰善癉惡録武臣鑑戒醒貪簡要録務農技藝簡要録大率皆翰林院所修而年月莫考洪武戊寅嘗詔編輯經史百家之言為類要侍讀唐愚士等纂修未成永樂元年七月上諭侍讀學士解縉等曰朕欲悉采各書所載事物類聚之而統之以韻凡書契以來經史子集百家之書至於天文地志隂陽醫卜僧道技藝之言備輯為一書毋厭浩繁於是廣召四方儒者許侍臣各舉所知至三年正月開局纂修命太子少師姚廣孝禮部尚書鄭賜監修刑部左侍郎劉季篪副監修賜卒以贊善梁潛代焉其總裁副總裁纂修等無慮數百人書成名曰永樂大典元年九月勑諭翰林儒臣輯自古嘉言善行有益於太子以儲君昭鑑録為主稍充廣之名曰文華寳鑑二年四月書成上御奉天門召皇太子授焉又命解縉等編次古今后妃諸侯大夫士庶人妻之事分為三卷元年十一月進御賜名古今列女傳上親序之頒之六宫行之天下時庶吉士余鼎輩讀書文淵閣上命編纂君臣父子諸格言各為類名曰聖學心法七年二月書成亦親序之出示學士胡廣等因命司禮監刋印又以璽書諭皇太子令學士黄淮楊士竒等採古名臣直言并奏疏彚類以便觀覽十四年十二月書成賜名歴代名臣奏議遂命刋印以賜皇太子皇太孫及大臣十六年六月乙酉詔修天下郡邑志書命學士楊榮等總之戸部尚書夏原吉提調上嘗巡北京以仁宗隨行道途所經過農家徧覽農具及其衣食且諭以農民勤苦之事曰此為帝王者不可不知也遂作務本之訓以授仁宗又為善隂隲孝順事實二書以風厲天下雖出御製而本院儒臣亦與聞焉宣德元年正月乙夘勑修歴代臣鑒外戚事鑒皆命大學士楊榮總之且諭榮以書館中編纂及繕寫官有不遵約束者悉聼稽督責罰敢有違越者具聞黜之榮處之適當人皆悅服二年九月書成頒賜在廷諸臣及戚畹又詔修五倫書正統十年三月書成景帝時勅修君鑑及寰宇通志成英宗復辟以寰宇通志多汎濫勅本院儒臣約為一統志天順五年五月大明一統志成上親序之憲宗時肇建東宫詔修文華大訓本院官預者惟學士王獻侍講學士楊守陳侍讀倪岳等四人篇目條例多本大學衍義獨事渉中人者悉不以書守陳爭曰是何以為訓撮其賢否得失之故分註一條議者不能奪成化十八年二月文華大訓成上親授諸皇太子令宫臣進讀𢎞治十年三月詔修大明㑹典大學士李東陽焦芳等總之其凡例本諸司職掌而旁及諸制書以官職制度為綱事物名數儀文等級為目每有事例因革損益皆詳載焉十五年十二月書成凡一百八十卷上親為序正德六年四月司禮太監張永傳奉聖旨命儒臣重加參校十二月大學士李東陽以重校大明㑹典表上之武宗復為序始纂修時學士王鏊欲如唐六典之本庶潤色有文簡明易見總之者不能從也一代之制雖云具備然宫中所設職掌皆未詳載豈當時中人之燄方煽與重加改正懸諸象魏以為法守在今日而已凡進書例有表上其儀見㑹典修史洪武二年二月丙寅朔詔修元史以中書左丞相宣國公李善長為監修前起居注宋濓漳州府通判王褘為總裁徴山林遺逸之士汪克寛胡翰宋禧陶凱陳基趙壎曾魯高啓趙汸張文海徐尊生黄箎傅恕王錡傅著謝徽十六人同為纂修開局于天界寺取元經世大典諸書以資叅考時方召諸儒考禮於是儒士徐一䕫梁寅周子諒胡行簡劉宗弼董彞蔡深滕公琰時曾魯輩以元史方成共奏留之因命與諸儒同纂修九月元史成紀三十八卷志五十三卷表六卷傳六十二卷濓等表上之惟元統以後尚缺三年二月乙丑詔續修元史時儒士歐陽佑等采摭元統以後實事還朝仍命濓與待制王禕總裁儒士趙壎朱右貝瓊朱世廉王彞張孟兼高遜志李懋張宣李汶張簡杜寅殷弼俞同十四人同纂修七月丁亥朔續修元史成計五十三册紀十志五表二列傳三十六凡前書未偹者悉補完之通二百十二卷濓等率諸儒以進詔刋行之人賜白金二十兩文綺帛各二授儒士張宣等官各有差惟趙壎朱右朱濓乞還田里從之後令解縉還家著述十年乃復來朝因命改修元史之舛誤及踵成宋書删定經禮凡例皆以留中未幾縉以太祖大䘮入朝進香被謫書盖未成也成化八年十月詔修宋元通鑑綱目十二年十一月成凡若干卷大學士商輅等表上之𢎞治十六年三月詔修歴代通鑑纂要正德六年十月成凡若干卷大學士李東陽等表上之二書皆上親為序盖纂修之事必集衆長而後可成正統中南京侍讀學士周叙獨受詔修宋遼金三史未及成而卒至今猶為缺典顧此非一人精力所能就雖開局可也訂輯經傳經書註釋言人人殊自國朝訂輯之而後五經六籍益明於世洪武六年詔修撰孔克表御史中丞劉基秦府紀善林温取諸經要言以恒言釋之使人易曉因手釋二章賜克表為例克表等承詔釋四書五經以上賜名羣書類要聖祖嘗覽蔡氏書傳指摘其可議者二十四年十一月禮部右侍郎張智等奉命同學士劉三吾等會議改正蔡氏書傳并定程文格式頒行天下學校其改正之說曰前元科舉尚書專以蔡傳為主考之傳内如天文一節已自差繆謂日月隨天而左旋今仰觀乾象甚為不然夫日月五星之麗天也除太陽則人目不能見其形於列宿之間其太隂與五星昭然右旋何以見之當天清氣爽之時借一宿為主使太隂居列宿之西一丈許盡一夜則太隂過而東矣盖列宿附天舍次定而不動者太隂過東則其右旋明矣夫左旋者隨天體也右旋者非天體也又如五星右旋為順行左旋為退行其順行之日常多退行之日間有若依蔡氏之說則退行多而順行少豈理也哉皆乾象昭然有目之所共見蔡氏不知而妄為異說以致愚惑後世之愚儒俗士又皆誦習紙上之文莫有能仰觀天象以究其非者若不革正有誤方來今後學學尚書者天文一節當依朱氏詩傳十月之交註文為是又如洪範内惟天隂隲下民相協厥居一節蔡氏俱以天言殊不知隂隲下民乃天之事相協厥居乃人君之事天之隂隲下民者何風雨霜露均調四時五榖結實立烝民之命此天之隂隲也君之相協攸居者何敷五教五典以教民以五刑而弼教保佑和協使强不得凌弱衆不得暴寡而各安其居也若如蔡氏之說則相協之事皆付之於天而人君但宴安自若於奉天勤民之政略不相與又豈天佑下民作之君師之意哉今後當依此說二十七年四月復詔徴儒臣考正蔡氏書傳於是太子少保唐鐸等舉致仕編修張美和國子監博士錢宰等二十七人皆宿儒也並遣行人馳傳徴之既至上語以正定書傳之意且曰爾等知天象乎皆對曰不知上曰朕每觀天象自洪武初有黒氣凝於奎壁奎壁乃文章之府朕甚異焉今年春暮其間黑氣始消文運始興爾等宜考古正今有所述作而稱朕意於是命三吾等總其事開局翰林院至九月書成三吾等率諸儒上進賜名曰書傳會選命禮部刋行天下賜諸儒綺繒衣物等并御製詩燕享命坐殿中瀕行又賜寶鈔俾馳驛而還上又嘗謂孟子一書不可汎觀二十二年四月詔集耆儒錢宰等二十七人命劉三吾總之參訂孟子纂其要語删去八十五條至九月書成進御命之曰孟子節文尋又命三吾訂正周禮上躬與之裁定盖由聖心沉潛經術既久故能探􅄨詣極以成書永樂十二年十一月甲寅上諭學士胡廣楊榮金㓜孜曰五經四書皆聖賢精義要道傳注之外諸儒議論有發明者爾等宜采附于下周程張朱諸君子性理之言如太極圖通書西銘正䝉之類皆六經羽翼然各自為書未有統㑹卿等宜類聚成編務極精備用垂永久命廣等三人總其事仍舉朝臣及在外教官有文學者同修開館東華門外命光禄寺給朝夕饌甚豐十三年九月己酉書成賜名性理大全廣等表上之上親為序冠其首詔頒于六部兩京國子監及天下學校按聖祖命劉三吾定科舉取士之制四書義主朱氏集註章句易主程氏傳朱氏本義書主蔡氏傳及古註䟽後主會選詩主朱氏集傳春秋主三傳及胡氏張洽傳禮記主古傳疏廣等所定惟四書及易詩如舊書主蔡氏春秋主胡氏禮記主陳澔集說嘗求其故盖當時編纂惟據元人四書五經性理㑹通稍加删潤而成非為異也校勘書史洪武中本院儒臣校勘書史進御日以為常盖聖祖好學手未嘗釋卷故也仁宗在東宫嘗命侍講楊士竒贊善陳濟校讐歐陽修文集正其誤補其闕釐為一百五十三卷命刻以傳成化中本院官受命校勘資治通鑑綱目貞觀政要二書翻刻以賜在廷大臣正德時命重校大明㑹典語見前餘多莫攷修書陞賞凡書成進御例有陞賞酬勞也洪武中修元史及書傳㑹選陞賞見前然擢用皆儒臣之未授官者若本院官則賞而不陞蓋以文墨特其職分之常故爾永樂元年六月癸亥太祖皇帝實録成侍讀學士解縉傳於奉天門欽奉聖旨修史官除翰林院及尚書李至剛外其餘官員監生生員人等說與吏部引選發落欽此丙寅吏部將修史郎中等官同儒士監生生員吏部引選詔以郎中等官徐旭等各陞一級儒士監生生員吏員王孟易等除授主事御史中書舍人并都事等官有官者修史得陞擢始見於此于是以吏部郎中徐旭為國子監祭酒太常寺博士錢仲益知縣楊覯梁潛王褒為修撰國子助教王達給事中朱紘為編修行人蔣驥為檢討國子博士金玉鉉為五經博士晉府侍讀蘇伯厚為侍書教諭解榮劉宗平為待詔靖江府教授張顯為國子監學正訓導富貴清羅師程為國子監學録知府劉辰為江西右叅政禮部郎中胡逺為江西左叅議廣東僉事李宜為福建左叅議僉事葉砥改吏部考功郎中知州鄒濟改禮部儀制郎中知縣趙季通例應陞而以疾乞教職授國子博士知縣唐雲改監察御史楚府教授吳勤改開封府學教授陞謄寫官主事陸顒為禮部員外即端孝思為兵部員外郎擢監生鍾子勤陳彞訓劉謙沈文為中書舍人梁逢吉葉蕃沈紹先華嵩喬岳衛談鄭中余從善陳俊良陳實為監察御史生員金實為翰林典籍汪琦等十人為知縣而纂脩儒士王孟易端禮朱逢吉莫士安陞授莫考以聖詔推其次第蓋授主事云十六年再重修太祖實録成改纂修主事李時勉陳敬宗為侍講監修以下賜金帛鈔幣紗衣有差太宗仁宗兩朝實録吏部據行在翰林院備開修史官員人等姓名具題請旨奉聖旨曾棨王英王直都陞少詹事支正四品俸仍兼原兼職事周述陞庶子支正五品俸仍兼原兼職事李時勉錢習禮都陞侍讀學士余學䕫既告老疾著冠帶回去閒住陳循蔣驥都陞侍講學士藺從善陞洗馬仍在翰林院辦事劉永清邢寛胡穜都陞侍講蔣禮陞中允仍在翰林院辦事周叙孫曰恭楊敬都陞修撰王雅等四員都陞編修陳繼陞檢討張禮陞行人署典籍事沈寅陞正字署孔目事蔣暉程南雲都陞從四品俸兼翰林院侍書夏衡宣嗣宗都陞郎中張習蘇鑑王觀陞員外洪益中陞左寺正丘宗楊玹邵暹陞右寺正蕭湘至胡宜衡陞左評士解禎期至冦原陞右評士潘文奎他老了著冠帶回去閒住陳中陞員外陳叔剛陞修撰萬節陞左寺副丘錫還做府學教授支九品俸梁蕚陞府學教授鄒循為翰林待詔朱銓做翰林侍書辦事吏翁選至李用都做縣丞欽此盖自是本院官始以纂脩陞矣然纂修與稽考叅對皆混陞又有令其閒住者實斷自宸衷故也宣宗實録據行在禮部開報具題奉聖旨皇考實録修完特念他每勤勞英國公於原號加佐理二字嵗加禄米百石楊士奇楊榮陞少師兼職如舊楊溥陞少保兼尚書武英殿大學士欽此隨又奉聖旨英國公張輔等四員已發落了王直王英俱陞禮部左侍郎兼職如舊不管部事李時勉錢習禮藺從善俱陞翰林院學士苖衷陞侍讀學士曾鶴齡高榖馬愉俱陞侍讀學士周叙尹鳯岐孫曰恭習嘉言陳叔剛陳恂俱陞侍讀曹鼐儀銘王一寧杜寧諸懋陞侍講楊翥董璘楊夀夫林文鍾復張益邵宏譽俱陞修撰劉球劉鉉洪璵對品改除侍講俱陞從五品俸胡穜邢寛及蕭鎡至靳通共三十三員俱照本等品級各陞俸一級内有原陞俸的還照例加俸一級陳循徐珵王玉既丁憂且不陞秀才陳學等十八名俱授試中書舍人給半俸三年後實授辦事顔聚等十一名各照原資格除授欽此蓋監修及總裁官陞擢自此始英宗實録成吏部據翰林院開報具題奉聖旨皇帝實録修完念他每勤勞㑹昌侯孫繼宗陞太傅陳文陞太子太保兼禮部尚書彭時陞太子太保兼兵部尚書俱文淵閣大學士劉定之陞工部右侍郎兼翰林院學士不管工部事吳節陞太常寺卿兼翰林院侍讀學士柯潛萬安李泰陞詹事府少詹事孫賢劉珝陞太常寺卿仍兼舊職陳鑑劉吉陞侍讀學士丘濬陞侍講學士黎淳陞左庶子童縁劉宣陞右庶子王一䕫陞左諭德江朝宗楊守陳陞洗馬彭華尹直陞侍讀彭教徐瓊陳秉中李永通陞侍講耿裕鄭環劉健汪諧吳釴羅璟陞修撰周經陞編修張元禎既告病罷李東陽倪岳謝鐸焦芳陳音程敏政吳希賢馬麟焦㻞李溥凌暉蔚宣黄清劉詢俱陞俸一級余謙陞太常寺卿林章陞太常寺少卿吳謙陞從四品散官并俸韓定何暹葉玫陳綱王瓊陞本司郎中王佐白直陞通政司知事毛顯陞司寶署丞冀舞陞大理寺評事高鑑陞戸部照磨監生史盛等九名除從七品京職譯字官并生員秀才胡清等十二名俱除序班辦事吏曹昻等九名俱照原資格除授事故的罷欽此蓋是時總裁官少保吏部尚書兼華蓋殿大學士李賢副總裁官禮部右侍郎李紹纂修官侍讀學士周洪謨左春坊左庶子王㒜右春坊右庶子兼侍讀徐溥侍讀李本脩撰岳正邢讓王獻謄録官吏部員外郎凌耀宗禮部員外郎謝宇中書舍人温良劉珙鴻臚寺司儀署丞潘致中序班梁俊周景各以事故去猶具姓名上故有此旨憲宗實録成吏部據本院除事故不開外將見在開報具題奉勅吏部皇考實録修完念他每勤勞監修張懋陞太師仍兼太子太師總裁劉吉陞少師華蓋殿大學士餘兼如故徐溥陞太子太傅戸部尚書兼武英殿大學士劉健陞禮部尚書兼文淵閣大學士副總裁丘濬陞太子太保仍兼禮部尚書汪諧陞禮部右侍郎兼翰林院學士如敇奉行欽此又二日奉聖旨監脩總裁張懋等俱已陞了纂修官傅瀚陞太常寺卿費誾陞詹事府詹事俱兼侍讀學士李傑已陞官了仍加俸一級李東陽董越陞太常寺少卿謝遷吳寛陸簡少詹事俱兼侍講學士曾彦楊守阯左諭徳劉戩王鏊右諭德楊傑梁儲司經局洗馬張元禎南京翰林院侍講學士劉機楊廷和江瀾俱侍讀武衛張芮劉忠鄧焲黄珣張天瑞俱侍講楊時暢劉春凃瑞俱修撰謄録等官林章龍暹各陞俸一級馬紹榮太常寺少卿姜立綱太僕寺少卿季通王文琮俱本司郎中王佐王璡員外郎陸華主事俱工部毛顯大理寺左寺副吳榮劉棨右寺副胡清徐鶚左右評事黄燦胡清仍加俸一級李瑄光禄寺署正王臣通政司經歴靳瑭蔡振光禄寺署丞何澤朱賔楊全試中書舍人劉安劉學陳倫戸部照磨吳孜翰林院典籍以上官俱照舊辦事原加俸一級者照舊加之張翰陞侍書仍管孔目事監生九名除從七品京職辦事吏八名照舊資格除授欽此孝宗實録成吏部查事例具題奉聖旨這修實録官員曾修大明㑹典陞過的及丁憂未陞的都查職銜并脚色到館年月日期開寫明白來看欽此行准翰林院手本開坐具題節奉聖旨這纂修實録重事你吏部便照例擬陞職等例來說欽此隨于奉天門欽奉勑吏部皇考實録修完念他每勤勞監修張懋加賞大紅紵絲蟒龍一表裏總裁李東陽加支正一品俸焦芳加少師兼太子太師華蓋殿大學士楊廷和加陞俸二品副總裁梁儲陞本部尚書餘如舊勑奉行欽此續該本部將纂修官員等各酌量歴俸并到館淺深查照往年纂修陞職事例擬陞相應職俸通行開坐具題節奉聖旨纂修催纂侍讀毛紀等十八員并收文書劉訊謄録沈冬魁等七員俱陞一級稽考參對修撰吕柟等十二員陞俸一級喬宗及秀才張保等二十九員名細開因何入館年月日期來歴脚色務查明白來訖不致乖方丁憂起復官生劉春等二十二員名還查到館年月日期來訖欽此于是吏部復將入館來歴縁由具題有旨以營求入館貪圖陞賞又保送來歴不明責之喬宗等對品調外任有差而侍講吳一鵬等皆陞調兩京部屬時逆瑾扇虐惡諸翰林不為禮屈焦芳劉宇輩又嗾之謂文士不習世故摘所同忌者十餘人以擴充政務為名故有此舉非武宗意也而憂居者如侍讀徐穆編修賈詠等猶不免一鵬調南京刑部員外郎穆調南京禮部員外郎詠調兵部主事董玘調刑部主事穆孔暉調南京禮部主事餘各有差及瑾誅諫官以為言乃俱復官正德五年八月也㑹内閣以本院及坊局多闕員乃䟽其有資望者以次陞補喬宗等則本院以善楷書保留云蓋自纂修以來陞賞事例至是大紊矣復先朝之􅂜典將有望于今日若乃賞賚按永樂元年五月乙未上以太祖實録將成命禮部預定賞格禮部以修元史賞例進上覧之曰此述前代興亡之跡今朕紀皇考神功聖德貽範萬世豈可比而同之爾擬議非倫矣遂親定監修官銀百兩綵幣六表裏織金紗衣一襲鞍馬一副總裁官銀八十兩綵幣五表裏織金紗衣一襲鞍馬一副纂修官各銀五十兩綵幣四表裏紗衣一襲催纂兼謄寫官銀二十兩綵幣三表裏紗衣一襲催纂官銀二十五兩綵幣二表裏紗衣一襲謄寫監生生員儒士各銀十兩鈔三十錠綵幣一表裏謄寫吏各銀八兩鈔三十錠綵幣一表裏催督謄寫者鈔二十錠絹二疋辦事吏各鈔二十錠絹二疋六月辛酉景隆等八十六人如賞格受賜其後太宗仁宗兩朝以至英宗實録成皆為例獨憲宗實録成視前或微不同𢎞治四年定賜監修并總裁官銀八十兩綵段四表裏羅衣一套鞍馬一副總裁銀八十兩綵段四表裏羅衣一套纂修官銀三十兩綵段四表裏羅衣一套催纂官銀二十兩綵段二表裏羅衣一套謄録官銀十五兩綵段一表裏辦事吏典鈔二十錠絹一疋各色人匠鈔二十錠布一疋官陞擢事故去任及監生事故去者久近不一賞賚有差乃若修他書宣德以前不過白金文綺襲衣寶鈔之賜而已正統以後始有陞擢而賞賚則視實録稍殺焉東宫纂修洪武十二年八月東宫文學傅藻等受皇太子命編輯春秋諸國君臣行事始終書成皇太子以聞上賜名曰春秋本末永樂中東宫命楊士奇徐善述等編纂大易等直指語見前卷其後東宫纂修盖無聞焉翰林記卷十三
