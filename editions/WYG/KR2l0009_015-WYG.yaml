body:
  text: 翰林記卷十五明黄佐撰齎詔用寳國初置承勑監洪武九年以編修吴昇為承勑監令周孟東為監丞使以齎奉制敕為職尋罷之其後凡朝廷大禮頒詔天下本院官先撰詔文請㫖裁定付中書舍人書寫尚寳司用寳畢行禮之日百官出承天門外肅候鴻臚寺官唱頒詔内閣官一員捧詔自奉天殿左門入至華葢殿候駕興捧出至奉天殿授於禮部尚書其他制敕用寳時或不同皆内閣臨時制宜取自上裁葉盛云嘗見敕内閣楊學士葢勤民之璽皇太后遺誥葢𢎞徳昭順之寳皇后制書葢厚載之記詔書制諭羣臣誥命皆制誥之寳近年詔書葢皇帝之寳云始於學士李賢敕命敕諭皆敕命之寳又嘗見正統中手摺印本敕諭葢廣運之寳朝覲敕諭亦手摺印本葢敬天勤民之寳敕則葢廣運之寳敕今皆謂敕書葢手敕耳惟景泰初敕諭亦葢廣運之寳或曰以失守重造未成故爾遣敕於外皆黄紙外封用三圖書其文曰丹符出驗四方今則具有成規矣上寳册凡上尊號尊諡皆本院撰擬寳册文以進洪武初追尊四廟為帝后學士陶安朱昇等捧册文至御前上親受之水樂初上太祖髙皇帝孝慈髙皇后諡議上親覽畢親舉諡議付本院撰文及上諡册一如洪武時天順二年二月上聖烈慈夀皇太后尊號内閣捧寳册文進上興親覽畢乃行禮時詔告天下詔章已進訖大學士彭時謂李賢曰此事前所未有宜有恩典及人賢曰先年已兩赦矣恐數赦非宜時曰非赦也但行優老之政耳欲令朝官父母年七十者與誥敕百姓年百嵗者與冠帯是所謂老吾老以及人之老也恩典如此斯與所上徽號相稱矣賢曰善遂共擬仁政數條進呈上大悅即命行之頒徽號詔畢上御文華殿召賢等三人者近前賜銀兩表裏有差仍親自授與和顔慰勉其鼓舞臣下有如此葢上尊諡尊號皆人君事親之禮儀册既已躬親授受雖賞賚亦必親焉列聖之孝敬信乎度越千古也扈從凡車駕所在近侍諸臣皆扈從洪武中官無定員永樂六年定巡狩親征先詔告天下扈從用本院内閣官三員侍講修撰典簿等官六員書制敕秀才八人詳寫四裔文字監生十三人車駕將發燕羣臣賜扈從官軍人等寳鈔㑹典云凡駕詣郊壇或巡狩行幸親征内閣官扈從制敕房官隨行書辦遇有敕㫖即時撰寫永樂七年正月車駕巡北京學士胡廣諭徳楊榮金㓜孜及修撰王英等扈從賜綿衣狐裘鞍馬榮時有母喪特留之三月抵北京賜廣等宴榮辭以憂弗與特命中官以珍饌送之八年二月上親出塞征布尼雅實哩等三人仍扈從賜衣被鞍馬途次命光禄給酒饌七月車駕至驢駒河遣榮先歸報皇太子至京皇太子賜鈔幣金織麒麟衣服銀鑲鏤花香帯及石刻蘭亭記兩賜宴於翰林命隆平侯張信尚書蹇義欵待且命諸儒臣陪之八月扺北京賜綵幣鈔米羊酒等物十月榮與廣等扈駕南還賜鞍馬綿衣袴韈及路費途中屢賜珍饌嘉果抵京賜廣等鈔帛有差十一年正月復巡北京遂征北冦廣等三人偕修撰王直梁潛扈從賜衣被鈔果等物十二年三月親征瓦剌時皇孫侍行上命廣等三人凡行宫有暇即與講析義理開其聰明十四年復扈從南還賜廣等綿衣鞍馬鈔幣十五年三月壬子車駕復巡北京三人者復扈從上屢問民情榮等悉以實對賜白金鈔幣金織紗羅紵絲衣服等物二十年二月上北征惟㓜孜與侍讀王英扈從賜鞍馬鈔幣至濶欒兒海五月遂還英嘗奏事上喜謂曰秀才是二十八人讀書者朕需爾為用正好宣力勿憚勞苦今凡軍中一切動靜或謡言之類爾有所聞即來奏又諭太監孟􅂹曰秀才有事即令入見毋沮二十年三月戊寅大學士楊榮金㓜孜從征沙漠賜米鈔鞍馬令榮等叅預軍中幾務時召榮㓜孜於御幄中同公侯大臣坐飲凡有賜賚或公侯不與俱或與公侯俱而扈從文臣不與焉九月宴隨征將士命榮㓜孜坐前列食上肴賜鈔幣并上品金織襲衣鞾韈二十一年七月榮扈從西征賜羊酒帳房等物八月庚申駐師萬全一應軍務悉命榮掌之晝夜或三接五接每以楊學士稱之不名十月次天成畨主額森圖噶納欵命榮徃受之回賜御饌慰勞備至十一月旋師賜鈔一萬貫米十石紵絲金織衣二襲靴襪二雙二十二年復北征榮與㓜孜扈從語見受顧命類宣徳元年漢庶人髙煦反榮勸上親征遂與楊士竒從行討平之七月駕還賜榮等鞍馬白金鈔幣及安樂州男女五十餘人三年八月戊申車駕巡邊獨榮扈從九月癸丑給以内廐良馬命榮先從出塞日賜御厨酒饌乙夘師次寛河報捷丁巳駐蹕㑹州甲子班師五年二月乙未上侍皇太后謁長陵大學士楊士竒楊榮等扈從庚子上以皇太后命召見士竒等五人於行殿諭之曰皇帝數言卿等忠勤今天下清寧民生無事是固祖宗福佑家國亦惟卿等贊翼之功賜以酒殽及白金紵絲表裏辛丑進詩謝恩三月己酉扈駕回京賜青紅氁子駝褐九年九月榮復扈車駕巡邊給以天閑名馬光禄日供酒饌至洗馬林而還比還恩賚甚厚正統十四年七月北敵也先入冦司禮監太監王振勸上親征車駕遂行内閣學士曹鼐及侍讀學士張益等扈從賜賚如故事八月遇敵于土木鎮鼐及益皆沒自後巡狩親征之事遂寢矣惟春正月有事于郊祀始扈從焉例賜御㕑茶飯宣徳四年正月丁巳大學士楊榮扈駕南郊賜金銀鮮果等物𢎞治十六年上徃郊祀大學士李東陽等候駕畢宿神樂觀茶飯外有特賜者三葢異數也東陽等為詩紀之正徳十四年寧庶人宸濠反既就擒上猶南巡以親征為名自稱威武大將軍鎮國公朱夀大學士梁儲蔣冕扈從上用邊將江彬等言欲卜郊留都二人力諫乃止十五年十月北還又按洪武八年十一月壬子上命皇太子暨諸王徃中都詔學士宋濓贊善孟益正字桂彦良等從行洪熈元年正月命皇太子徃祭皇陵孝陵右春坊大學士兼侍讀學士曽棨左諭徳兼侍讀周述等從行則是東宫行幸亦有扈從矣洪武二十七年三月命韓瀋二王徃省秦晉燕周齊五府從官各一十人用編修各一員則是諸王亦有扈從矣而㑹典不載留守永樂六年上將巡狩命尚書兼詹事蹇義金忠右春坊大學士黄淮左諭徳楊士竒留守諭之曰朕留汝四人居守猶唐太宗簡輔弼監國必付房𤣥齡卿等宜識朕意又以幾務事繁復命修撰王直副之凡南京政務惟文武除拜四裔朝獻邊警調發上請行在若祭祀賞罰一切之務有司具成式啓聞施行事竟則有司具本末奏逹而已明年春車駕遂行十一月再巡狩命淮等與洗馬楊溥留守十二年逮淮詣北京下獄溥亦坐累十五年春復巡北京留義與士竒居守以侍讀兼右贊善梁潛副之㑹謀譖監國者事連潛十六年九月寘潛及司諫周冕于法皆漢庶人為之也惟士竒始終以侍重免於咎每言監國之體以尊君順親為心皇太子嘉納之及即位洪熈元年宣宗在東宫受命祀陵因留南京監國舊學之臣曽棨輩皆從焉是年五月宫車晏駕少傅楊士竒少保黄淮太子少傅楊榮佐鄭襄二王監國而遣使迎宣宗宣徳元年上親征漢藩淮以病不行留佐鄭襄二王監國正統十四年七月上親征北敵命郕王居守每旦於闕左門西面受羣臣謁見朝政皆太監金英佐理之留守者戸部尚書兼學士陳循工部右侍郎兼侍講學士髙穀也迎駕永樂八年七月車駕還自北征皇太子遣大學士黄淮徃迎至滁州獲朝見洪熈元年五月宣廟自南京入即位大學士楊榮徃迎於徳州景泰元年八月十三日英宗自北狩回鑾遣内閣學士許彬迎于宣府商輅迎候于居庸關十四日駕至上關輅進見英宗命輅草書二封達于皇太后及景帝十五日入居于南内正徳十五年十月武宗南征凱旋駐通州者久之大學士楊廷和等出迓上戎服而入十六年三月大學士梁儲等迎今上於安陸州四月癸夘至自安陸州云充使凡天子皇太子及親王冠禮内閣官充賓贊昏禮充納徴等使册封諸王及妃内閣官充正使若册封副使以本院官充者自成化末侍讀江瀾始也永樂洪熈宣徳三朝册封諸王及妃内閣楊榮金㓜孜各充正使者自後内閣不復出使於外惟冠昏大禮則用舊規宣徳三年三月癸未大學士楊榮奉命持節册中宫禮成賜白金鈔幣此類不可勝紀若本院官因事出使者洪武三年五月遣編修蔡𤣥等訪歴代帝王陵寢永樂中修撰陳循被命徃南京文淵閣取儲書之類是也使外國凡朝鮮安南國頒詔及冊封學士等官充正使禮部預具奏請待㫖㸃用按洪武初侍讀學士張以寧使安南冊封未至而國王死國人請授其世子以寧不聴遣人請命于朝且教其世子服三年喪并令其國人效中國行頓首稽首禮朝廷嘉之賜以敕書比之陸賈馬援并御製詩八章以奨諭之於是復命編修王㢘吏部主事林唐臣充弔祭使以徃且封其世子陳日熞為王既至其君臣出迎於郊議授受之禮徃返數四不能決㢘厲聲呵之乃奉御製文於綵輿迎入成禮而還四年二月戊午以寧等三人還自安南以寧卒于道日熞遣陪臣阮汝亮偕亷來上表謝恩貢方物上即拜㢘為工部員外郎旌其勞也㢘固辭不拜遂出丞澠池焉十二年十二月壬戌遣編修羅復仁兵部主事張福齎詔諭安南占城反復仁還擢𢎞文館學士永樂初遣待詔王延齡使朝鮮行人王彬副之人賜紵絲衣一襲鈔二十五錠及錦衣皮裘狐㡌自後使二國者俱賜一品服其禮益隆云安南自郡縣復為國正統中請封侍讀學士錢溥充正使其王桀驁不恭授受迎拜皆不如禮溥以書累争之而後定承平久使外國者多治巨艦載重貨浮海與其國為市或與陪臣賡和誇竒角捷以為才𢎞治初侍講劉戩使安南考地志陸道南寧坦甚無虞乃乘肩輿從兩僮忽抵其界􅊂人傾駭至之日頒詔明日燕燕畢逐行餽贐一不顧追授諸途不與語獨書其入關詩與之曰歸裝有一南物者關神其殛諸後其陪臣入謝表有廷臣清白之語當時莫不多戩正徳初侍讀徐穆充正使頒正朔于朝鮮及境譯告國王不郊候迎詔不道跪穆援古義稽今制反覆辨析皆如議王屢遣陪臣代質疑義穆剖析不遺凡所餽獻悉拒弗納人咸稱之六年編修湛若水充安南冊封正使餉遺一無所視獨和其王贈詩一章論者謂得體云巡行洪武元年八月命儒臣十人分行十道訪求賢哲隠逸之士于是學士詹同等徃焉攝行御史洪武初上命編修王璉等攝行御史璉按河南入對稱㫖上恱謂近臣曰文華堂諸生如璉等皆異日將相才也九年三月丙子以璉及編修馬亮任敬王懌陳敏張唯典籍王偁應奉殷哲侍儀使孫化秘書直長蕭韶贊讀閻裕起居注嚴鈍給事中方徴彭通宋善王惟吉十六人為監察御史十年正月乙丑復命編修桑慎陳晟署監察御史二十九年二月甲午復以編修景清為監察御史尋署僉都御史其重憲職如此永樂末侍講李時勉修撰羅汝敬皆降監察御史是又與洪武時不同分鎮要地正統十四年八月景帝即位以上皇未復冦方内逼乃命侍講徐珵等十五人分鎮其地珵得彰徳餘人不可考或曰楊鼎王詢與焉珵即有貞也成化中修撰張頥擢僉都御史巡撫居庸豈援此以為例與代祀凡祈告代祀多用本院儒臣正統乙丑浙江台寧等府民遭疫死甚衆上遣禮部侍郎兼侍講學士王英齎香幣徃祀南鎮以禳民厲時浙間久旱英至紹興大雨水深二尺灌獻之夕雨止星見明日又大雨田野沾足人皆喜曰此侍郎雨也布政使孫原貞等陪祀請為御祭感應記刻石於廟而還景泰辛未夏不雨特遣侍講學士劉鉉祀濟瀆成化甲辰陜西旱遣禮部左侍郎兼學士徐溥代祀中鎮西海河瀆諸神雨輙應丁酉朝廷用儒臣議追崇先聖禮樂遣學士王獻祭告闕里𢎞治已未六月孔廟災學士李傑奉詔祭告甲子閏四月孔廟重建落成復遣大學士李東陽祭告焉陪祀分獻凡郊祀五品以上官例得看牲次早復命陪祀皆與若分獻用文武大臣及近侍官二十四員太常寺請㫖㸃充故本院官自檢討以上皆與永樂中修撰馬鐸建言國子監分獻十哲宜用翰林院官朝廷從之讞獄洪武十四年十月癸丑命法司論囚擬律奏問從翰林院給事中及春坊正字司直郎㑹議平允然後覆奏論決永樂二十二年十月丁巳大理寺奏決重囚仁宗召大學士楊士竒楊榮金㓜孜至榻前諭曰比嵗法司濫刑徃徃出于鍜錬先帝嘗切戒之必㑹三學士同審正統中侍講學士馬愉嘗奏讞獄終年不決者朝廷從之由是寃抑多申理然惜其未能復洪武之舊也主宴凡筵宴之賜賚臣下者令大臣待之謂之主宴天順四年天下諸司官吏朝覲至京上召大學士李賢諭之曰黜陟之典亦當舉行賢對曰此祖宗舊制即敕吏部都察院退不職者數百人旌其才行超卓政績顯著者布政以下賈銓等十人賜以衣服楮幣禮部筵宴命賢及吏部尚書王翺待宴以勵其衆正徳以來武舉㑹武宴例用内閣大臣一員主席兵部先期奏請齋宿凡郊祀洪武二十年定齋戒日期文武百官先沐浴更衣本衙門宿歇次日聴誓戒致齋二日宗廟社稷亦致齋三日惟不誓戒或朝廷祈禱亦如之所謂齋戒者不飲酒不食葱韭薤蒜不問病不弔喪不理刑名不與妻妾同處也成化丙申十二月十日禱雪致齋于翰林之東署侍讀倪岳侍講程敏政修撰陸釴編修陸簡同宿是夜雪大作逐用歐公禁體故事相與鬮韻聨句以志喜鈎竒競勝達旦弗能休前輩風致可想見也而禱雪致齋亦僅見於此習儀翰林舊不習儀以禮所自出故也成化十四年冬至有新㫖學士王獻而下俱與常叅官赴朝天宫習儀至今循之此恐當復成憲之舊不然與百司亡别矣陵祀洪武八年十月乙夘詔翰林院考定陵寢朔望節序祭祀之禮學士樂韶鳯等奏今擬每嵗元旦清明七月望十月朔冬夏二至日用太牢其伏臘社每嵗朔望日則用特羊祠祭署官行禮如節與朔望伏臘社同日則用節禮從之其後清明中元冬至祭祀列聖陵寢分遣勲戚大臣行禮本院官例用二員陪祭永樂元年太祖皇帝忌辰上率諸王奉先殿行禮畢仍率百官躬詣孝陵致祭令近侍官於殿前行禮宣宗嘗奉皇太后謁長陵獻陵内閣大學士皆從焉自是乘輿無躬徃者而本院官上陵陪祀例宿昌平學宫行館云始自成化戊戌近坊局等官亦與陵祀遵詔㫖也受顧命永樂二十二年七月辛夘車駕至榆木川不豫召大學士楊榮等受遺命傳位皇太子遂崩榮等一遵古禮斂含如度與太監馬雲等議曰六師去京師尚逺不宜發喪宜上食奏事如常儀衆是之復條畫軍中事益嚴號令人皆莫測時議者有欲假他事作敕用寳馳報者榮曰先帝在稱敕今稱敕是詐也罪孰當之壬辰次雙峯榮奉遺命馳訃皇太子八月甲辰至北京致大行皇帝遺命而後以軍中所宜施行者陳之皇太子嘉歎賜以白金鈔幣召吏部尚書蹇義使識之行將大用翊旦復承命同義等議即位事宜榮首條民間不便二十餘事上皆嘉納入詔條行之丁巳仁宗即位賜白金鈔幣己未進太常寺卿仍兼前二職十二月加工部尚書仍兼二職三俸俱支賜白金五十兩綵幣十表裏寳鈔二萬貫白米二十石降敕奬諭酬勞也洪熈元年五月辛巳仁宗崩六月庚戌宣宗即位宣徳十年正月甲戌宣宗崩士午英宗即位受遺今皆莫考可齋雜記云天順甲申正月朔日以後上不豫每日猶裁決萬幾如常至初十以來疾大漸乃處置後事命太監牛玉執筆口使書其一東宫即位過百日成昏其二定后妃名分其三命勿以嬪御殉其四殯斂器服語意詳盡皆合天理當人心書畢且命牛曰將去閣下看令為我潤色之既至臣時等驚愕曰何至是牛曰上意亦謂事不可測且說下不用何妨臣等欽誦畢皆歎曰所言關大體非英明不能及此而止殉事尤髙出古今真盛徳事也不須潤色言畢時不覺淚下牛備以前言復命且曰彭時尤悲愴上聞之亦隕涕已而曰且收着待我去後遵行次日牛出道其詳因曰上英偉從來不墮淚今若此事可知矣至十七日遂崩次日早儲皇披􅄠衣素出後右門召内閣學士李賢陳文暨時及文武執政大臣等至前言曰父皇已賓天爾等盡心輔佐我因泣下羣臣皆俯伏號泣良久皆起叩頭而退是日有㫖命太監劉永誠夏時傅恭牛玉㑹昌侯孫繼宗懷寧侯孫鏜尚書王翺李賢年富馬昂侍郎陳文及時為議事官公同計議處置軍國重務遵宣徳十年例也預者皆荷銀幣之賜燕對録云𢎞治十八年五月聞上不豫初六日昩爽司禮監太監戴義出左掖門宣内閣臣東陽先至頃之趣者六七次臣健臣遷繼至乃同入趣者道相屬入乾清宫右門由右階升殿入東户轉西南右戸北行數步穿重幔上仙橋又數步見御榻上著黄色便服坐榻中南面臣健等叩頭上令近前者再既近榻又曰上來于是直叩榻下上曰朕承祖宗大統在位十八年今年三十六嵗乃得此疾殆不能興故與先生每相見時上玉色發赤大聲盛氣臣健等皆對曰陛下萬夀無疆偶爾違和暫須調攝安得遽為此言上曰朕自知之亦有天命不可强也因呼水潄口掌御藥事太監張愉取金盂進水以青布拭舌勸上進藥不答愉曰再進此一服即無事矣上又曰朕為祖宗守法度不敢怠荒凡天下事先生每多費心我知道因執臣健手若將永訣者上又曰朕䝉皇考厚恩選張氏為皇后成化二十三年某月成昏至𢎞治三年九月二十四日生東宫今十五嵗矣尚未選昏社稷事重可亟令禮部舉行皆應曰諾時司禮監太監陳寛李榮蕭敬等以次畢至皆羅跪榻外上曰授遺㫖扶安李璋捧筆硯戴義就榻前書之上又曰東宫聰明但年幼好逸樂先生每勤請他出來讀些書輔導他做箇好人臣健等皆叩頭仰奏曰臣等敢不盡力上復加慰諭而退是日雖在倉卒天語詳備累數百言不能悉記而其重且大者如此臣健等出至後左門調㫖傳禮部行之戴義送出東角門而入越一夕而龍馭上賓矣追念先皇帝簡任眷遇之恩顧托委付之意誠古帝王所不及俯仰之間已如隔世扣地籲天無所逮及可勝痛哉後東陽每遇五月七日孝宗皇帝忌辰作詩志痛有曰曽上鑾坡侍玉堂朝衣親惹御袍香傳宣煖閣奉天門後天顔近奏事平臺中右門東午漏長化國有人悲短夢幽都無地仰餘光從容顧命分明語一日傷心淚萬行又曰六年揮淚泣遺弓萬國傷心此日同龍去鼎湖還作雨馬嘶沙苑尚思風碧桃宴已歸天上玉几言猶似夢中曽是白頭香案吏不須凝望朶雲紅䕶塟永樂二十二年十二月丁巳太宗皇帝塟長陵命大學士楊榮䕶喪事賜白金鈔幣宣徳十年正月丁亥榮徃相視山陵還稱㫖復有白金鈔幣之賜六月戊申命䕶梓宫塟景陵賜白金一百兩紵絲十表裏鈔二十錠山陵畢復賜白金鈔幣十月辛亥命監立天夀山碑賜白金五十兩紵絲羅四表裏及上尊珍饌按宋宰相例充山陵使國朝惟屬之禮部䕶塟用勲戚啓𤣥宫視事例用本院官二員若榮之䕶塟葢内閣所僅見也翰林記卷十五
