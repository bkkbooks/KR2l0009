body:
  text: 翰林記卷十一明黄佐撰知制誥翰林職代王言唐以應行文字待詔北門與中書舍人分掌制勅謂之兩制宋始有知制誥之名然後初入院者旋即得遷其任尚輕其後試博學宏辭中科者始獲任用然屬之中書國朝兩制悉歸本院非鴻儒歴顯秩者不可掌而以中書主謄寫吳元年十二月乙丑上命開讀詔赦前期翰林院官承制草詔及文武官除授合用誥命勅命皆即日撰寫故學士陶安宋濓輩繫銜皆曰知制誥于時封拜無虛日安等嘗擬撰誥命千餘首以待而猶不足乃使諸儒士在館者分局代為之其後定一考封贈之制初除授所領誥勅皆革去于是其務稍省矣永樂初内閣七人掌内外兩制嘗見楊榮金㓜孜諸人自署職銜亦曰知制誥用洪武時故事也仁宗始命内閣專典内制而擇學士一人專管文官誥勅正統以後罷之文官誥勅皆屬内閣如永樂時𢎞治七年復設以學士年深或尚書侍郎兼者為之亦得以知制誥自署兩制遂稍分矣按宋兩制曰册文表本青詞宻詞祝文齋文詔書批答口宣内制也曰皇后皇妃追封先代皇女皇族册封進封文武封百官遷擢致仕加恩等誥勅外制也若國朝内制則制勑誥旨誥命册表寳文郊祀祭文祭享太廟文皇太后授册寳謁謝文皇后授册寳謁誥文皇妃授册祭文祭陵文皇太子親王等冠辭祝辭親征禡祭旗纛露布巡狩所至祭山川旗纛軷祭文走驃騎祭馬神等及五祀祭文大䘮及皇妃贈諡等册文親王妃公主郡王郡王妃世子世孫及妃鎮國等將軍䘮葬祭文諡册壙誌諭祭文及文武大臣諭祭文經筵講章碑額及題奏揭帖之屬外制則文官誥勑而已凡五府六部等衙門諸勅行事偹詞奏請既得旨移文本院依奏草勑内閣即時擬撰文官誥勑之類亦然進稿畢編類勘合中書舍人領出書寫其王府諡册等文禮部抄出施行原稿俱繳納云視草凡王言例先具藁進呈謂之視草待上允而後行諸般播告兩制皆然洪武中有大政令詞臣録聖語不敢増損故凡詔令多爾每好生等字者皆聖祖所靣授也其後始令本院官為之漸至駢儷永樂二年楊士竒等進呈勑邊將藁上曰武臣邊將不諳文理只用直言俗說使之通曉庶不悞事他日編入實録却用文六年冬巡狩北京詔書命士竒視草上覧之再三喜曰簡當更勿改易其擇日書之頒下又曰試與諸尚書觀之諸尚書皆稱善獨兵部劉儁私于士竒曰請以有字易自字如何士竒曰善即以告於衆衆曰義無相逺不足易且上既善之矣士竒獨以聞請易之黄淮于上前執不足易士竒曰于國家大體尚當用儁言上顧士竒曰從汝明日諭胡廣曰楊士竒能服善難得二十二年十月仁宗御西角門視朝罷時風寒顧謂翰林臣曰朕與卿等居重城中猶覺凛凛如此守邊將士晝夜嚴警殆不可勝遂命書勑遣使以鈔幣賜縁邊將士宣德五年二月上御南齋宫召楊士竒諭曰吾欲下寛恤之令今獨與爾商之然吾未能悉知爾當効助益遂命内侍具楮筆上曰免災傷稅糧當是首事聞民間虧欠畜馬驢騾所司追償甚迫民計無出亦甚艱難部官坐視而不言對曰陛下聖念及此生民之幸然所當寛恤者殆非此兩事因言百姓積年負欠薪芻及採辦買辦之物所司責償甚急各處官司起科不一而租額皆重蘇州尤甚細民至于逃徙部符下郡縣採辦買辦諸物一槩派徴非出産處百姓數十倍價買納年來刑獄寃濫者多工匠之弊四方逺近每戸不問凡丁悉在京多為所管之人私役南方運糧甚難而倉廪無闗防姦人盜竊動輙數萬若此者請有以處之上以為然即令草勑明旦頒行遂令尚膳賜饌勑諭既下上聞衆心悅戴召士竒賜鈔三千緡文綺二端羊酒士竒叩頭受賜上笑曰薄用潤筆耳七年二月上召士竒至文華殿諭曰憶五年二月共爾南齋宫論寛恤事今兩閱歲矣民事不又有可恤者乎士竒復言戸部沮格官田減租及課程選舉等數事且曰臣一人見聞不廣願更得一人同論此事上曰若多令人知即勅諭未下事已徧播于外矣曰大臣中固有謹厚者上曰胡濙謹厚汝與之宻議就録稿進來于是退同濙議増十數事通録明旦進呈上悅三月朔璽書遂下是時君臣同心言聼計行澤及天下如此景泰末易儲大學士陳循等隂主其事詔既下視草實出循吏部尚書何文淵謂人曰詔語天佑下民作之君父有天下傳之子吾所為也獨石關報㨗詔奬之循視草乃反加詰責其後與文淵皆被禍循就逮時或以復辟詔書問之循為一聨云多難興邦高帝脫平城而祚漢殷憂啓聖文王出羑里以開周上聞之喜遂免循死天順初承天門災上下詔責躬實修撰岳正視草歴陳弊政詞極切直天下傳之遂有飛語指為謗訕七月内批降正為廣東欽州同知由是言之視草固非易事也撰表箋洪武六年九月庚戌詔禁四六文辭先是上命翰林儒臣擇唐宋名儒表箋可為法者遂以韓愈賀雨表栁宗元代栁公綽謝表進上命中書省臣録二表頒為天下式因諭羣臣曰唐虞三代典謨訓誥之辭質實不華誠可為千萬世法漢魏之間猶為近古晉宋以降文體日衰駢儷綺靡而古法蕩然矣唐宋名儒輩出雖欲變之而卒未能盡近代詔誥章表之類仍蹈舊習朕嘗厭其琱琢殊異古體且使事實為浮文所蔽其自今凡誥諭臣下之辭務從簡古以革弊習爾中書省宜播告中外臣民凡表箋奏疏毋用四六對偶悉從典雅十二年六月壬申命翰林院定皇太子與諸王徃復書簡之式二十九年八月上以天下諸司所進表箋務多竒巧詞體駢儷心甚厭之乃命學士劉三吾右贊善王俊華撰慶賀謝恩表箋成式頒于天下諸司令如式録進自是詞垣秉筆者多用散文如宋濓進大明律表是也太宗在北京有白鵲之瑞行在禮部行南京慶賀自皇太子監國以下及五府六部例各進表時楊士竒以病在告監國表命庶子贊善呈稿殿下不懌命尚書蹇義以示士竒士竒曰甚寂寥且不著題似賀白龜白鹿皆可因命改益士竒改一聨云望金門而送喜馴彤陛以有儀後増一聨云與鳯同類蹌蹌于帝舜之庭如玉之輝翯翯在文王之囿義以進殿下喜曰此方是帝王家白鵲適内使陳昂進御饌徹以賜之且有旨使勉進藥食早相見也按國初陞除猶有具表陳謝之文其後惟狀元率諸進士謝恩衍聖公及公侯伯襲封謝恩始用之車駕幸館閣及大學初開經筵及有非常之賜亦具謝表朝廷有大喜慶及諸祥瑞具賀表進呈實録及書籍等皆具進呈表例本院詞臣司之若有東宫則増一箋云㑹典云凡南京各衙門遇朝廷册立大禮及上徽號等項合用慶賀表箋南京禮部行南京翰林院撰進評駁奏啓洪武十四年十二月丁巳命翰林院編修檢討典籍左春坊左司直郎正字贊讀考駁諸司奏啓以聞如平允則署其銜曰翰林院兼評駁諸司文章某官某列名書之永樂以後四方章疏經御覧者内有艱詞難字始令本院考究不復先期評駁評駁進呈試録凡鄉試録舊制例呈進祖宗時令翰林院儒臣評駁之後其制漸弛成化十四年天下鄉試録多舛謬或犯國諱少詹事兼侍讀黎淳摘奏十條下禮部翰林院議治考試提調官罪且申定格例行之至今按是年山東刻文論語不曰堅乎磨而不磷不曰白乎湼而不淄最為紕繆遂逮舉人張天瑞治之以墨卷不同乃止其嚴如此正文體國初文體承元末之陋皆務竒博其弊遂寖叢穢聖祖思有以變之凡擢用詞臣務令以渾厚醇正為宗洪武二年三月戊申上謂侍讀學士詹同曰古人為文章或以明道德或以通當世之務如典謨之言皆明白易直無深怪險僻之語至如諸葛孔明出師表亦何嘗雕刻為文而誠意溢出至今使人誦之自然忠義感激近世文士不䆒道德之本不逹當世之務其辭雖艱深而意實淺近即使過于相如揚雄何禆實用自今翰林為文但取通道理明世務者毋事浮藻於戲大哉皇言乎萬世之通訓也然近日文體或務追秦漢而失之險或駕言韓歐而失之弱本院儒臣宜知所守然風靡者多矣舉聖謨以戒勅之是在當宁應制詩文本院以供奉文字為職凡被命有所述作則謂之應制然祖宗皆出于靣命或相與􅆳和其後惟中官𫝊旨而已丙午年六月旱上禱鍾山大雨獲應賦七言喜雨詩命待制黄哲等􅆳和已而諸將告㨗多令翰林諸儒臣應制賦詩上親加評品洪武元年十一月召大本堂儒士試以鍾山蟠龍賦時與文學之臣燕欽􅆳和語在第六卷大誥三編成命學士劉三吾為序既成上評以為無疵祖訓成學士宋濓被命序其後積誠録成則命大學士吳沈序之太子正字桂彦良入見上命制香几贊司直郎汪仲魯被命制續薰風南來諸曲皆稱旨洪武八年五月丁丑上御端門召翰林詞臣出示巨桃半核盖元内庫所藏物其長五寸廣四寸七分有西王母賜漢武桃及宣和殿十字命宋濓撰蟠桃核賦又嘗命宋濓詠鷹濓七舉足而成有自古戒禽荒之言上稱賞曰卿可謂善諫矣十年十月造觀心亭于宫城上親幸其中召濓為記十二年上製十題命典籍吳伯宗賦之援筆立就詞語峻潔上嘉其才敏賜織金錦衣嘗幸清流關賦詩命扈從儒臣和之起居注劉季道有治世不教還縱逸功成猶遣歴間關之句上歎賞曰可謂安不忘危賜以白金文綺又起居注符子杰應命即物賦詠立成上大悅時寵賜和章一日命羣儒造縱豢鶴文吳府伴讀王驥操觚立就學士宋濓為之進呈上稱善及日將南至大祀于圜丘上復命羣臣賦七言律十二韻冠以三百言序驥與王昹先成跽讀御榻前上聽畢加奬勵命進學士云十五年學士宋訥撰宣聖廟碑稱旨改文淵閣大學士洪武二年二月乙亥立皇陵碑學士承旨危素承命撰進尋以辭多潤飾乃御製一篇閱江樓成宋濓被命撰記上亦更制一篇加評隲焉聖祖之崇文如此洪武二年正月丙申朔封京師及天下城隍神秩號有差命翰林撰文頒之其後革去學士宋訥嘗被命撰僧道領教事者勑命千餘通其後又革去永樂八年二月上親征北方壬戍度野狐嶺至嶺山巔召學士胡廣等指示山川形勢與語良久奉制各于馬上賦平邉詩楊榮有曰聖主尊居四海安恐教邊裔自相殘上甚喜之廣等諜知彼中布尼雅實哩與其下阿嚕台讐殺東西奔遁亟召榮諭曰此中果自相殘汝前日之詩安知不為䜟乎榮下馬叩首謝上喜命賜羊酒三月乙未次清水源水皆苦鹹不可飲人馬俱渴明日營西北二三里許忽有泉湧出清澈可愛命廣與榮徃觀遣中官以銀瓶汲取上親嘗之味甚甘美賜廣等飲訖士馬爭趨之皆給足命曰神應泉又明日應制撰神應泉詩銘上嘉之各賜上尊又嘗命諸文學侍從賦青海天馬歌修撰曽棨最先成為上所褒美宣德中每遇令節令詞臣應制賦詩是時太平無事上留意詞藝翰林儒臣嘗被命賦京師八景詩以獻曰瓊島春雲曰太液晴波曰西山霽雪曰玉泉垂虹曰盧溝曉月曰薊門煙樹曰金臺夕照曰居庸疊翠英宗増其二曰南囿秋風曰東郊時雨為十景焉景泰中學士倪謙輩應制賦詩中官嘗立俟以進成化初學士劉定之應制賦元夕詩絶句百首頃刻而成又嘗以東風解凍春山雪霽等為題令翰林學士等分賦之𢎞治初上注意講學遣太監戴義傳示聖意命學士李東陽等各撰詩十首用寓啓沃東陽擬十題各撰七言律詩一章曰敬天曰法祖曰勤政曰務學曰任賢曰納諫曰節用曰愛民曰恤刑曰講武上嘉納焉又嘗命内閣撰祭三清樂章大學士劉健李東陽謝遷上疏言天子祭天地以簡為貴祭不過南郊故祀五帝儒者非之況三清者道家邪妄之說不敢奉詔上遂止愚按國初勲戚大臣神道碑銘多出本院儒臣奉勑撰述其後不過私家謁請而已至于應制詩文雖内閣罕聞焉盖故事寢廢久矣搜摭故事聖祖將正位宸極命詔起居注熊鼎採故事可備懲勸者書之新宫廂壁鼎受命具故事上之稱旨由是大見禮重太宗將製為善隂隲孝順事實二書以風厲天下乃預命翰林儒臣搜摭故事以獻仁宗在東宫一日觀漢書歎張釋之之不易得洗馬楊溥進曰釋之誠賢然非文帝之寛仁何由得行其志臣以為釋之漢一時不易得如文帝三代而下不易得也退採文帝事編為事類以獻仁宗甚悅賜書褒美進呈書詩文序前輩自應奉之外以已所聞見撰述為書進呈者殆不數人洪武十五年二月前太子正字桂彦良入朝獻萬世太平治要䇿凡十二事上嘉納之永樂七年侍講楊士竒侍東宫皇太子喜讀易凡决疑必用蓍而以易斷命取朱子本義纂其要以進名曰周易直指士竒因進曰易固為卜筮而作然文王周公所繫辭凡脩齊治平之道悉具請編輯以偹覽觀遂輯成書以進仁宗覽之大喜名曰周易大義賜士竒繡衣銀帶先是徐好古作尚書直指金㓜孜作春秋直指皆以進云成化末學士丘濬纂大學衍義補書成適孝宗登極表上之上覽之甚喜批答有曰卿所纂書考據精詳論述該洽有禆政治朕甚嘉之賜白金二十兩紵絲二表裏陞濬禮部尚書且命録其副發書坊刋行至今論政務者多宗其說言足以興若濬者館閣一人而已乃若進呈歌頌詩賦則多有之太祖平陳友諒待制王褘進平江西頌上覽之而喜曰吾固知浙東有二儒者卿與宋濓耳學問之博卿不如濓才思之雄濓不如卿洪武二年十月甲戌膏露降于乾清宫後苑松樹學士宋濓獻膏露頌三年四月陜西寳雞縣進瑞麥𢎞文館學士劉基獻瑞麥頌五月戊申祀地祇于方丘宿雨頓霽復為頌獻之四年八月平四川明昇基又獻平西頌上為文答焉五年六月句容縣民張觀園生嘉瓜雙實同蒂圓如合璧禮部尚書陶凱奉之以獻詔寘之乾清宫明日薦于太廟宋濓獻嘉𤓰頌二十九年天下多嘉禾之瑞學士劉三吾進嘉禾賦永樂二年八月周王畋于鈞州獲騶虞九月丁未王獻于闕下侍讀梁潛進騶虞詩侍講楊榮進騶虞頌已而甘露屢降嘉禾呈瑞外國獻麒麟白雉元兎白鹿白象靈犀白兎之屬榮與學士胡廣等咸為詩歌以進上嘉之三年九月朔賜太祖御書嘉禾詩于諸王及近臣先是洪武二十八年九月庚戌北平永清衛之龍門有禾異莖同穗上在潛邸遣使馳獻太祖親御宸翰賦長詩一篇以賜上念手澤之存摹勒于石裝治成軸分賜諸王及學士解縉等又適有嘉禾之瑞縉獻嘉禾頌四年二月視學太子親王從上服皮弁御宸翰賦長詩賜祭酒胡儼司業張智坐講文武三品以上及翰林儒臣皆賜坐以聽講畢賜茶明日儼等率師生上表謝賜賚有差大燕羣臣于奉天門學士胡廣進視學詩一時詞林諸儒臣咸和之八年五月己夘上北征敗布尼雅實哩于飲馬河七月壬午駕還士竒獻平邊頌及鐃歌鼓吹詩十二年六月親征衛喇特敗之于薩里噶又敗之于圖喇河擒斬無算八月駕還庶子鄒緝獻永樂清邊頌十七年十一月甘露降于孝陵松柏凡四日學士王直獻瑞應甘露詩十八年正月禮部郎中周訥請封禪大臣有隂主之者於是學士胡廣獻却封禪頌上遂止宣德二年三月騶虞復見大學士楊榮獻頌上褒賞之三年九月榮扈從北征凱旋進平邊詩凡十篇各立題命意上覽之喜屢沐白金鈔幣之賜自是每同逰匪頒榮與士竒等多以詩進遇令節被召宴遊亦多以詩謝恩自正統後此事寢不聞矣紀時政學士宋濓嘗輯洪武聖政記此紀時之政也自後學士解縉有大明帝紀記洪武中事大學士楊士竒有三朝聖諭録紀永樂宣德時際遇召對諸事天順日録則大學士李賢所著雖紀時政然旁及論建與所傳聞是時又有可齋雜記專紀在已見用之事而本院故事多在焉則大學士彭時筆也謇齋瑣綴為學士尹直所記近大學士李東陽著燕對録則孝宗召見語也按宋有時政房每遇上召對即貼黄具冩付之雖勝國亦然若師其迹以憑傳信亦聖政聿新之一助也禁異說先王之制一道德以同俗其有造言非聖者必刑無赦聖祖崇重儒道以濓洛關閩為宗罔敢有悖焉者也永樂中饒州士人朱季友獻所著書斥濓洛關閩之說上覽之怒曰此儒之賊也時禮部尚書李至剛學士解縉侍講胡廣侍讀楊士竒侍側上示以其書縉曰惑世誣民莫甚于此至剛曰不罪之無以示儆宜杖之擯之四裔士竒曰當盡燬其所著書庶幾不悞後人廣曰聞其人年已七十燬書示儆足矣上曰謗先賢毁正道治之可拘常例邪遣行人押季友還饒州㑹布政及府州縣官與其鄉士人明諭其罪而笞以示罰考索其所著書焚之上復諭羣臣曰除惡不可不盡悉毁其所著書最是然成化以後學者多肆其胸臆以為自得雖館閣中亦有改易經籍以私於家者此天下所以風靡也夫評論詩文洪武中上嘗召詞臣賦詩歌以為樂且與評論詩法太子正字桂彦良每應制先衆而就嘗進曰治道具在六經典謨訓誥願留聖意詩非所急也上深然之自是恩遇隆洽稱曰老桂不名永樂七年仁宗東宫贊善王汝玉毎日於文華後殿道說作詩之法一日顧楊士竒曰古人主為詩者其高下優劣如何士竒對曰詩以言志明良喜起之歌南薰之詩是唐虞之君之志最為尚矣後來漢高大風歌唐太宗雪恥酬百王除兇報千古之句則所尚者霸力皆非王道漢武帝秋風辭志氣已衰如隋煬帝陳後主所為則萬世之鑑戒也殿下於明道玩經之餘欲娛意文事則兩漢詔令亦可觀非獨文詞高簡近古其間亦有可禆益治道如詩人無益之詩不足為也仁宗曰太宗高皇帝有詩集甚多何謂詩不足為士竒對曰帝王之學所重者不在詩太祖皇帝聖學之大者在尚書及諸書註作詩特其餘事可姑緩仁宗曰世之儒者亦作詩否士竒對曰儒者鮮不作詩然儒之品有高下高者道德之儒若記誦詞章前輩君子謂之俗儒為人主尤當致辨於此時仁宗監國視朝之暇專意文事因覧文章正宗一日諭士竒曰真德秀學識甚正選輯此書有益學者對曰德秀是道學之儒所以志識端正其所著大學衍義一書大有益學者及朝廷為君不可不知為臣不可不知君臣不觀大學衍義則其為治皆茍而已仁宗即召翰林典籍取閱大喜曰此為治之條例監戒不可無因留一部朝夕自閱又取一部命翻刻以賜諸子諭士竒曰果然為臣亦所當知遂賜一部又嘗與士竒言歐陽文忠公之文雍容醇厚氣象近三代有生不同時之歎且愛其諫疏明白切直數舉以厲羣臣遂命校正重刻以傳廷臣之知文者各賜一部時不過三四人而止恒謂士竒曰為文而不本正道斯無用之文為臣而不能正言斯不忠之臣歐陽真無忝矣故館閣文字自士竒以來皆宗歐陽體也傳問事義祖宗時文學近侍之臣皆靣相問難故聖學有所發明使中官傳問事義自正統後始有之大學士李東陽嘗曰𢎞治中上令中官問龍生九子憶少時于雜書中見之倉卒不能悉具又莫知所出詢之羅編修玘謹疏其五六得於其師左參政贊者止此又詢於吏部劉員外續以故册來靣備録其說亦不知所從出因據以復命盖記問之難如此翰林記卷十一
