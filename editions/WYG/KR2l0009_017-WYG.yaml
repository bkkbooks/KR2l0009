body:
  text: 翰林記巻十七明黄佐撰正官題名學士陶安主敬直𨽻當塗人吳元年由耆儒任終行中書省㕘政宋濓景濓浙江金華人洪武二年由起居注升任終學士承旨宋訥時敏直𨽻滑縣人洪武十三年由助教陞任終祭酒劉三吾名如孫以字行湖廣茶陵人由徴士洪武二十一年任董倫安常北平宛平人由儒士洪武三十一年以禮部侍郎兼王景景彰浙江松陽人由貢士永樂元年任解縉大紳江西吉水人洪武戊辰庶吉士永樂二年任胡廣光大江西吉水人庚辰進士第一永樂十年以大學士兼金㓜孜名善以字行江西新淦人進士永樂十四年四月任楊榮勉仁福建建安人庚辰進士第一永樂十四年四月任終少師黃淮宗豫浙江永嘉人進士永樂十二年任兼右春坊大學士楊士竒名寓以字行江西泰和人儒士永樂十五年二月任終少師楊溥𢎞濟湖廣江陵人進士永樂二十二年任後陞太常卿兼沈度民則直𨽻華亭人由楷書永樂中任惟食禄不視事李時勉名懋以字行江西安福人甲申庶吉士宣德中任錢習禮名幹以字行江西吉水人永樂辛夘庶吉士終侍郎藺從善有恒河南磁州人癸酉貢由教授陞宣德中任王一寧一寧浙江仙居人戊戌進士景泰元年以侍郎兼陳循德遵江西吉安人乙未進士第一正統十年以戸部尚書兼苗衷秉彞直𨽻定逺人辛夘進士第二景泰元年以侍郎兼曹鼐直𨽻寧晉人癸丑進士第一正統十四年以侍郎兼蕭鎡孟勤江西泰和人丁未庶吉士景泰元年以祭酒兼江淵時用四川江津人庚戌庶吉士正統十四年以侍郎兼王文直𨽻束鹿人進士都御史景泰四年兼終少師商輅𢎞載浙江淳安人乙丑進士第一景泰元年任成化三年以侍郎兼李賢原德河南南陽人進士吏部侍郎天順元年兼終少師徐有貞元之直𨽻吳縣人癸丑庶吉士都御史天順元年兼許彬道中山東寧陽人乙未庶吉士天順元年以禮部侍郎兼薛瑄德温山西蒲州人進士大理寺卿天順元年兼終侍郎陳文安簡江西廬陵人丙辰進士第二天順中任終少師林文恒簡福建莆田人宣德庚戌進士第三天順中任李紹克述江西安福人宣徳癸丑庶吉士天順中任黃諫廷臣陜西蘭縣人壬戌進士第三天順二年任彭時純道江西安福人戊辰進士第一天順元年十二月以太常寺少卿兼呂原逢原浙江秀水人壬戌進士第二天順元年任劉定之主靜江西永新人丙辰進士第一成化三年八月以侍郎兼柯潛孟時福建莆田人辛未進士第一成化三年八月以少詹事兼萬安循吉四川眉州人辛未庶吉士成化中任王獻惟臣浙江仁和人辛未庶吉士成化八年任謝一䕫大韶江西新建人庚辰進士第一丘濬仲深廣東瓊山人甲戌庶吉士徐溥時用直𨽻宜興人甲戌進士第二尹直正言江西泰和人甲戌庶吉士劉健希賢河南洛陽人庚戌庶吉士汪諧伯諧浙江仁和人庚戌庶吉士張元禎廷祥江西南昌人庚戌庶吉士程敏政克勤直𨽻休寧人河間軍籍丙戌進士第二吳寛原博直𨽻長洲人壬戌進士第一劉機衡仲順天大興人戊戌庶吉士江瀾文瀾浙江仁和人戊戌庶吉士楊廷和介夫四川新都人戊戌庶吉士梁儲叔厚廣東順德人戊戌進士劉忠司直河南陳留人戊戌庶吉士白鉞秉德直𨽻南宫人甲戌進士第二張芮文卿山西河東運司人戊戌庶吉士靳貴充道直𨽻丹徒人庚戌進士第三蔣冕敬之廣西全州人丁未庶吉士劉春仁仲四川巴縣人丁未進士第二毛紀維之山東掖縣人丁未庶吉士石珤邦彦直𨽻藁城人丁未庶吉士毛澄憲清直𨽻太倉州人癸丑進士第一按天順元年以太常少卿兼侍讀劉儼掌院事二年以尚寶司卿兼侍講李紹掌院事與永樂中祭酒胡儼署院事皆不書者以非學士故事侍讀學士詹同同文直𨽻休寧人洪武初任終學士承旨兼吏部尚書秦裕伯直𨽻大名人元進士洪武中任魏觀杞山湖廣蒲圻人元末仕偽漢洪武中任終蘇州府知府解縉見前金問直𨽻吳縣人由楷書永樂中任終禮部右侍郎曾棨子啓江西吉安人永樂甲申進士第一十五年六月由侍講陞苗衷見前王直行儉江西泰和人永樂甲申庶吉士終吏部尚書李時勉見前錢習禮見前王達達善直𨽻無錫人明經永樂中由助教編修升任陳詢汝同直𨽻華亭人永樂中進士終國子祭酒劉鉉公器直𨽻常州人貢士歴中書舍人正統中任終少詹事陳循見前呂原天順元年十二月任餘見前張益士謙應天江寧人乙未庶吉士中書舍人升任沒於主事錢溥原博直𨽻華亭人進士楷書正統中𫝊奉檢討天順元年任倪謙克讓應天上元人正統己未進士第三天順元年任劉定之天順中任餘見前周洪謨堯佐四川長寧人正統乙丑進士第二成化元年十二月任吳節與儉江西安福人宣德癸丑庶吉士成化三年以太常兼任劉吉祐之直𨽻博野人正統戊辰庶吉士陳鑑緝熙直𨽻吳縣人正統戊辰進士第二成化五年八月任江朝宗東之四川巴縣人正統戊辰庶吉士彭華彦實江西安福人景泰甲戌庶吉士傅瀚曰川江西新淦人天順甲申庶吉士楊守陳惟新浙江鄞縣人景泰辛未庶吉士王獻見前費誾廷言直𨽻丹徒人成化乙丑庶吉士李傑世賢直𨽻常熟人成化丙戌庶吉士李東陽賔之湖廣茶陵人天順甲申庶吉士王鏊濟之直𨽻吳縣人乙未進士第三吳儼克温直𨽻宜興人丁未庶吉士徐穆舜和江西吉水人癸丑進士第三蔣冕見前顧清士亷直𨽻華亭人癸丑庶吉士朱希周懋忠直𨽻崑山人丙戌進士第一侍講學士朱升公升直𨽻休寧人國初以耆儒任潘廷堅升聞直𨽻當塗人耆儒洪武初任危素大樸江西金谿人元學士承旨洪武初任兼𢎞文舘學士王時洪武初由元學士任樂韶鳯致和直𨽻全椒人洪武初以兵部尚書任終祭酒張以寧志道福建古田人洪武初由元學士任李翀葛均俱洪武十六年二月任高巽志名遜志直𨽻蕭縣人儒士洪武末任兼太常少卿武周文直𨽻慶都人儒士永樂初任王英時彦江西金谿人永樂甲申庶吉士終禮部尚書曾鶴齡延年江西泰和人永樂任辛丑進士第一正統中沈度見前劉鉉見前陳循見前蔣驥良德浙江錢塘人洪武末進士行人改升侍講終禮部侍郎馬愉性和山東臨朐人宣德丁未進士第一終侍郎苗衷見前高穀世用直𨽻興化人永樂乙未庶吉士呂原見前李泰文通直𨽻香河人正統戊辰庶吉士劉珝叔温山東夀光人戊辰庶吉士丘濬見前尹直見前汪諧見前李東陽見前焦芳孟陽河南泌陽人甲申庶吉士董越陸簡吳寛見前謝遷于喬浙江餘姚人乙未進士第一武衛廷珍山東沂水人戊戌庶吉士張芮見前楊時暢知休陜西咸寧人戊戌庶吉士毛澄見前吳一鵬南夫直𨽻長洲人癸丑庶吉士屬官題名侍讀王佐洪武二十三年由知縣陞任張信浙江定海人洪武甲戌進士第一唐愚士名之淳以字行浙江山隂人儒士洪武戊寅任王景景彰浙江松陽人教官由薦舉曽日章直𨽻吳江人秀才洪武末由知縣陞任胡靖後改名廣見前王灌永樂初任黃淮見前胡儼若思江西南昌人貢士召試永樂初任終國子祭酒周述崇述江西吉水人永樂甲申進士第二永樂中兼左庶子曾鶴齡見前李時勉見前苗衷見前馬愉見前彭時見前孫曰恭江西豐城人永樂甲辰進士第三林環崇璧福建莆田人永樂丙戌進士第一尹鳯岐江西吉水人永樂戊戌庶吉士陳詢見前習嘉言名論以字行江西新喻人永樂戊戌庶吉士終詹事江淵見前劉珝見前李本立之四川富順人戊辰庶吉士彭華見前劉吉見前陳鑑見前周叙功叙江西吉水人永樂戊戌庶吉士錢習禮見前孫賢舜卿河南杞人景泰甲戌進士第一景泰中任終太常少卿尹直見前丘濬見前陸簡見前董越見前吳寛見前謝遷見前曽彦士美江西泰和人成化戊戌進士第一楊守阯惟立浙江鄞人成化戊戌進士第一楊廷和見前劉機見前江瀾見前白鉞見前毛紀見前羅玘景鳴江西南城人丁未庶吉士傅珪邦瑞直𨽻清苑人丁未庶吉士徐穆見前翟鑾仲鳴山東諸城人乙丑庶吉士徐縉子容直𨽻吳縣人乙丑庶吉士朱希周見前侍講戴彞德􅂜浙江奉化人洪武甲戌進士第二終左拾遺方希直浙江寧海人洪武末由薦舉任終文學博士樓璉士連浙江金華人洪武末任楊士奇見前金㓜孜見前王進汝嘉直𨽻長洲人由薦舉永樂初任王洪希範浙江錢塘人進士永樂中由修撰陞禮部主事陳循見前曹鼐見前胡儼見前陳敬宗光世浙江慈谿人永樂甲申庶吉士終國子祭酒鄒緝江西吉水人由明經永樂中任終左庶子羅汝猷名肅江西吉水人永樂甲申庶吉士洪熙初降御史終侍郎余學䕫一䕫江西泰和人永樂甲申庶吉士劉永清正統中任陞廣東左布政使劉球求樂江西安福人永樂辛丑進士主事改任儀銘克新智之子儒士正統中任改郕府藺從善見前諸懋直𨽻丹陽人進士吏科給事中宣德中升任終戸部尚書邢寛見前洪璵浙江淳安人進士刑部主事宣德中升任終吏部尚書陳叔剛福建閩縣人辛丑進士主事改任陳全福建長樂人永樂丙戌進士第二杜寧宗謐浙江天台人宣德丁未進士第二王一寧見前高穀見前胡穜永齊廣之子以任子正統中陞任陳用時顯福建莆田人永樂辛夘庶吉士孫曰恭見前劉鉉見前謝璉重器福建龍溪人宣德丁未進士第二終禮部侍郎徐珵更名有貞見前蔣驥見前萬安見前江朝宗見前李泰見前李永通貫道四川長寧人二天順庚辰進士第楊守陳見前徐瓊時庸江西金谿人天順丁丑進士第二陳秉中宗堯浙江烏程人天順丁丑進士第三彭教敷五江西吉安人天順甲申進士第一程敏政見前焦芳見前謝鐸鳴治浙江黃巖人天順甲申庶吉士陳音師召福建莆田人天順甲申庶吉士董越見前尹龍舜臣山東歴城人成化己丑庶吉士王臣世賞江西廬陵人成化己丑庶吉士終廣西叅政劉戩景元江西安福人成化乙未進士第二王鏊見前楊傑廷俊山西平定州人成化戊戌庶吉士梁儲見前劉忠見前張芮見前張天瑞天祥山東清平人成化辛丑進士第三武衛見前張澯仲湜廣西平南人成化戊戌庶吉士鄧焲廷耀福建閩人成化戊戌庶吉士黄珣廷璽浙江餘姚人成化辛丑進士第二沈燾良德直𨽻長洲人𢎞治癸丑庶吉士吳一鵬見前豐熙原學浙江鄞人𢎞治己未進士第二顧鼎臣九和直𨽻崑山人𢎞治乙丑進士第一趙永爾錫直𨽻臨淮人壬戌庶吉士李時宗易直𨽻任丘人壬戌庶吉士穆孔暉伯潛山東堂邑人乙丑庶吉士五經博士馮巨江陜西蒲城人由薦舉永樂初任尋致仕王汝玉名璲以字行直𨽻長洲人永樂初由薦舉任王進名璡字汝器汝玉之弟後更名永樂中任由訓導陳繼嗣初直𨽻吳縣人由薦舉洪熙初任國子博士改任張伯穎金玉鉉潘宸時用浙江松陽人薦舉𢎞治初任終太常卿典籍吳伯宗名同以字行江西金谿人洪武辛亥進士第一孫蕡仲衍廣東南海人洪武庚戌進士左遷蘇州府經歴聶鉉江西清江人洪武辛亥進士任致仕復起為㑹試考官馬定洪武中任張敏行洪武中任羅奎王偁孟陽福建永福人國子生永樂中任遷檢討劉中質江西分宜人儒士任訓導洪武中任終禮部尚書陳夀梁時戴安鄭叔美金實用誠浙江開化人儒士永樂初任李錫王汝玉永樂七年以右贊善兼檢討降任高廷禮名㨗以字行福建長樂人儒士永樂中任王恭福建閩人儒士永樂中任藍朂周翰維翰浙江鄞人貢士永樂丙戌副榜覆試第一終檢討牛麟張禮沈度潘畿黄約仲名守以字行福建莆田人徐佖彦容直𨽻興化人丁酉貢士天順元年充㑹試同考吳孜侍書楊崧聶同文江西臨川人進士洪武