body:
  text: 翰林記卷九明黄佐撰御前講論經文己亥年正月聖祖克婺州置中書分省召諸名儒㑹食省中日令二人進講經史敷陳治道此論道講學之始也即王位則設博士㕔令博士許存仁等日講尚書等書及有天下令文學侍從之臣毎於御前講說經史無定日亦無定所尋設華蓋文華武英等殿說書以儒士沈徳輩為之其後惟本院及殿閣大學士專其事罷諸殿說書官然聖學緝熈甚力毎進講必反覆討論以求義理之極致講畢必及政事以為常當是時未有經筵之名也洪武三年二月上御東閣學士宋濓待制王禕等進講大學𫝊之十章至有土有人濓反覆言之上曰人者國之本徳厚則人懷人安則國固故人主有仁厚之徳則人歸之如父母人心既歸則有土有財自然之理也若徳不足以懷衆雖有財亦何用哉十六年八月上御謹身殿東閣大學士吳沈等進講周書㒺有立政憸人上曰有小人必敗君子故唐虞任禹稷必去四凶魯用仲尼必去正卯沈曰書云去邪勿疑所以深致其戒上曰國家不幸有小人如畜毒藥不急去之必為身患小人巧於恱上忍于賊下君若但喜其順適己意任其所為而不問辟如犬馬傷人人不怨畜犬馬者乎十八年九月御文華殿命文淵閣大學士朱善講周易至家人上曰齊家治國其理無二使一家之間長㓜内外各盡其分事事循理則一家治矣一家既治逹之一國以及天下舉而措之耳朕觀其要只在誠實而有威嚴誠則篤親親之恩嚴則無閨門之失善對曰誠如聖諭大學士李賢曰髙廟㸔書議論英發駕宋儒而上之毎儒臣進講必有辯說因講攻乎異端斯害也已辯曰攻是攻城之攻已止也孔子之意蓋謂攻去異端則邪說之害止而正道可行也宋儒乃以攻為專治而欲精之為害已甚豈不謬哉如此之類所辯甚多自漢唐以來人君能事詩書如此留意者亦不多見蓋由聖資髙邁所以不襲故常而發前賢之所未發也太宗仁宗宣宗皆因之不設經筵宣徳四年三月上退朝御便殿與儒臣論史因問漢唐諸君在位孰久以武帝𤣥宗對上曰漢武末年懲過𤣥宗久而恣欲漢武猶為彼善於此六年三月上視朝退御便殿命翰林儒臣進講大學平天下章竟上曰治天下國家不可無財用即如生之者衆四語行之不必暴征横斂而國用有餘矣又曰秦誓曲盡君子小人情状人君審乎此則好惡用舍當矣蓋列聖真有得乎學問思辨而後見之躬行以施於治非惟徒事口耳而已若進講之際上無所問下無所陳徒美觀聽非所謂聖學也御前進讀祖宗時設官侍上讀書日在左右或使進讀必諦聴而折衷之髙帝嘗御華蓋殿文淵閣大學士朱善進讀心箴畢上曰人心道心有倚伏之幾蓋仁愛之心生則忮害之心息正直之心存則邪詖之心消羞惡之心形則貪鄙之心絶忠慤之心萌則巧偽之心伏故人常持此心不為物欲所蔽則至公無私自無物我之累矣嗚呼大哉聖人之言乎帝王萬世心學之要旨不外乎此他如讀經及史見于四朝寶訓者俱有評隲不可悉記今進讀之制寖已渝昔矣講章進講以講章進呈始于太宗朝永樂二年八月學士解縉等進呈大學正心誠意講章上覽之至再諭縉等曰人君誠不可有所好樂一有好樂泥而不返則欲必勝理若心能静虛事來則應事去如明鏡止水自然純是天理朕毎退朝黙坐未嘗不思管束此心為切要也楊士竒等先於六月亦進呈文華殿大學講義上覽畢稱善因曰先儒謂堯典克明峻徳一章一部大學皆具士竒對曰誠如聖諭堯舜禹湯文武數聖人凡修諸躬施於家國天下者皆大學之理上曰孟子道性善必舉堯舜爾等於講説道理處必舉前古為證庶幾明白易入又曰帝王之學貴切已實用講説之際一切浮汎無益之語勿用此則聖意因覽講章而旁及經書者也蓋留神融㑹必妙悟至理而後已祖宗時皆如此所謂援古為證勿用浮辭尤講章之定式其後講官將進呈講章先期送内閣㸔定封進遂為例然流弊多繁詞頌美漸失初意成化初洗馬楊守陳進講不為謟語一日講武成篇曰魯論稱舜無為而治周書稱武王垂拱而天下治然後世人主有深居禁中委政内侍者召閻樂之禍有髙拱無為惟寵嬖艶者啟祿山之變是何也蓋舜之所以垂拱者由其列爵分土以至崇徳報功無一不究其心皆嘗憂勞以有為乃始佚樂而無為也後世人主則孟子所謂安其危利其菑樂其所以亡者耳惟陛下留意時左右聴者悚然守陳真善於啓廸者矣孝宗時嘗召大學士劉健李東陽謝遷議事因謂曰昨日令李榮來説日講時劉機講陳善閉邪陳字觧做陳説不是止云敷陳其説乃可耳皆應曰諾李榮蓋所遣中官也健進曰昨李榮又説以善道啓沃他他字不是上微笑曰他字也不妨大抵講書須要明白透徹直言無諱道理皆是書上原有的不是纂出若不説盡也無進益且先生軰與翰林院是輔導之職皆所當言健對曰臣等若不敢言則百官無敢言者矣上曰然遷曰聖明如此講官愈好盡心東陽曰今年聖學緝熙中外臣民無不仰戴臣等敢不仰承聖意皆叩頭謝上又曰先生軰可傳與他不必顧忌昨所講似有顧忌耳又曰他字亦不妨昨因話偶及此意以為不若啓沃之更好然不必深計也皆復謝而出是日天顔和悦似以昨所傳未的恐講官因此有所觀望故特示詳悉如此蓋經筵講章自數嵗以來始去舊時䛕頌之習加以規諫未嘗少忤及聞此諭益知上意所向云講讀合用書籍聖祖潛心道藝於凡經史百家之書無不貫通然毎自博求約惟務得其要聖學益醇如也嘗令儒臣進講四書以大學為先五經以尚書為先今經筵因之諸史舊皆進講今則惟用朱子通鑑綱目若東宫則兼用文華大訓等書𢎞治中學士張元禎上疏勸經筵講太極圗西銘以及諸性理書東宫則用孝經小學孝宗欣然嘉納亟索太極圗以觀曰天生斯人以開朕也然今猶未果用云聖祖嘗問侍臣三代以上所讀何書宋濓對曰上古載籍未立不專讀誦而尚躬行人君兼治教之責躬行以率之天下無有不從其化者矣又問帝王之學何書最要濓請讀大學衍義上覽而悦之令左右大書掲之兩廡之壁時時睇觀之仁宗在東宫聞楊士竒言大學衍義可讀即召典籍取閲既大喜曰此為治之條例也因命翻刻以賜諸子故今經筵以大學衍義進讀後又兼讀貞觀政要竊謂性理諸書固當進講然聖學心法不可廢也衍義政要二書固可備乙夜之觀然祖訓條章尤不可違也開經筵宣徳末年英宗嗣位年纔九齡聖學未及緝熙大學士楊士竒等始奏請開經筵其疏畧曰去年十月内宣宗皇帝御左順門召臣士竒諭之曰明年春暖東宫出文華殿讀書凡内外侍從俱用慎擇賢良㢘謹之臣臣士竒叩頭對曰此國家第一事正維其時伏望皇上留心不幸先帝上賓哀戚之中臣未敢遽言然此事至重不敢乆黙伏望山陵畢早開經筵以進聖學因具合行事宜曰今當豫擇講官必得問學淹貫言行端正老成重厚識逹大體者數人以共其職乞豫命吏部禮部翰林院公同推舉具名陳奏取自上裁又曰天子就學其事體與皇太子親王不同乞先命禮部翰林院詳定講筵禮儀陳奏又曰凡起居出入一應隨侍及使用之人皆宜選擇行動端莊立心行已正當者使在左右如或其人舉動輕佻言語䙝慢立心行已不正者皆宜早去之若不早去隨侍既乆情意相洽不覺其非言聴計從後來欲去其勢難矣此在常人尚須决擇况天子之左右伏望太皇太后陛下皇太后陛下萬萬留意詔可其請正統元年二月降勅曰朕祗奉天命嗣承祖宗大寳統御天下用主神人而即位以來勿遑夙夜永惟厥道必學乃明今以初九日御經筵命爾翰林院春坊儒臣分直侍講夫道原於天堯舜禹湯文武以隆政教而周公孔子闡明之我祖宗世所師法以安天下卿等宜一心竭誠相與討論務歸至當毋隠而弗彰毋曲而徇好庶明之於心誠之於行以興治化以福蒼生用不忝天與祖宗之命欽哉於是以太師英國公張輔知經筵事少𫝊兵部尚書兼華蓋殿大學士楊士竒少傅工部尚書兼謹身殿大學士楊榮禮部尚書兼學士楊溥同知經筵事詹事府少詹事兼侍讀學士王直少詹事兼侍講學士王英侍讀學士李時勉錢習禮侍講學士陳循侍讀田衷侍講髙榖修撰馬愉曹鼐兼經筵官然講官推舉實出内閣吏禮二部承其意而已遂定為制其後各部侍郎國子祭酒出自本院者得與焉然當是時吏部郎中李茂𢎞已竊有君臣之情不通經筵徒為文具之歎矣㑹典所載經筵初開儀今附於此凡經筵初開勅勲臣一人知經筵事内閣學士或知或同知經筵事六部尚書左右都御史通政司使大理寺卿及學士等官侍班翰林春坊等官及國子監祭酒二員進講翰林春坊等官二員展書給事御史各二員侍儀鴻臚寺錦衣衛堂上官各一員供事鳴贊一員贊禮序班四員舉案侯伯一人領將軍先期直殿内官於文華殿設御座及設御案殿内御座之東稍南設講案於御案之南稍東是日早司禮監官先陳所講四書經史各一冊置御案又各一冊置講案皆四書東經史西先期講官撰四書經史講章各一篇豫置於冊内是日早上御奉天門早朝畢退御文華殿陞御座將軍侍衛如儀鴻臚寺官引知經筵及侍班講讀侍儀執事等官於丹陛上行五拜三叩頭禮畢以次上殿依品級東西序立知經筵官序於侍班官上侍儀御史給事中各二員於殿門之内分東西北向立序班二員舉御案置御座前二員舉講案置御案之南正中鴻臚寺官贊進講講官一員從東班出一員從西班出詣講案前稍南北向並立鴻臚寺官贊鞠躬拜叩頭興平身畢展書官一員從東班出進詣御案前跪展四書畢起退立於御案東稍南講官一員進至講案前立奏講某書講畢稍退展書官復詣御案前跪掩四書畢退就東班又展書官一員從西班出進詣御案前跪展經畢起退立於御案西稍南講官一員進至講案前立奏講某經或某史畢少退仍並立展書官復詣御案前跪掩書畢退就西班鴻臚寺官贊講官鞠躬拜叩頭興平身禮畢各退就東西班序班二員舉御案二員舉講案退置原所鴻臚寺官贊禮畢命賜宴鴻臚寺等官及講官皆跪承㫖光祿寺官設宴於左順門宴畢叩頭出經筵月講㑹典載月講常儀云每月初二十二二十二日㑹講先期司禮監官陳設書籍御案如前儀至期候上御文華殿侍衛侍儀執事進讀賜宴禮同但各官止行叩頭禮孝宗時經筵雖隆冬盛暑不廢𢎞治十年四月二日當㑹講以饗太廟有㫖改是月三日至期遇雨又改四日蓋聖學之勤不以事而廢如此經筵日講㑹典載日講常儀云凡日講止用講讀官内閣學士侍班不用侍衛侍儀執事等官侍班講讀等官入見行叩頭禮東西分立先讀四書次讀經或讀史毎本讀十數遍後講官先講四書次講經或講史務在直説大義明白易曉講讀後侍書官侍上習書畢各官叩頭退毎三日一温講將所講書通講一遍若講官中有事故同列代講其直觧則講畢補進講官入直洪武中令儒臣更番入直禁中每日用一員進講遲誤者論罪大學士吳沈嘗坐進講遲誤被劾永樂以後不可考自設經筵後講官不復入直惟令本院及坊局官相輪侍班乆之選為展書官又自展書乃得充月講官若日講則用年資深而品秩尊者正統中修撰商輅侍班上亷知其名諭學士曹鼐等曰商輅著展書宜選一人與輅為對初選王玉弗稱㫖選編修陳文乃俞允未逾月復諭鼐曰商輅陳文著講書蓋自後鮮出親擢云講官趨召聖祖時凡觀書史中有句讀字義未明者必召翰林儒臣質之雖有知書内侍能文字人不得近蓋因是以延接賢士大夫不特紬繹義理而已洪武末侍講方希直有詩云風暖彤庭尚薄寒御爐香遶玉闌干黄門忽報文淵閣天子㸔書召講官即其事也太宗寳訓云上視朝之暇輙御便殿閲書史或召翰林儒臣講論則永樂以後蓋莫不然講官陳論祖宗時講官於講書後得言時政闕失及陳論所見洪武中大學士吳沈進講畢進去邪勿疑之説因曰小人中懐奸邪甚似忠信不可不察上曰然憲宗在東駕時學士劉珝講周書無逸篇文王懐保恵鮮章遂及時事數十天顔豫悦雖不言而深有契於心未幾嗣大位即却貢獻减財賦罷諸道鎮守官皆昔所論也𢎞治中侍講學士李東陽大旱應詔言事摘經筵所講孟子中要論切於治道者析為數條極論其理而時政得失以類附焉上嘉納之雖非面陳然均之為啓沃之義經筵恩賚正統初經筵始開錫宴於禮部知經筵官賞白金八十兩寳鈔四千貫文綺四表裏同知經筵及講官賞白金五十兩寳鈔二千貫文綺四表裏侍班官賞白金三十兩寳鈔三千貫文綺二表裏餘皆賞寳鈔有差次日具表稱謝有曰萬幾有暇恒親御於經筵多聞是求肆詳延於儒雅臣等荷絲綸之飭勵繼宴錫之駢蕃於緝熈單厥心允恊周成之徳念終始典于學敬陳商説之篇已而講官各賜廂玳瑁香帯大紅織金紗羅襲衣冠履皆具雖修撰與焉景泰後恩賚不可考天順八年八月憲宗御經筵講官學士柯濳等賜金三十兩寳鈔三千貫文綺二表裏而庻子侍講徐溥侍讀倪岳編修彭華等與焉成化四年十二月賜經筵儒臣七人襲衣冠履時柯潛已聞父䘮上命即其家賜之十二年大學士商輅等題奏言太常寺卿兼侍讀劉珝日侍經筵進講經史其勞與少詹事兼侍讀學士柯潛李泰同但翊以三品而兼翰林屬官㑹揖之際甚為不便宜於所兼侍讀之下加學士二字從之十四年四月十一日皇太子御左春坊進講大學首章退宴文華門十二日上御經筵進講中庸二十章退宴左順門寵錫稠叠詞林詫以為前此所未有也孝宗時尤重經筵多有匪頒之賚學士程敏政記其事云𢎞治元年三月十二日初開經筵賜宴白金及寳鏹十三日早文華後殿進讀尚書孟子及午乃進講大學衍義以為常讀畢賜宴講畢賜茶上皆呼先生而不名四月二十八日以後屢賜鮮筍桃杏郁李蓮房筥上黄封或題上林苑監進乾清宫八字或題上林苑海子進乾清宫九字或題司苑局進乾清宫茶房上用十一字敏政等具表稱謝且紀之以詩有曰黄封盡帯乾清字朱實平分上苑香七月二十日文華後殿講畢上顧中官賜講臣冠帯鞾袍臣敏政與賜織金雲鴈緋袍一對又金帯一及烏紗㡌皂鞾面謝訖上顧謂曰先生辛苦共對曰此皆職分當為頓首而退有詩紀之云日上罘罳曉殿深湛恩稠叠駕親臨對衣紅濯天機錦束帯黄分内帑金乆幸清班容宦履漸慚華髪㸃朝簮經生職分尋常事消得君王念苦辛時上最重儒臣學士張元禎短小毎進講上特為低几就聴之正徳元年開經筵賜宴及白金綵幣有差知經筵事者太師兼太子太師英國公張懋少師兼太子太師吏部尚書華蓋殿大學士劉健同知經筵事者少傅兼太子太傅戸部尚書謹身殿大學士李東陽少傅兼太子太傅禮部尚書武英殿大學士謝遷兼經筵官禮部右侍郎王華少詹事兼學士劉機江瀾楊廷和太常少卿兼侍講學士楊時暢國子監祭酒張燦學士劉忠白鉞劉春太常少卿兼侍讀費宏左春坊左庻子兼侍讀毛澄左春坊左諭徳兼侍講毛紀傅珪右春坊右諭徳兼侍講蒋冕侍讀羅玘修撰石珤也然武宗後多事宸逰經筵罕御云翰林記卷九
