body:
  text: 翰林記卷十八明黄佐撰大學士題名華蓋殿劉仲質由禮部尚書洪武十五年十一月任楊士竒永樂二十二年八月由左春坊大學士陞禮部左侍郎兼任張英子玉直𨽻邢臺人貢士宣德元年以禮部尚書任陳循景泰七年五月以少保兼太子太傅户部尚書兼任徐有貞天順元年三月丙子尚書武功伯兼任李賢萬安劉吉劉健李東陽楊廷和梁儲謹身殿楊榮永樂二十二年九月丁酉以太子少傅兼任陳山子高福建沙縣人教官宣德二年以戸部尚書任高穀景泰七年五月以少保兼太子太傅工部尚書任王文景泰七年五月以少保吏部尚書兼任萬安商輅成化十三年四月以太子太保吏部尚書兼任劉珝劉吉徐溥劉健李東陽焦芳楊廷和梁儲蔣冕文華殿全思誠希賢直𨽻華亭人儒士洪武十五年兼春坊中允權謹徐州人孝子洪熙元年任尋改通政司右叅議武英殿吳伯宗洪武十五年由檢討任黄淮永樂二十二年八月以通政司任金㓜孜永樂二十二年九月以太子少保兼任楊溥正統三年四月以少保兼任徐溥劉健丘濬𢎞治七年陞少保兼任謝遷王鏊劉忠梁儲費宏楊一清靳貴毛紀文淵閣宋訥洪武十五年十一月由大學士改任朱善洪武十八年二月由待詔陞任胡廣永樂十四年四月乙亥由學士改任楊榮永樂十八年閏正月丙子任兼本院學士金㓜孜陳循景泰元年十一月以太子太保兵部尚書兼任商輅成化十一年四月以戸部尚書兼任劉珝徐溥劉吉劉健丘濬李東陽謝遷楊廷和靳貴蔣冕袁宗臯東閣吳沈洪武十五年十一月由典籍陞王文景泰四年以少保吏部尚書兼任高榖景泰元年十一月以太子少保工部尚書兼任謝遷詹事府題名詹事唐鐸直𨽻鳯陽人洪武中以太子太保兵部尚書兼辛彦德由左僉都御史洪武二十九年六月陞任任亨泰見前洪武中任金忠浙江鄞人燕府長史永樂中以兵部尚書任蹇義宜之四川巴人洪武乙丑進士永樂中以吏部尚書兼任向寶江西進賢人洪武乙丑進士洪熙元年以右都御史任黄福如錫山東昌邑人永樂中以户部尚書任習嘉言陳文彭華成化十七年任尋兼學士費誾少詹事李文吉趙毅河南汝陽人儒士永樂中以兵部右侍郎任墨麟永樂初以兵部右侍郎任任亨泰祝春郭敦山東堂邑人貢士永樂中以吏部侍郎兼任俞士吉浙江寜波人永樂中以刑部侍郎任郭璡直𨽻新安人永樂中以吏部侍郎任王英宣德初兼侍讀學士任王直宣德初兼侍讀學士任曾棨宣德初兼侍讀學士任鄒濟浙江餘姚人由訓導任吳中山東武城人宣德中以工部尚書兼薩琦正統末以禮部侍郎兼柯潛兼學士萬安李泰兼侍講學士徐溥兼侍講學士王獻兼學士彭華黎淳費誾汪諧𢎞治初兼侍講學士陸簡兼侍講學士張昇吳寛謝遷王鏊周詒府丞楚樟山東朝城人洪武中由明經杜澤山東沂水人由訓導洪武中任吏部尚書朱原貞陸中善周孟簡黄宗載江西豐城人進士永樂中以吏部侍郎兼李齡景齡廣東潮陽人貢士由學士正統末陞任楊守陳李侃以上惟録事主簿通事舍人不可考姑闕之以俟知者春坊題名左春坊大學士董倫李至剛名銅以字行浙江寧海人明經永樂初禮部尚書任楊士奇胡廣曾棨商輅楊廷和右春坊大學士解縉永樂李至剛左春坊大學士兼黄淮王英劉儼兼侍講景泰三年任呂原左春坊左庶子劉靖鄭濟黄淮永樂初兼侍讀任鄒緝周述鄒濟永樂九年由吏部郎中陳山永樂中舉人由教官遷吏科給事中洪熙元年任童縁王㒜成化初兼侍講徐溥黎淳李東陽劉健張昇吳寛謝遷毛澄右春坊右庶子關賢王􅮆胡廣永樂初任兼侍讀楊榮王直李紹景秦中任兼侍講周旋劉定之童縁劉宣陸簡董越左春坊左諭德秦墉盧德明趙肅趙瑁河南宜陽人儒士洪武中由知府任吏部尚書胡儼楊士竒周述王獻兼修撰成化五年任謝一䕫黎淳李旻曾彥楊守阯劉春費宏毛紀傅珪温仁和顧鼎臣董玘右春坊右諭德張昌何顯周直𨽻内黄人洪武中任楊榮金㓜孜趙琬黎恬潛暉江西清江人進士知府正統中任林誌兼侍讀宣德中任童縁劉宣劉健汪諧傅瀚劉戩王鏊王華蔣冕毛澄倫文叙豐熙趙永李時左春坊左中允全思誠徐永達吳嘉靖永樂中新淦學訓導任于敬永樂七年任李賢永樂七年任張宗璉重器江西吉水人甲申庻吉士洪熈元年任尹昌隆周幹林長懋孔諤宣聖五十七代孫永樂七年由舉人乙榜第一王愷永樂初由知縣陞高夀永樂中由寜州學正陞蔣禮楊鼎倪謙周經孫賢吳儼楊廷和傅珪賈詠右春坊右中允金㓜孜李貫永樂初任兼修撰王英劉子春韓守益黄宗義朱孔暘裴璉汝器湖廣監利人監生任御史永樂九年陞任吳均永樂中由中書舍人陞任黄琮永樂九年由北京國子監助教陞任儀智山東高密人教官永樂初以右通政兼終禮部左侍郎趙文永樂九年由岳州府學教授陞任戴綸呂原兼侍講景泰三年任劉珝柯潛兼修撰景泰三年任景暘左春坊左贊善門克新陜西秦州人儒士洪武中任終禮部尚書凌漢謝三吾馮叡許思温永樂初以吏部左侍郎兼陳仲完見前仍兼編修梁敬徐善述好古天台人由教官陞博士永樂中任王汝玉永樂七年兼編修牛綸周汝謨劉俊張元禎張昇費宏右春坊右贊善王俊華馮冕河南孟縣人儒士洪武中任終刑部尚書李繼鼎順天大興人監生永樂初以禮部郎中兼任陳濟直𨽻武進人儒士永樂初任王汝玉永樂任兼檢討梁潛永樂五年以修撰兼錢溥楊時暢左春坊左司直郎魏德夀洪武中任汪仲魯直𨽻休寧人儒士洪武初任徐善述永樂中任王子沂金實王㵸永樂七年由庶吉士任許勝永樂九年由御史陞蔣驥高穀萬安李恭右春坊右司直郎曾恕王文貴四川中江人洪武中進士任終太僕右少卿晁鑄景範河南郾城人由助教永樂初任八年以年八十致仕王邦彦劉端陞大理寺丞林聰季聰福建寧德人進士由都給事成化初陞左春坊左清紀郎宋賔河南洛陽人大學士洪武中任終右布政使楊正永樂初由刑部司務陞右春坊右清紀郎黄恭德江西瑞州人貢士洪武中任終吳王府審理正楊斌永樂初由國子博士陞左春坊左司諫袁實郭濟劉允恭張輗周冕程禧黄貫右春坊右司諫顧道張伯原張詳梁良司經局題名洗馬詹紱同之孫洪武中任楊溥永樂初任仍兼編修姚友直芮善藺從善柯潛景泰中任兼修撰李紹景泰中任兼修撰劉定之司馬愉楊守陳江朝宗羅璟梁儲楊傑滕霄校書吳牧永樂初由户科給事中兼杜澤梁儲劉真徐溥丘濬傅瀚吳儼靳貴正字桂彥良名偁以字行慈谿人儒士洪武初任終長史魏德夀洪武中任林文儒士洪武十二年試職江秉心梁質永樂初由吏科給事中兼金問王雅劉鉞趙昻謝宇周文通劉棨題名雜志翰林院學士承㫖宋濓詹同樂韶鳯翰林院直學士范常直𨽻滁州人薦舉洪武十一年任陳桱子桱浙江人翰林院待制王禕見前洪武初任張羽來儀浙江烏程人薦舉洪武初任終太常寺丞黄哲庸之廣東南海人薦舉洪武初典籖陞任吳沈王僎秦裕伯翰林院應奉趙震殷哲山東膠州人貢士洪武中任終中書左丞郭傳唐肅處敬浙江山隂人儒士洪武中任翰林院典簿瞿莊鄒孟逵太子贊善大夫宋濓孟益李希顔河南陜縣人章溢三益浙江龍泉人洪武初以御史中丞兼任庶吉士題名按洪武乙丑庻吉士陳湛等永樂甲申科凡六千人在本院讀書其選在文淵閣進學者同云首甲曽棨等凡二十八人後増周忱為二十九人楊相王直王訓浙江開化人刑部主事終禮部彭汝器余學䕫童朴劉子欽盧翰邦臣江西星子人刑部主事熊直江西豐城人王道羅汝敬沈升浙江寧海人刑部主事柴廣敬王英全鼎楊流江西吉安人終刑部主事段民時舉直𨽻武進人刑部主事終戸部右侍郎洪順刑部主事楊勉宗朂應天江寧人刑部主事終刑部右侍郎吾紳章敞尚文浙江㑹稽人刑部主事終禮部左侍郎李時勉倪維哲福建晉江人刑部主事終郎中陳敬宗袁添禄湖廣衡山人已上應二十八宿之數周忱恂如江西吉水人刑部主事終工部尚書蕭省身江西泰和人終左布政使林正李昌祺名祺以字行江西泰和人禮部郎中終左布政使江鐡福建建安人御史終叅政杜欽王昇黄惟正郎慶徐安鄭蘭徐聽聰羅亨信田忠周玉張宗璉重器江西吉水人刑部主事遷中允陞大理寺丞李貞張侗獨孤樂善蕭寛江西吉水人兵部主事終左布政使孫子良浙江海寧人兵部郎中終左叅政洽順魏暹喻則成白瑜自蕭省身以下俱係不與文淵閣數永樂丙戌科十三人江殷胡啓先張叔豫孫迪李岳潤陳孟潔鄭復言張文選蕭福曽春齡曹閭盧永黄獻永樂辛夘科楊慈錢習禮陳遂陳用王源黄夀生劉永清丁濬馬信李衡直𨽻當塗人授主事終工部右侍郎永樂甲辰科方復成敬王道方懋德永樂乙未科王翺九臯直𨽻鹽山人大理寺正終吏部尚書高榖許彬陳鏞禮部主事曹義張益連智劉應麟黄瓛宋魁宋琰鄭雍言周貴永樂戊戌科周叙楊珙陳詢習嘉言尹鳯岐董璘莫紹賢黄宗載周懋昭羅坤泰宣德丁未科蕭鎡宣德庚戌科薩琦吳節王振更名詢王玉賴世隆逯端董鏞錢塘人永豐知縣江淵李棠方熙鄭建尹昌劉實宣德癸丑科三科共二十八人在文淵閣進學徐珵更名有貞姜洪何宣李紹劉益葉元桂浙江永嘉人知縣林補正統丙辰科是科几十四人在外公署讀書後令部試政王鑑欽正江西雷復景陽湖廣人劉鉞伊侃趙象正統戊辰科是科凡二十人在外公署讀書萬安劉吉劉珝李本李泰邢讓王恕宗貫陜西三原人大理寺評事終吏部尚書尹旻同仁山東歴城人給事中終吏部尚書孫昱廷昭山東人景泰辛未科二十五人首甲柯潛等同進學于東閣吳滙周輿戚瀾童縁王獻劉宣楊守陳張業江朝宗劉清亷夫主事終兵部侍郎景泰甲戌科十八人在館修寰宇通志丘濬夏時耿裕孟勲彭華劉釪伏和江西人吳禎嚴淦尹直金紳縉卿馮定寗珍何琮陳政宣之番禺人御史終雲南副使陳龍元亮牛綸黄甄王寛天順庚辰科十五人此後俱在公署讀書劉健張元禎周經汪諧楊英希正福建建安人鄭紀王範張熙天順甲申科李東陽謝鐸傅瀚陳音張泰倪岳焦芳吳希賢郭璽文瑞劉大夏時雍湖廣華容人主事終兵部尚書張逵張敷華公實江西人計禮汝和江西人主事劉淳尚質四川巴人中書舍人吏部員外郎成化丙戌科二十四久林瀚章懋黄仲昭李傑商廷臣莊㫤石淮王俊世英福建人陳晟美宣南海人主事終知府畢瑜廷珍章溢元孟宋應奎成化己丑科十五人費誾陳斌德章廣東順德人御史尹龍王臣喬維新方珪李介馮蘭佩之成化戊戌科梁儲鄧焲劉忠敖山劉機楊傑江瀾武衛馬廷用張澯楊時暢于材徐鵬張芮楊廷和李經陳璚陳邦成化丁未科三十人程楷華巒蔣冕傅珪羅玘蘇葵黄穆吳儼李遜學石珤毛紀歐陽鵬李充嗣劉丙鄭照李漢楊亷鄒智任儀萬宏璧方逵伍符李文祥閻价𢎞治癸丑科二十人顧清周玉沈燾吳一鵬汪俊黄瀾薛格吳蕣楊昇蕭柯陳玉王崇文王縝文質廣東東莞人給事中終南京戸部尚書許天錫啓𠂻福建人曹鏷良金汪獲麟𢎞治丙辰科二十人顧潛濮韶楊禠陳鳯梧賈詠汪偉陳琳玉疇福建莆田人劉瑞王九思陳霽葉徳張紹齡夀卿廣東番禺人王崇獻華㫤文光直𨽻無錫人給事中終左布政使陳諮陶諧徐春陳暘𢎞治壬戌科二十人胡煜魯鐸趙永畢濟川何瑭温仁和李時滕霽潘希曽仲魯浙江人給事中終右都御史王萱李貫薛金盛端明周禎王廷相朱袞吉時張禬顧􅋫李元吉𢎞治乙丑科三十人崔銑嚴嵩湛若水陸深徐縉翟鑾蔡潮高濬林文迪傅元邵天和穆孔暉叚炅安邦易舒誥胡鐸孫紹先張邦奇方獻科黄如金閔楷馬卿李艾安磐趙中道倪宗正張九叙王韋劉寓生蔡天祐正德辛未科三十三人許成名尹襄張潮劉朴孫承恩劉棟劉泉王思應良張璧吳惠費寀張衍慶林文俊孫紹祖王元正金臯陳寰張鰲山許復禮田荆郭維藩劉䕫洗尚文戴顒劉成德黄臣俞敦張翀王道徐之鸞邊寭祝續正德丁丑科三十四人汪佃余承勛汪應軫黄易江暉王廷陳史道劉世盛陳沂曹懐馬汝驥汪思葉式鄭自璧鄺灝季芳史于光閻閎劉世揚王邦瑞席春葉桂章王三錫湯惟學張星曹嘉廖哻許宗魯劉穆楊士雲蕭與成黎貫林時儲昱正德辛巳科二十四人廖道南江汝璧詹泮鄭一鵬童承叙黄佐杜桐倫以諒王相王同祖張袞葛鴻張治王用賔張逵趙廷瑞李佶吳文之陳講李黙盧煥丁汝䕫董仲言李春芳翰林記卷十八
