body:
  text: 翰林記卷七明黃佐撰議禮上祖宗時凡國家禮樂制度皆命本院儒臣議而行之咸取自上裁洪武元年二月壬寅朔中書省臣及學士陶安等進郊社宗廟議曰圜丘曰方丘曰宗廟曰社稷各具沿革安等奏天子大社必受風雨霜露以逹天地之氣若亡國之社則屋之不受天陽也今於壇創屋非宜若祭而遇風雨則于齊宫望祭上是之又定宗廟時享之禮安與侍講學士朱升待制詹同等奏漢以下廟皆同堂異室四時皆合祭今四廟特享宜倣之上命春特祭餘三時合祭如古制二年三月戊戍朱升等奏敕撰齊戒文大祀四日戒三日齊凡七日中祀三日戒二日齊凡五日上命凡祭天地社稷宗廟山川等神是為生靈祈福下令百官一體齊戒若自有所禱不關于民者不下令八月定大祀受誓戒九月乙巳詔以司中司命司民司祿及壽星五神為中祀命翰林院撰文七年六月乙卯上以大祀終獻畢方行分獻於禮未當用宋濓詹同議以上行初獻禮奠玉帛將畢分獻官行初獻禮亞獻中獻皆如之八月辛酉監察御史答祿與權請行禘祭事下禮部太常寺翰林院議以為虞夏商周四代世系明白其始所從出可得而推故禘禮可行自漢唐以來世系無考莫能明其始祖所自出當時所謂禘祭不過合已祧之主序昭穆而祭之乃古之大祫非禘也宋神宗嘗曰禘祖之所自出是則莫知祖之所自出禘禮不可行也今國家既追尊四廟而始祖之所自出者未有所考則於禘祭之禮似難遽行上是其議八年十一月乙丑詔翰林院考定大祀登壇脫舄之禮學士樂韶鳳奏祭日大駕臨壇入幕次脫舄升壇執事等官皆脫舄於外以次升壇供事協律郎樂舞生依前跣襪就位祭畢降壇納舄從之十二年正月乙卯合祀天地於南郊詔翰林儒臣紀其事九年五月乙丑將有事於方丘適有晉王妃之喪上命宋濓考古制以聞對曰郊社之禮國之大事聖人所重雖有三年之喪亦不敢廢示有尊也二十五年六月戊辰以皇太子喪時享在邇命翰林院禮部議之學士劉三吾等奏王制三年不祭惟天地社稷不敢以卑廢尊宋真宗居喪易月服除之明年遂享太廟祀天地服衮冕車輅儀物音樂緣神事者不廢其鹵簿鼓吹諸樂皆備而不作定議天地社稷先師歷代帝王等神宜如宋制惟太廟先祖神靈所在國既有喪而時享用樂恐神不樂所宜亦備而不作從之已而上自以已意定郊廟禮樂庶吉士解縉嘗上疏言六經殘缺莫甚於禮樂宜正禮經及訪求審樂之儒作樂書又言祀天宜復掃地之規尊祖宜備七廟之制太常非可以肄俗樂上嘉其議先是洪武二年八月詔天下郡邑舉素志高潔博通今古練達時宜之士年四十以上者禮送至京纂修禮書二十年十月諭禮部集諸儒臣寮尊卑禮儀舊制重加刪訂凡二十六條行之改元之初即定釋奠先師仲春仲秋二上丁日降香遣官祭於國學又詔定親征遣將諸軍禮及官民喪服之制又定太歲風雲雷雨嶽鎮山川城隍諸神祭禮其冠禮皇太子冠翰林院撰祝文祝辭因定天子冠禮尋定皇太子親王及士庶婚禮俱本院偕中書省臣議上其王國禮樂及合祀山川之儀則本院禮部與王府官議上遂命燕齊祭東海齊魯祭東鎮秦蜀祭西海晉祭北海若晉王妃謝氏喪秦愍王喪懿文皇太子喪孝慈皇后喪則專詔本院定議以聞成穆貴妃薨詔本院稽古典定喪服之制令父母俱斬衰三年子為庶母服朞年書成頒行曰孝慈録又考議陵寢朔望節序之祭及祭前代忠臣用便服行禮等節目亦皆本院所定今見於諸儒所纂大明集禮洪武禮制等書雖損益古今之宜然多出自聖意衆莫敢違也雖敢言如解縉明指其非古然上亦未嘗以其異已而罪之也夫以異已者為罪則必以迎合者為功則是禮樂自臣下出也於戲聖祖之慮之逺如此議禮下開國之初命儒臣議定郊祀等大禮承平後雖時有所損益不過喪葬祧祔名號宴賀儀文度數之屬永樂十一年十二月鴻臚寺奏習正旦賀儀上召禮部及本院官問曰正旦日食百官賀禮可行乎尚書吕震對曰日食與朝賀之時先後不相妨侍郎儀智曰既然同日免賀為當上顧問翰林諸臣古有日食行賀禮否楊士竒對曰日食天變之大者前代元正日食多不受朝宋仁宗時元正日食富弼請罷宴徹樂宰相吕夷簡不從弼曰萬一契丹行之為中國羞後有自契丹回者言遼是日罷宴仁宗深悔今免賀誠當上遂免賀及宴仍賜百官節鈔十四年十一月周王橚楚王楨相繼來朝例次日謁孝陵周王先至適遇節上命東宫皇太孫及小皇孫陪謁已出東華門上遽召楊榮金幼孜楊士竒問謁陵展敬之位如何士竒對曰周楚二王屬尊當列稍前兩傍東宫殿下列稍後居中皇太孫殿下亦居中列於東宫之後諸皇孫與皇太孫同班而分列兩傍上曰爾所言有據乎對曰宋儒朱熹家禮大約如此上曰吾未嘗熟家禮但據已見書其位次遂出宸翰所書正與所言合然下有六字未書授筆命足之遂遣鴻臚丞周升馳賫赴陵俾率行之二十二年九月禮部尚書吕震言於仁宗曰今喪服已踰二十七日請如太祖倣漢制釋縗易吉服奏巳士竒謂震曰今喪服未可比此例蓋洪武有遺詔且仁孝皇后崩太宗皇帝在上縗服後仍服數月白衣冠絰帶今上於皇考乃遽即吉乎時黃淮議同士竒然不敢明言忤震震出忿言尚書蹇義從旁解之曰渠言當理國家事公豈應偏執己見請兼取二說明旦皆素衣冠黑角帶遂偕六部都察院具奏報可明旦上素冠麻衣絰帶視朝文臣惟學士武臣惟英國公如上所服餘皆從義等所定朝退上召蹇義夏原吉及士竒等諭曰吕震昨奏易服云皆與汝等議定然後奏時吾已疑其非但聽臣下易之梓宫在殯吾豈忍易後聞士竒有言始知震妄士竒所執是因嘆曰張輔知禮六卿乃有不及又顧義曰汝所折衷亦未當然不必再以語人羣臣聽其便十二月庚午百官習新正儀於海印寺用樂明日士竒等進言近禮部與臣等已議定新正朝儀不用樂昨日習儀所仍用樂不改今四方朝覲官皆集於此觀禮乞敕禮部設樂不作不報蓋入吕震之言也楊榮金幼孜皆欲已榮即趨出士竒與淮不可三人遂復進言夜漏下十刻未得㫖不肯退遂有㫖命禮部設樂不作正月二日特召士竒等四人至奉天門諭之曰吕震每事誤朕卿等所執停樂最是夫為君以受直言為美不受直言則過益深焉為臣以能直言為賢不能直言則忠不盡如昨日朝㑹若從震言今悔何及自今遇朕行有未審但盡意言之母以不從為慮各賜鈔千緍文幣一表裏天順中聖烈慈壽皇太后崩上見學士李賢所服斬衰與衆異取視之乃知賢服制合古即以為法命宫中悉易之孟冬享太廟適大喪禮未終上以問賢賢言且俟釋服後庶人情事理兩安上從之癸未春上以足疾不視朝召賢曰大禮將至而疾未愈欲遣官代行可乎賢曰亦須至壇所雖不能行禮人心亦安上至齊宫復召賢曰朕惟俯伏難興欲令一人扶之何如賢曰陛下能力疾行禮尤見敬天之誠遂成事而還上以母后胡氏因疾請尊號靜慈仙師非令典欲上皇后尊諡而左右以為不便召問賢賢曰陛下此一念天地鬼神實臨之然臣之愚必須陵寢享殿神主皆如奉先殿之式庶幾稱陛下之明孝不然為虛文上即命舉行尊恭讓章皇后乃英廟嫡母也憲宗即位內臣夏時昌言錢后久病欲專致隆於上生母賢與彭時援遺詔執不可夏入傳仁壽宫㫖曰子為皇帝母當為太后豈有無子稱太后者耶時曰今日與宣德末年事不同胡后曾上表讓位退居别宫故正統初不加尊號今日名分故在豈得不尊夏謂宜照例寫讓表賢與時曰臣子誰敢擅寫天子新即位四海顒望凡事宜遵遺詔庶幾順天理服人心夏作色以為偏向時拱手向天曰祖宗神靈在上錢后已無後何所利而為之所以爭者為全皇上聖德故也若推大孝之心則兩宫同尊為宜賢等皆曰然夏乃再入請命曰適皇上再三勸諭已俞允矣時等遂執筆書尊皇后為慈懿皇太后母妃為皇太后夏以為疑時曰加二字好稱呼耳非有尊卑於其間也於是尊號之詔遂下後數日太監覃包至內閣言曰並尊二母本出上意但屈於生母有難言者而不知禮之人且欲逢迎其間非二先生力爭幾誤大事矣時同寮有未發言者有慙色蓋此詔之行賢與時之力也及議山陵賢等具疏請建𤣥宫為三穴夏復執不從成化四年六月慈懿皇太后崩傳㫖議山陵時等曰梓宫當合葬裕陵神主當祔廟此一定禮無可議者禮部尚書姚䕫贊之曰此正禮也夏獨曰不可慈懿無子且有疾豈可入山陵只可比胡后例葬西山耳已而上御文華殿召內閣三人及諸內臣入面議時等曰當依正禮上曰朕豈不知正禮是好但於周娘娘有礙故令爾等議務要處得合宜商輅曰外議洶洶若不祔葬則人心不服且於聖德有損劉定之曰孝子從義不從令雖聖母有言亦不可從也上默然良久曰合葬固是孝若因此失了娘娘心亦不可謂孝時曰皇上大孝當以先帝之心為心先帝待慈懿始終如一今若安厝於左虛其右以待後來則兩全其美庶不失先帝之意夏曰比先閣下議作三位已不允時曰彼時慮有今日故預為此議今須依前處置乃宜耳上雖未允而玉色未和時因曰臣等言未當欲具本言之乞皇上再三申勸聖母以終大事上曰可進來看當晚時等具本進奉有㫖令百官㑹議明日禮部集文武大臣議皆云時等言是內批未允欲别擇地於是伏闕哭諫乃行焉語在伏闕𢎞治初元詔議憲宗升祔及孝穆皇太后祔享之禮議者言人人殊禮部左侍郎倪嶽言德祖以上無可復推則德祖視周后稷太祖太宗視周文武百世不祧懿祖而下以次迭遷今憲考升祔則懿祖神主當祧宜於太廟寢殿之後略倣夾室之制别建一殿九室以藏祧主每歲暮時享則奉祧主仍居舊位以應古祫祭之制又周禮春官大司樂歌中吕舞大濩以享先妣謂姜嫄也帝嚳之妃后稷之母故特立廟以祀而宋元德懿德二太后俱有别廟章獻章懿俱建奉慈殿孝穆神主宜於奉先殿旁别為一廟歲時祭享悉如奉先殿之儀從之於是遂建祧廟及奉慈殿時惟學士楊守陳獨以德祖比宋禧祖百世不遷為非禮抗言禮天子七廟祖有功宗有德乃孔子之言故凡號太祖者即始祖必事之以配天若商周之契稷皆以功而非論其本統也宋之禧祖及我德祖可比商祖乙周亞圉非契稷比議者徒謂大儒嘗有取於王安石之說而不從孔子遂使七廟有始祖又有太祖太祖既以配天而不正南面之位名與實乖豈先王之禮哉若以降而合食為非禮則王者既立始祖之廟又推始祖所自出之帝而配之固無嫌也憲宗升祔請并祧德懿熙三祖自仁祖以下為七廟異時祧盡則以太祖擬契稷而祧主藏於後寢祫禮行於前廟時享則尊太祖祫祭則尊德祖各不失尊庶無悖禮議者不從以太廟之制已有九廟又難於并祧故也十七年三月聖慈仁壽太皇太后崩上御西角門朝退召學士劉健李東陽謝遷至門內扉遂闔上御暖閣素幄起立牀前顧謂曰先生輩上來健等皆至幄內上曰為陵廟事與先生輩商量健等仰奏曰昨䝉遣太監扶安諭示孝莊睿皇后葬不合禮欲為釐正此盛德事臣等仰見皇上聖孝高出前古不勝欣慕上袖出裕陵圖一紙指示陵門內有二隧道其一西行北轉而至者為英宗皇堂虛其右壙而中有道可通往來其一東行北轉而至者為孝莊𤣥堂相去可數丈中隔不通因曰此大非禮東陽對以初不知此上因言出自內官所為又曰內官有幾個識道理的昨見成化年彭時姚䕫輩奏章先朝大臣都忠厚為國如此健與遷對曰英宗有遺命錢后與我合葬大學士李賢記在閣下上曰既有遺命當時奈何違之東陽對曰臣等聞當時尚有别議故委曲至此非先帝意也上曰先帝亦甚不得已耳健等奏曰誠如聖諭但今日斷自聖衷勿憚改作則天下臣民無不痛快垂之史冊萬世有光矣上曰欽天監言恐動風水朕不以為然遷曰隂陽拘忌之說不足信上曰朕已折之矣今日開壙合葬不為動風水乎皇堂不通則天地否塞因以指畫紙曰若如此通則風氣流行惡得言動推一㸃誠心為之料亦無害東陽贊曰皇上一念孝誠可以格天吉無不利健等皆力贊曰皇上所見高出尋常萬萬願勿復疑上曰此事不難若祔廟之禮尤所當講健等奏曰先年奏議已定慈懿太后居左今大行太皇太后居右令祔裕陵配享英廟且引唐宋故事為證臣等如此不敢輕議其實漢以前惟一帝一后唐始有二后宋亦有三后並祔者上曰二后已非若三后尤為非禮遷對曰彼三后一乃繼立一則所生母也上曰事非師古末世鄙䙝之事不足學東陽對曰皇上當以堯舜為法上曰然宗廟事關係綱常極重豈可有毫髮僭差太皇太后鞠育朕躬恩德深厚朕何敢忘但一人之私情耳錢太后乃皇祖冊立正后我朝祖宗以來惟一帝一后今若並祔乃從朕壞起恐後來雜亂無紀極耳且奉先之祭先生輩尚不知英宗皇帝止設一座每祭飯一分匙一張而已健等倉卒不解上意但應曰唯唯退思之蓋孝莊尚未配食也上曰孝穆太后朕生身母止尊稱為皇太后别祀於奉慈殿今仁壽宫前殿儘寬意欲奉太皇太后於此他日奉孝穆太后於後殿歲時祭享如太廟不敢少缺健等皆未敢應聖意蓋謂今皇太后千秋萬歲後也東陽曰皇上言及孝穆太后尤見大公至正之心可以服天下矣上曰此事却難處行之則理有未安不行則違先帝之意又違羣臣㑹議㑹議猶可奈先帝何朕嘗思之夜不能寐先帝固重而祖宗之制為尤重耳東陽曰願聖見主張得定臣等無不奉行上曰朕亦難於降㫖先生輩是朕腹心大臣好為處置健等曰須下禮部令多官議之上曰雖多官亦不敢主張仍須先生輩為之耳健等曰容臣等計議上聞上曰先生輩辛苦且回去辦事是日上稱心腹者三呼先生者以十數健等感激稱謝皆叩頭起上前下板階顧內官啓扉立送而出時尊諡議已進奉㫖撰冊未上几筵健等乃具題本言當時先帝遇天下難處之事羣臣為委曲將順之詞或者不能無疑乞敕禮部㑹集多官再加詳議次日朝退上起立呼內閣健等至暖閣幄前立問曰先生輩昨日所進令多官㑹議是幾個衙門健等對曰即前日進諡議者東陽歷對曰五府六部都察院通政司大理寺及詹事府翰林院言未畢上遽曰有翰林院最好考據古今大典禮須用翰林院又曰有科道乎皆對曰有上又曰好少頃曰别無說話回去辦事蓋是日專為翰林問也自是每召必於朝退立呼內閣未嘗呼名二十一日復召上袖出㑹議本問曰此事如何健等對曰議得是東陽奏曰未知聖意如何上曰先生輩如何說健等對曰正是古禮上曰仍稱太皇太后可否皆對曰既是别廟須如此尊稱為當上曰如何批答遷對曰須說得委曲東陽曰要見重事上曰然宗廟事重要見令後世子孫崇奉不缺之意此本隨文書下來健等曰臣等領去上即以本授健復目送而出二十二日復召上袖出奉先殿圖指示曰此與太廟寢規制一般常時祭薦皆在此又指其廊間有門通西一區曰此奉慈殿也舊為神庫今廊廡及井俱未動又指其東一區别為門面南五間東西廊各五間此神厨也欲如此建廟可乎健等皆對曰此地最便東陽曰但未知寬窄如何上曰寬窄有數因指其傍小字曰東西幾丈南北二十丈後有牆牆之後有米倉蓋較之奉慈殿區深不及八尺皆請曰牆可展否上曰須展之其西偏有井亭亦須去之耳又曰欲遷孝穆太后併祭於此如何健等皆對曰甚當再問再對上曰位序如何健等對曰太皇太后中一室孝穆太后或左或右一室上曰須在左後來有如此者却居右東陽曰太皇太后居中乃可遷奏曰㑹議本未知今日可出否東陽曰外廷瞻仰此本已數日上曰正為廟地未定今既定即出矣皆拜出如前㑹禮部尚書吳寬亦言周祭姜嫄於别廟詩謂之閟宫魯桓公之母仲子不得祔廟春秋書考仲子之宫至宋始有兩后並祔之說然豈後世所宜法哉與上意合二十五日御批云祀享重事禮當詳慎卿等稽考古典及祖宗廟制既已明白都准議特建廟奉享仍稱太皇太后以伸朕尊親之意後世子孫遵守崇奉永為定制於是中外翕然稱為得禮惟陵事竟不行蓋因欽天監奏歲殺在北方之說而聖意終不釋然乃於陵殿神座移英廟居中孝莊居左孝肅居其右云審樂吳元年七月乙亥先是命選道童俊秀者充樂舞生至是始集上御㦸門召學士朱升領之入見設雜樂閲試之上親擊石磬命升辨識五音升以宫音為徴音上曰何乃以宫作徴邪起居注熊鼎對曰八音之中石最難和故書曰於豫擊石拊石百獸率舞上曰石聲固難和然樂以人聲為主人聲和則八音和矣因命樂生登歌一曲上復嘆曰古者作樂以和民聲格神人而與天地同其和近世儒者鮮知音律之學欲樂和顧不難耶升等對曰樂音不在外求實在人君一心和則天地之氣亦和天地之氣和則樂亦無不和矣上深然之其後命升等撰圜丘方丘樂章而朝享太廟諸樂章則詔翰林諸儒臣梁寅等分為之永樂元年九月詔侍臣曰皇考功德隆盛祖宗樂章未有稱述爾等其議為之於是學士王景等擬述以聞然竟未施行蓋缺典也凡舞用畫干郊壇武舞服左袖上書除暴安民四字亦出聖祖所定久廢𢎞治中用儒臣建議復之惟中和韶樂司於教坊誠有如解縉所論者審音以憲古改紀以召和豈有待於今日耶定制度聖祖有天下之初凡有制度命翰林儒臣稽考古今隆殺之宜以聞令中書省具奏上為裁定於是左丞相宣國公李善長本院學士陶安集諸儒論建以適厥中自朝廷以達邦國上下品次第明其等威洪武元年二月安等奏定天子冕服之制上曰五冕禮太繁今祭天地宗廟則服衮冕社稷等祀則服通天冠絳紗袍餘不用十一月甲子禮部翰林等官議定乘輿以下冠服之制三年六月中書省臣與翰林院定文武官朝服之制四年正月戊子禮部太常司翰林院議奏上親祀圜丘方丘宗廟及朝日夕月服衮冕祭星辰社稷太歲風雲雷雨嶽鎮海瀆山川先農皆用皮辨服羣臣陪祭各服本品梁冠祭服五年五月癸卯親王儀仗車輅成亦禮官諸儒所定也八月乙亥禮部及翰林院議省牲宜用常服十六年七月戊午詔更定冕服之制先是禮部言虞周以來冕服制度不一國初所製雖參酌古制然尚未備宜加考定於是翰林諸臣議上從之二十年冬十月召六部都察院通政司左右春坊大理寺及本院官著禮儀定式明日禮部以合行事宜凡一十四欵上進詔頒行之二十四年六月己未詔六部都察院同翰林儒臣參考歷代禮制更定冠服居室制度於是羣臣集國初以來禮制斟酌損益以聞二十九年十一月詔翰林斟酌唐宋制度定官民房屋墳塋等第及食祿之家興販禁例為書名曰稽古定制頒行天下又憲綱事類肇自洪武中載都察院十三道御史所宜行者宣德末敕禮部同翰林院考舊文而申明之凡祖宗所定風憲事體悉載其中至正統四年十月始頒行云定律令吳元年十月詔修律令命學士陶安為議律官十二月甲辰律令成命刋布中外洪武元年正月大明令刋成條分吏户禮兵刑工大明律亦如之儒臣奉二書以進上曰律令者治天下之法也令以教之於先律以齊之於後今所定律令芟繁就簡使之歸一直言其事庶幾人人易知而難犯八月己卯上念律令尚有輕重失宜有乖中典命儒臣四人同刑部官講唐律日寫二十條取進止擇其可者從之其或輕重失宜則親加損益務求至當六年十月命刑部與翰林院審定大明律七年二月律成學士宋濓撰表以進二十二年八月更定大明律初命翰林院同刑部官將比年律條參考折衷以類編附曰名例律附于斷獄下至是特載諸篇首頒行之議封爵誥敕洪武三年十一月丙申大封功臣其五等封爵皆學士宋濓所定始制五等公曰國侯伯曰郡子男曰縣至是罷子男不封惟繫公於國各賜之鐵劵云二十三年九月乙未加封中山王徐達岐陽王李文忠三代皆王爵先是命翰林院議侍講學士葛鈞等奏王三代惟本朝開平王常遇春出自特恩上謂二王皆元勳宜如開平王例自今開國功臣死後俱追封三代其爵子孫非建立竒功者生死止依本爵其劵文誥命皆詞臣撰進其稱號曰奉天翊運推誠宣力守正武臣者開國元勳也永樂時曰奉天靖難後止曰奉天翊衛其下文多同亦有損益取自上裁者文武官誥命之制洪武五年三月定學士宋濓偕禮部議奏參考唐宋誥命皆由三省官列銜書名復用吏部告身等印章本朝誥敕既用御寶則省臣不敢署見敕花樣籖軸制度俱有等第不須改作又宋紹興間工部言官誥院所用綾紙易以僞冒乞下文思院别織一體花樣專充官誥今議於誥尾添織某字號以為關防及取工部神帛敕誥局已造完誥命書寫用寶頒於文武官從之九年四月癸卯命中書省兵部定給武官誥敕之制大都督府咨於中書省送兵部覆奏貼黃考監參考同奏附籍部擬散官移文翰林院撰文付司文監校勘奏付中書舍人書寫署名用印十六年三月中書省與翰林院定嫡妾封贈例詔頒示中外復議文官贈叙之例十一䕃叙之例五二十四年五月辛卯詔定文武官封贈舊制一品封贈三代二品三品封贈二代四品至七品封贈一代兵部試尚書茹瑺奏請上命翰林院考古制學士劉三吾奏宋制與今例同詔從宋制又奏庶子襲父職例止封贈嫡母復命禮部翰林院同考古制三吾奏宋制母以子貴庶母亦依所生子之秩封贈詔從宋制六月丙寅命禮部翰林院議軍官姪男替襲伯叔職事及弟襲兄職養子女壻承襲養父妻父封贈禮制八月己巳瑺又奏言武臣封贈父母妻姓名有以嫡母生母同請有以正妻次妻並書者乃命翰林院稽考古制學士劉三吾言宋制嫡母繼母亡許封贈所生母正妻次妻並封古無此制今議正妻有子無子皆得封贈如正妻無子次妻有子俱從來未有定論上命只封嫡母正妻所生母則從宋制永樂元年十一月乙亥廣平侯袁容嫡母孫生母劉俱亡獨繼嫡母羅氏在而封贈事例不同上命禮部與翰林院議侍讀學士解縉等議上若所生母與繼母俱在禮難並封今繼母在當封所生母并嫡母俱亡亦可一體追封從之仍命後不為例考訂聲音文字聖祖嘗召侍講學士樂韶鳳宋濓待制王僎修撰李叔允編修朱右趙塤朱濓典簿瞿莊鄒孟達典籍孫蕡答祿與權諭之曰韻學起於江左殊失正音有獨用當併為通用者如東冬清青之屬亦有一韻當析為二韻者如虞模麻遮之屬若斯之類不可枚舉卿等當廣詢通音韻者重刋定之韶鳳等奉詔撰成七十六韻共十六卷書奏賜名曰洪武正韻濓序之略曰古者之音唯取諧協故無不通江左制韻之初但知從有四聲而不知衡有七音故經緯不交而失立韻之原七音者牙舌唇齒喉及舌齒各半是也分其清濁定為角徴宫商羽以至於半商半徴而天下之音在是矣然則音者其韻書之權輿乎旋宫以七音為均均言韻也有能推十二律以合八十四調旋轉相交而大樂之和亦在是矣自後奏啓進呈文字㸃畫音韻並從是書違者有罰洪武二年四月命翰林院定官民書札儀式禁革民間名字有犯先聖先賢大國君臣并漢晉唐宋等字者中書省臣具奏行之若正統十年進士登科録凡天字皆作䒶云出內閣意景泰中幸太學表內閣自為之中有管窺霄蠡測海句蓋亦避天字也與宋宣和時禁君天等八字同識者驚異殆非洪武舊制矣議祀典聖祖之正祀典也首詔嶽瀆城隍等神皆削去後世所加封號止從實稱之惟孔子則仍其舊蓋崇儒重道雖出宸衷亦有取乎侍臣之所論建洪武元年遣官釋奠於先師孔子定以二丁降香遣官祭於國子監每歲二丁傳制遣官致祭孔子若登極皆遣官祭告闕里二十四年十月乙丑南豐縣典史馮堅言九事內一事歷代忠臣烈士有功德於民者宜敕有司訪其事蹟俾禮部翰林院考究明白量加封諡上喜而寵擢之然終以往古名臣非異代之君所宜褒贈卒亦仍其舊焉二十六年頒大成樂於天下府學令州縣如式製造以祀孔子二十八年用儒臣言黜莽大夫揚雄進董仲舒從祀孔子正統二十年從本院議進胡安國蔡沈真德秀從祀八年追封元吳澄為臨川郡公從祀時建言者謂當祀劉因及本朝學士薛瑄內閣劉定之駁二人皆無著述遂沮然澄實宋進士仕元失節且封郡公爵亞程朱識者非之時學士丘濬嘗著論許衡無益於名教則澄又可知也成化三年用大學士商輅議封仲舒為廣川伯安國為建寧伯沈為崇安伯德秀為浦城伯從之輅又請加孔子以道配天地之號事寢不行𢎞治九年追封宋楊時為將樂伯從祀言者因謂羅從願李侗亦當從祀禮部侍郎傅瀚言二子著述視尹焞遊酢謝良佐未知所先後二子從祀則三人似不可遺道學所在其可輕乎乃止先是元年八月侍讀學士程敏政建議欲將馬融劉向賈逵王弼何休戴聖王肅杜預褫爵罷祀鄭衆盧植鄭𤣥服虔范寧五人各祀於其鄉而增后蒼若荀况言性惡宜依揚雄例黜之而祀王通七十弟子中申棖申黨疑誤當為一人宜存棖去黨公伯寮秦冉顔何蘧瑗林放五人既不載於家語亦宜罷去顔子曾子子思配享於殿而父在兩廡非所以明人倫宜於各處廟學如鄉賢祠之制别立一祠中祀啓聖王以把國公顔無繇萊蕪侯曾㸃泗水侯孔鯉并邾國公孟孫氏配享永平伯程珦獻靖公朱松量加封爵祀焉祭酒謝鐸建議則謂吳澄出處不正當黜其祀俱詔廷議之學士吳寬言從祀亦觀其有益經傳否耳茍有益於經傳則揚雄馬融昔皆不廢今何獨廢澄也禮部尚書倪嶽亦言馬融王弼之徒其立身不無可貶然秦漢以來六經出於煨燼賴諸子抱遺經專門講授經以復存自唐之注疏多祖其言今之經傳引用尚多其說則何可盡廢七十子名字自馬遷以來相沿已久今生千百年後何可臆定於是咸仍其舊云夫孔子之道彛倫而已矣如以經傳著述為道學則顔冉著述安在哉况表章六經始自漢武馬融輩不過剽竊記誦安得專其功較定功德斥去陋儒以正昭代崇道之典斯固輔道侍從者之責也制名號聖祖有天下之初即追尊四代考妣為帝后其廟號尊諡皆學士朱升等所定凡皇子命名受封及公主封號功臣爵名皆學士宋濓等擬奏取自上裁尋又命正天下各神祇名號洪武九年四月詔天下馹傳之名多因俚俗所稱兵部具數次聞命翰林院考古正之凡二百三十二自後凡建置郡縣命名皆以屬焉繼世之時上慈闈尊號上先帝陵號之類必以命內閣㑹典云凡皇子名及各王府奏請子名親王公主及郡王郡主縣主郡君縣君鄉君封號俱內閣擬奏請㫖㸃用禮部抄出施行改元國初改元洪武出自聖祖睿裁繼世之後始命翰林儒臣擬奏擇而用之太宗即位始擬用永清後乃用永樂自是每朝紀年不復再改蓋聖祖始謀之善實前代所未有也英廟復辟召內閣高榖商輅至文華殿問曰今年號宜改否榖對曰周雖舊邦其命維新宜改新元年輅曰年號多與前代同者臣等具數年號請上自擇上稱善已而用徐有貞等言用天順改元或請去景泰故號仍紀正統上不從而不知天順亦前代號也嘗搜歷代帝王以及僭僞每取一字聨之如宋祁年號譜之例且為詩以櫽括曰建元承大寶太上始真王武定開乾統文明應國光𢎞仁洪至治崇德本淳陽天地初熙泰神人正普康晏安同慶久延壽保隆長寧靖成更化中和啓順章清平河漢景孝義雀龍祥嘉㑹興貞永豐登廣顯昌鳳麟重赤白玉露紹青黃通道咸宣意端居拱聖皇其譜頗多不録然元順帝之子昭宗主沙漠傳二世其年號無從考邊徼盜賊多有建美號者不獨僭僞而已改元之際不可以不詳慎此宋祖所以有須用讀書人之嘆也擬諡國初追尊四代考妣為帝后尊諡皆儒臣擬奏請㫖孝慈皇后懿文皇太子亦然洪武二十五年詔凡親王及功臣賜諡令禮部行本院擬奏請㫖𢎞治十五年奏准文武大臣有請諡者本部照例上請得㫖行吏兵二部備查實跡禮部定為上中下三等開送本院擬奏請㫖本部抄出施行親王例用一字郡王二字其文武大臣亦用二字若官品未高而侍從有勞或以死勤事特恩賜諡者不拘常例本院官有諡始自洪武末待制王禕賜諡文節自是曾入翰林者俱用文為諡如胡廣諡文穆之類亦有以名避者惟大學士陳文諡莊靖翰林之外得諡為文者魏驥文靖吳訥文恪姚䕫文敏葉盛文莊何喬新文肅皆異數也翰林記卷七
