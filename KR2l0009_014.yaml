body:
  text: 翰林記卷十四明黄佐撰殿試讀卷執事㑹典云凡殿試讀卷官内閣於大學士學士等官内具名從該部奏請至日與各衙門該讀卷官詳定試卷次日同赴文華殿内閣官將第一甲三卷以次進讀俟御筆批定出將二甲三甲姓名填寫黄榜又次日早同赴華蓋殿内閣官進至御座前以次拆卷將姓名籍貫面奏司禮監官授制勑房官填榜畢開寫傳臚帖子内閣官捧榜出至奉天殿授禮部尚書制勑房官將帖子授鴻臚寺官𫝊臚其受卷彌封掌卷官從内閣於本院及春坊等官并制勑房官内推選與各衙門官相兼執事本院坊局始不過五人後増至七人遂為例按讀卷官國初用祭酒修撰等官正統中侍講猶預其後非執政大臣不得與而其去取之柄則在内閣殿試之明日大學士擇其中優者三卷圏㸃以硃明日早持詣文華殿對上讀之御筆親標其名第又明日即傳臚矣葢讀卷止在一日咸病其太亟不能徧觀故本院坊局之執事者始得試卷時預鍳别其髙下為差等以付讀卷官内閣乃易於裁定葉盛曰景泰二年予為殿試彌封官最知讀卷事第一甲葢閣老預屬意於受卷官已皆知之餘皆分送讀巻諸大臣且率以三分上一等次二等各置一所少頃閣老收上一等則判二甲次二等則判三甲也將午三人者持一甲卷詣文華殿進讀午後填黄榜明早榜出矣蓋辰巳二時榜中人第已定若曰須一一品量髙下次第固有所不能也盛所謂預屬意云者豈有為而發歟殿試擬撰䇿問聖祖策進士多親製策問洪武四年十八年皆然其後或命本院儒臣擬撰以進取自聖裁而用之永樂初科太宗思求博聞之士命學士解縉擇天文律厯禮樂制度儗撰為題上意士子必為所窘及得曽棨卷記誦詳盡歎異以為第一人御筆批曰貫通經史識達天文有講習之學有忠愛之誠擢魁天下昭我文明尚資啓沃惟良顯哉其第二人周述第三人周孟簡亦皆批評前此所未有也聞之李賢謂縉嗛劉子欽先以問目示棨棨遂獲首而寘子欽於二甲果爾則縉不可以言無私矣考㑹試凡㑹試考試官禮部奏行内閣於大學士學士等官及詹事府各坊司經局官内具名請奏欽命其同考官於本院侍讀等官及春坊司經局官與各衙門官相兼推選收掌試巻官用制勑房官一員按國初科舉第一塲問四書題一道五經義各一道第二塲論一道詔誥章表内科一道第三塲策一道猶循元制也洪武四年㑹試陜西河南山東江西湖廣廣之東西福建為行中書者十一俊髦皆集而髙句麗之士與焉以禮部尚書陶凱與前侍講學士潘廷堅為王司侍讀學士詹同國子司業宋濓吏部員外郎原本前貢士鮑恂為同考取中式者俞友仁等一百二十人落第者惟八十人其後罷之十八年復以科舉取士始定今制以待詔朱善前典籍聶鉉為試官取中式者黄子澄等四百七十二人二十一年取施顯等九十五人二十四年取黄觀等三十二人二十七年取彭徳等一百人三十年取宋琮等三十八人北士皆黜學士劉三吾為考試官竟以是獲罪上乃命本院官考擇下第北士六十一人廷試之語見覆試類革除庚辰科禮部左侍郎兼學士董倫侍講學士兼太常少卿髙遜志為考試官取吴溥等一百一十人永樂二年侍讀學士解縉侍讀黄淮為考試官取楊相等四百七十二人遵洪武乙丑例也葢自是取士多寡臨期請自上裁云四年取朱縉等二百二十人七年取陳璲等一百人十年左諭徳兼侍讀楊士竒右諭徳兼侍講金㓜孜為考試官取林志等一百人十三年修撰兼右贊善梁潛為考試官取洪英等三百五十人十六年侍講曽棨為考試官取董璘等二百五十人十九年左春坊大學士楊士竒為考試官取陳中等二百人二十二年侍讀學士曽棨為考試官取葉恩等一百五十人宣徳二年右春坊大學士曽棨為考試官取趙鼎等一百人自設科以來兼取南北士而南士徃徃數倍於北宣宗即位始詔禮部嵗取百人南士什六北士什四著為令既而以百乘除又各退五為中數焉五年侍讀學士李時勉侍讀錢習禮為考試官取陳詔等二百人八年少保兼大學士致仕黄淮為考試官取劉哲等一百人正統元年少詹事兼侍讀學士王直侍講學士陳循為考試官取劉定之等一百人四年禮部左侍郎兼侍讀學士王直學士藺從善為考試官取楊鼎等一百人七年禮部左侍郎兼侍讀學士王英侍讀學士苖𠂻為考試官取姚䕫等一百五十人十年學士錢習禮侍講學士馬愉為考試官取商輅等一百五十人十三年工部右侍郎兼侍講學士髙榖侍講杜寧為考試官取岳正等一百五十人景泰二年户部右侍郎兼學士江淵修撰林文為考試官取吴淮等二百人同考試官有侍講劉儼秩視修撰為髙葢儼科第後於文故也五年兵部左侍郎翰林院學士兼左春坊大學士商輅司經局洗馬兼修撰李紹為考試官取彭華等三百五十人天順元年學士薛瑄通政司右叅議兼侍講吕原為考試官取夏積等三百人四年學士吕原尚寳司少卿兼修撰柯潛為考試官取陳選等一百五十人是科㑹試舉子不中者奏考官校文顛倒宜正其罪上疑之召問李賢賢對曰此乃私忿考官實無此弊如臣弟讓亦不中可見其公上意方回乃命禮部㑹翰林院考此舉子驗其學多不能答題意且奏其狂妄遂枷於部前以示衆羣議方息七年學士陳文尚寳司少卿兼修撰柯潛為考試官塲屋災詔八月補試以太常少卿兼學士彭時侍讀學士錢溥為考試官而同考試官不改命者修撰王獻也取吴釴等二百五十人成化二年太常少卿兼侍讀學士劉定之學士萬安為考試官取章懋等三百五十人五年太常寺卿兼侍讀學士劉珝侍讀學士劉吉為考試官取費誾等二百五十人八年禮部左侍郎兼學士萬安司經局洗馬江朝宗為考試官取吴寛等二百五十人十一年少詹事兼侍講學士徐溥侍講學士丘濬為考試官取王鏊等三百人十四年禮部尚書兼學士劉吉學士彭華為考試官取梁儲等三百五十人十七年太常寺卿兼學士徐溥少詹事兼學士王獻為考試官取趙寛等三百人二十年詹事兼學士彭華左庶子劉健為考試官取儲巏等三百人時有世家子在選朱墨卷不合華黜之失志者欲甘心焉卒亦無所害二十三年守臣有言中士日衆而額如故者事下禮部集議南北仍各退二以益之太子太保兵部尚書兼學士尹直右諭徳呉寛為考試官取程楷等三百五十人𢎞治三年禮部尚書兼文淵閣大學士徐溥少詹事兼侍講學士汪諧為考試官取錢福等三百人六年太常少卿兼侍講學士李東陽少詹事兼學士陸簡為考試官取汪俊等三百人九年兼侍講學士謝遷侍讀學士王鏊為考試官取陳瀾等三百人十二年太子少保禮部尚書兼文淵閣大學士李東陽掌詹事府事禮部右侍郎兼學士程敏政為考試官取倫文叙等三百人時敏政有異議同考試官給事中林廷玉發其事户科給事中華㫤劾之敏政遂得罪十五年吏部左侍郎兼學士吴寛侍讀學士劉機為考試官取魯鐸等三百人十八年掌詹事府事太常寺卿兼學士張元禎左春坊大學士兼侍讀學士楊廷和為考試官取董玘等三百人正徳三年少傅兼太子太傅户部尚書武英殿大學士王鏊掌詹事府事吏部尚書兼學士梁儲為考試官取邵銳等三百五十人六年少傅兼太子太傅吏部尚書武英殿大學士劉忠掌詹事府事吏部右侍郎兼學士靳貴為考試官取鄒守益等三百五十人九年少傅兼太子太傅吏部尚書謹身殿大學士梁儲學士毛澄為考試官取霍韜等四百人十二年太子太保户部尚書兼武英殿大學士靳貴少詹事兼學士顧清為考試官取倫以訓等三百五十人十五年禮部右侍郎兼學士石珤侍講學士李廷相為考試官取張治等三百五十人葢㑹試去取在各房同考試官而叅定髙下則考試官柄之歴朝應用不同與凡取士多寡皆不可不知故備記如此若同考試官正統以前猶參用外官教職景㤗後始純用京職内則本院外則六科部屬行人司官𢎞治以來定本院官九人餘惟六科部屬得與共十四人正徳辛未以易書詩房卷浩繁各増其一本院官十一人與六科部屬共十七人云按國朝以文取士大概以辭達為本天順間晩宋文字盛行於時如論學繩尺之類士子翕然宗之文遂一變侍講學士丘濬每考試凡怪詞險語皆痛斥之怨排不恤也及為祭酒尤諄諄為學者言之文體乃復渾厚成化乙未㑹試學以至乎聖人之道論舉子桑悅卷有我去而夫子來也等句濬黜之他日㑹試悅策有曰腹中有長劍日日㡬回磨檢討吴希賢復黜之前軰取士不茍如此覆試洪武三十年丁丑六月辛已朔上御奉天殿策試下第舉人先是禮部㑹試者多而中式者少被黜落者咸以為言上命翰林儒臣考下第卷中擇文理優長者得六十一人至是復廷試之擇韓克忠為第一仍賜克忠等進士及第出身有差乙酉以克忠為修撰第二人王恕第三人焦勝為編修七月命太常寺丞張顯宗署國子監祭酒事因命克忠署司業事其見寵擢如此永樂二年上臨軒策士傳臚之明日進㑹試所選副榜士於廷親試之上御右順門命侍講學士楊士竒金㓜孜諭㫖令就試者從容盡所藴毋茍且取具命光禄給食中官夕給燭遂親㧞三人命進學翰林餘第為二等付吏部除學官其第一人則周翰也預修永樂大典七年除典籍云按宣徳間副榜舉人得冠帯讀書太學葢循此制然不可考正統後副榜始不復廷試矣楊士竒云宣徳丁未以前有十五科前此南北士合試未有北士占首選者有之實自丁未始猶不數覆試之科王直云自洪武辛亥至正統丙辰為二十科則并韓克忠一榜數之也考兩京鄉試凡順天府應天府鄉試本府以考試官請命與㑹試同葢重畿甸以為天下先也按洪武庚戌京闈王考為前御史中丞劉基侍書御史秦裕伯同考為侍讀學士詹同𢎞文館學士睢稼起居注樂韶鳯尚寳丞魏潛國史宋濓辛亥京闈主考則兵部尚書吴琳國子司業宋濓也永樂癸未命侍讀胡廣編修王達為應天府考試官賜宴於本府自是遂為例正統戊午侍講學士曽鶴齡主考順天府鄉試初試之夕塲屋火試卷有殘缺者有司懼罪不敢以更試為言惟欲請葺塲屋以終後兩試鶴齡曰必更試然後百弊滌至公著不然雖無所私亦招謗朝廷何惜一日之費以成此盛舉哉有司具二說以進命下悉如鶴齡所言衆皆懼服得士亦審景泰丙子洗馬柯潛奉命主考應天府鄉試舟維淮揚有舉子鬻私者暮夜投潛潛叱之彼固以請以所賂遺置前潛怒命執付有司懲以法成化甲午左庶子黎淳主考順天府鄉試有試卷竒甚後塲不類疑有弊勾稽墨卷果得謄録生截卷狀移外簾按其事而取是卷為解首則名士馬中錫也此三事皆可為應變之法景泰庚午侍講學士劉鉉主考順天府及揭曉第一人劉宣乃盧龍軍士也同事者欲更之鉉爭曰朝廷立賢無方不可乃止時論韙鉉丙子順天府主考為右春坊大學士劉儼侍講學士吕原時少保兼大學士陳循王文用事循子瑛文子倫入試俱不中二人論奏儼原不公有㫖令翰林并科道覆考瑛倫文字遂以為合格得特賜舉人儼等問罪還職禮科給事中張寧劾奏循等罪狀乞黜不報未幾英廟復辟文誅循戍鉄嶺瑛倫皆為民此科試之大變也試録程式文字國朝鄉試小録㑹試録進士豋科録具有成式葢科舉自兩京外鄉試付之藩臬以為未信也㑹試則以名籍付禮部考試付翰林暨於親試則有殿最而無黜陟葢以為可信矣其所刻程文自鄉試以至於殿試皆宜刻士子所作庶為傳信流弊之極至于制策亦多代筆豈所以教之忠歟按洪武甲子鄉試乙丑㑹試初為小録以傳然惟列董事之官試士之題及中選者之等第籍貫經籍而已其録前後雖有序然猶未録士子之文以為程式也次科戊辰始刻程文自是遂永為定式但此後五科其間命官列銜尚或隨時不一永樂以後其制始一定而不更易矣然永樂中各省鄉試猶有儒士主考品官同考者其序文亦不拘篇數景泰中序文禁稱公考官上用實授教官序惟前後二篇以兩京為法也然兩京序文稱臣獨與㑹試同云按初塲例出四書義三道正統元年㑹試出大學論語中庸而不及孟子十年㑹試出中庸大學孟子而不及論語成化元年順天府鄉試出論語二道孟子一道而不及大學中庸其後定大學中庸内量出一道論語孟子各出一道遂為例二塲洪武四年以射禮論為題其後止用經書聖製書中成語三塲策問前軰惟以經史疑難及國家之大者言之其後始有出於經史之外并及𤨏屑隠僻若序文則𢎞治五年順天府鄉試猶具嵗月後皆不然也葉盛曰文衡之任亦難矣言語文學不足以變士習服士心亦漫浪為之耳正統己未㑹試王抑庵主考試第二名張穆兵馬策其原卷起語云兵所以衛民也非兵無以安夫民之生馬所以資兵也非馬無以足夫兵之用㑹試録云兵以衛民非兵無以安民生馬以資兵非馬無以足兵用兩句減去八字抑庵筆也自是舉子以造語簡嚴典重為尚然抑庵又稱永樂辛丑楊文貞公司㑹試文衡務先典實之作以洗浮腐之弊喜曽鶴齡諸作多梓行之至今評程文者以是科為最葢洪武水樂間程文體皆渾厚不特是科而已誠宜録出以正文體而變士習至若登科録永樂甲申二甲刻所對策十餘篇其後惟刻首甲三人所為者正徳三年二甲第一人三甲第一俱刻策事出焦芳軰非制也燕對録曰正徳六年四月十三日講畢復召至煖閣叩頭畢上手取㑹試録一本付司禮監太監張永授臣東陽等内有白紙票粘於紙上者三皆指摘所刻文字錯誤處上曰今欲别有施行但念衙門體靣恐不好看但與先生軰知之耳臣東陽捧録叩頭出至煖閣門外留寘案上永令内臣送至内閣是年大學士劉忠累䟽辭疾未允强起主考試事出院後即乞省墓已得請是日陛辭聞此事而去比抵家復具䟽乞休致葢已有先入之說矣科舉文字不獨關係氣運而憸人投間一至於是誠不可以不慎也考武舉凡武舉第三塲考試官兵部命如兩京鄉試之制正徳三年始刻録前後有序賜㑹武宴一如文試九年十二年亦如之惟十五年兵部尚書王瓊變其制止用策一道刻文三篇本院官一員并兵部公侯伯皆為考驗官今照舊規出策二道論一道云考選庶吉士考選庶吉士始自洪武乙丑迨永樂初益重其事然其詳不可考大率每科必選宣宗時合三科進士親試之㧞二十八人為庶吉士如甲申之制正統丙辰上親考選庶吉士於文華殿取蕭鎡等十二人己未以後罷之至戊辰始純選北方及蜀士為庶吉士被選者萬安等二十人親試也自是其事付内閣例取平日所為詩文或繙閱殿試卷兼採名實行禮部使人延請至東閣前㑹同吏部試以古文暨詩各一篇合格者改送本院讀書景泰辛未選吴匯等二十五人甲戌選丘濬等十八人皆兼選南北士天順庚辰三月英宗御文華殿召李賢諭曰永樂宣徳中常選庶吉士教養待用今科進士中可選人物端重語音正當者二十餘人為庶吉士止選北方人若南方人有似彭時者方許選取賢出以語時疑賢欲抑南人故為此語因應之曰立賢無方何分南北賢曰果上意也奈何已而太監牛玉復傳上命如前令内閣㑹吏部同選時對牛曰南方士豈獨時比優於時者甚多也牛笑曰且選來看是日考選取十五人南方止三人而江西惟張元禎得與焉天順甲申選李東陽等十八人自是皆兼選南北士成化丙戌選林瀚等二十四人己丑選費誾等十五人戊戌選梁儲等二十八人丁未選程楷等三十人𢎞治癸丑選顧清等二十八人是科清等已發各司觀政後乃得㫖取各司考選丙辰選顧潛等二十人壬戌選胡煜等二十人乙丑選崔銑等三十人正徳辛未選許成名等三十三人丁丑選汪佃等三十四人辛巳選廖道南等二十四人天順以前一甲三人與庶吉士同讀書成化後乆廢至𢎞治丙辰始復舊規自後皆因之教書洪武中宋濓永樂初解縉皆常領庶吉士特與之講究爾未嘗抗顔為師也宣宗時親教庶吉士考其文藝與永樂時同至正統戊辰乃顓命詹事兼侍講學士劉鉉祭酒王詢教書自後以為例内閣於學士及詹事府坊局等官擇資望深者二員請㫖送本院教書謂之開館是日自内閣而下皆醵金為燕㑹云考保舉諸科凡各處舉到經明行修懷才抱徳之士宣徳以前送本院考試後止令吏部考又其後諸科亦廢正統十四年詔各處舉到儒士照永樂年間事例送本院嚴加考試選用不中者發原籍為民葉盛曰永樂中清江喻行之以文學舉試記里鼓正統中馮益於試事皆不知所謂莫能措一辭所謂名浮於實君子弗貴者歟如復諸科考藝觀徳付諸翰林可也考嵗貢生員洪武十六年二月丙申命天下學校嵗貢生員時諫官有言命禮部榜諭天下府州縣學自明年為始嵗貢生員各一人正月至京從翰林院試經義四書義各一道判語一條中式者入國子監不中者罰之故有此命也㑹典曰凡考試嵗貢生員禮部奏請出題本部官赴内閣領題試畢送卷本院官批定去取送部奏請施行嘗聞編修張元禎考校精覈嵗貢士鮮入格者時服其公云考教職㑹典云凡考試願就教職舉人監生吏部奏請出題本部官赴内閣領題試畢送卷本院官批定中否送部奏請施行又云凡各處儒學訓導九年考滿吏部出題考試初塲四書本經義各一道二塲論策各一道印封文巻送内閣委本院官批定去取送部奏請施行考汰官吏洪武二十九年四月命本院官㑹同禮部考國子監六堂師弟子甄别髙下送吏部以次録用其後不知何時遂廢永樂中有詔汰在京諸司冗官左贊善陳完時掌春坊事即操筆書某當留某當去衆服其明決然此後亦不聞焉㑹典云天順八年奏准吏部都察院㑹同内閣考察在京五品以下文職并在外布按二司官有不公者許令科道官指實劾奏又云宣徳七年勑吏員三考滿當授官者吏部通引於内府㑹同六部都察院翰林院堂上官出題南北類試其文義粗曉行移得當書札不謬三事俱可取者為一等二事可取者為二等俱不可取者放回為民當差可齋雜記云東閣為翰林官㑹揖處一日各部堂上官㑹考三考吏來集閣下諸同寅遂聨步而出周修撰旋口誦兩句云爾來閣下考三考我去家中眠一眠語雖戲而對亦切葢當時考吏必集閣下於此可見清理武官貼黄㑹典云凡兵部清理武官貼黄奏請命學士等官一員同該部及法司堂上官於闕右門清理本院官專管撰述考就試軍士㑹典云凡該衛軍士告願科舉者兵部奏送本院出題考試批定中否送本院施行按景泰元年盧龍軍士劉宣𢎞治五年府軍前衛軍士姚學禮皆發解第一然則軍士中不可謂無人要在甄鍳之爾稽考監生課簿㑹典云凡國子監生課簿按月送内閣稽考稽考精㣲文簿精㣲文簿所自置殆不可考按永樂元年司禮監請如舊制鑄出入精㣲印從之則是廢而復置也㑹典云凡五府六部都察院等衙門關給内府精㣲文簿開寫日行事務註銷前件按月奉送本院稽考年終類送司禮監交收稽考四裔館課程洪武十五年命侍講火原潔等編華裔譯語以元無文字但借髙昌之書制䝉古字以通天下之言至是乃命原潔與編修馬亦黒以華語譯其語天文地理人事物類服食器用靡不具載復取元秘史叅考紐切諧音既成刋行之譯字官𨽻本院葢始於此二人䝉古産也永樂中上選太學生年少者習四裔諸畨字諸生多不欲輙生謗議上怒將罪之學士楊榮力救得免遂命榮掌之榮訓勵得宜自是帖服率皆有成有官至五六品者㑹典云凡四裔畨夷翻譯文字永樂五年設四裔館内分八館曰䝉古女直西畨西天回回百夷髙昌緬甸選國子監生習譯宣徳元年兼選官民子弟委官為教師本院學士稽考課程後内閣委官提督𢎞治初奏准科目出身四品以上二員提督其官生公㑹按月從本院印給仍繳送稽考及食粮授職從吏部禮部奏㑹同内閣出題考試中否仍從該部奏請施行凡四裔館習譯監生子弟舊例月支米一石㑹官考試一年通習者與冠帯全不通者黜退正統元年奏定考中一等者冠帯為譯字官又一年再考中授職𢎞治三年奏准子弟不許别圖出身三年後考中食粮月給米一石又三年考中冠帯為譯字官又三年考中受序班職事初試不中者許再試三試不中者黜為民監生初入館照坐監例食粮三年考中食粮一石家小粮仍舊又三年考中冠帯又三年考中授從八品職事三試不中者送回本監别用其曽習者非精通譯字不准應試按自後提督官例用太常寺卿及少卿而景泰天順間譯字官多有取進士者甲申庶吉士劉淳景泰庶吉士吴貞皆自譯字官發身云考校僧道洪武十年九月令僧徒皆通般若心經金剛般若經楞伽經命學士宋濓考校之不通者令還俗二十四年六月用翰林儒臣議命禮部清理釋道二教凡府州縣等觀雖多但存其寛大可容衆者一所併而居之毋雜處於外與民相混餘寺觀為叢林以居貧民宣徳九年僧道行童請給度牒者甚多命僧道官取勘禮部同翰林院官禮科給事中及僧道官考試能通大經給與度牒景泰間三年一度僧至數萬天順初如期來集大學士李賢言于上曰此軰有損無益宜令十年一度上從之著令按僧徒之盛莫甚於今日而道流次之蠧國侵民宜事沙汰考校僧徒宜如洪武中所定三經道士則老莊列三子可也試使儒臣定議通行天下委風憲官考校中者宜分府州縣酌量其數而差等之不中者勒令還俗所居惟併為一所餘皆拆毁為叢林以居貧民一如洪武二十四年之例是不惟於國家風化有益而所謂釋與道者亦自不違其教矣聖君在上賢公卿在下必有以處此者翰林記卷十四
