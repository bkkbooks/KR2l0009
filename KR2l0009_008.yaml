body:
  text: 翰林記卷八明黃佐撰備顧問侍從文學之臣朝夕論思日月獻納自漢已然至唐始設翰林以言語文字備顧問因有天子私人與內相之目而待制次對有非他職所望者宋元因之至我朝眷注尤隆重國初儒臣雖布衣皆得備顧問蓋明目逹聰稽古右文治體當如是也及置本院凡上御奉天華蓋謹身文華武英諸殿文淵閣東閣東西黃閣文樓武樓奉天左順右順中左中右思善等門并出入禁籞無有不從者又定為入直奏事之制入直即唐之待制也奏事即唐之次對也觀諸太祖太宗仁宗宣宗實録所載可見矣所謂顧問大率咨詢理道商榷政務評隲經史而使之援据古今以對宣宗嘗謂侍臣曰君臣一體猶元首之有股肱故於儒臣每燕見必從容咨訪使盡其意此所以上下交而德業成也正統以後入直奏事之制既廢凡有宣召得承顧問咸歆豔以為榮云嘗觀祖宗時本院官得備顧問者不可悉記惟洪武中太祖嘗祀方丘患心不寧以問學士宋濓對曰孟軻有言養心莫善於寡欲審能行之心清而身泰矣上深然之夫以逆耳之言發格心之學濓真以道事君者也然濓每有所陳對絶不以語人署溫樹二字於居室之壁有問及內事者指以示之褆身之慎幾事之密若濓者誠可為備顧問之法永樂時內閣七人惟楊榮金幼孜黃淮楊士竒當顧問時從容詳慎不激不隨亦濓之亞也責盡言聖祖立國不設諫官使人人皆得以盡言而尤責備於近侍洪武二十九年十一月以修撰張信為侍讀編修戴德彛為侍講諭之曰官翰林者雖以論思為職然既列近侍旦夕在朕左右凡國家政治得失生民利病當知無不言昔唐陸贄崔羣李絳之徒在翰林皆能正言讜論補益當時顯聞後世爾等當以古人自期毋負朕擢用之意水樂三年四月太宗御奉天門視朝罷召六科給事中諭曰朕日臨百官可否庶務或有失中者爾等宜直言無隱又顧翰林學士解縉等曰敢為之臣易求敢言之臣難得敢為者强於已敢言者强於君所以王魏之風世不多見若使進言者無所畏聽言者無所忤天下何患不治朕與爾等皆勉之又嘗謂諸近臣曰早來在宫中偶忘一事問左右皆不能記憶蓋沉思久而後得之朕以一人之智處萬機之繁豈能一一記憶不忘一一處置不誤拾遺補過近侍之職自今事之叢脞者爾等但悉記之以備顧問所行有未合理亦當直諫朕自起兵以來未嘗違忤直諫爾等慎勿有所顧避由此言之近侍得備顧問者何可不盡言也將順洪武中太祖欲省刑思所以優禮臣工學士詹同承顧問頓首賀曰陛下之言及此天下之慶也因言古者刑不上大夫上深然之又嘗當春月欲行刑以為疑問於左司直郎汪仲魯仲魯頓首涕泣曰此天地之仁也請即免行刑上允所奏景帝之葬也左右請以汪妃殉上不忍以問大學士徐有貞李賢賢言景泰初汪后即不得志况二女皆幼可憫臣愚以為宜厚遇之上憮然以為是上思建庶人幽大內六十年欲赦之左右多以為不可召問賢曰陛下此一念太祖在天之靈實臨之堯舜存心不過如此上意遂决遣中官衛送居之鳳陽所出入自便上厭左右招權納賄與賢言之賢謂人君之權不可下移惟自攬取則彼之勢自消上曰然無此相礙何事不順吾五更三㸃起拜祖宗畢即出視朝循此舊規不敢有誤退朝至文華或有政事訪問大臣商確復省决章奏左右乃曰此等章奏何必一一親覽亦不可送與閣下看奸邪不忠如此賢曰自古賢君修德勤政莫不皆然願陛下持此不衰堅如金石可以為堯舜之君矣上一日又曰內官蔣冕雖嘗效勞其實讒亂小人朕初復位即於太后前言曰皇后無子當換朕即斥之及立東宫日復曰其母如何朕曰當為皇貴妃乃止以此遠絶之賢曰讒說殄行自古帝王所深惡者絶之最是賢之善於將順此類也故當時奏對無不當上心者成化十一年十一月詔復郕戾王位號初下羣臣議又遣太監懷恩等至內閣問大學士商輅萬安等輅力陳所以當復之故言甚剴切左右皆泣輅亦泣上聞為之感動疏入即允其請輅舉手加額曰皇上此舉堯舜之盛德也遂上景皇帝尊諡云調護太宗時巡狩日多漢庶人高煦窺伺儲二上不能無疑永樂九年三月翰林諸臣奏事右順門退特召楊士竒還上問曰汝輔監國久東宫所行果如何對曰孝敬上曰試言其事對曰於事宗廟甚虔凡籩豆之類皆親閲視一日當時享偶頭風作醫言當汗殿下曰汗即不敢蒞祭左右有言可遣人代者殿下曰上以命我我又遣人乎及期遂親蒞祭祭畢還未至宫遍體汗不藥而愈每尚膳進御用物詣行在皆一一閲過然後緘識遣行不輒信任下人自車駕北征恆切懷憂不遑寧居日中昃始食及敕使至始釋然寬慰上曰聞輔臣中獨爾能持直道不見忤否對曰臣性戅殿下恆見容納殿下天資甚高非衆人所能及或有過未嘗不知知之未嘗不悔而速改且殿下最用心處在以愛人為本將來宗廟社稷之寄允不負陛下付託上甚喜命尚膳賜酒饌十四年上在北京聞高煦有異及還以問士竒曰汝與蹇義在此漢府事皆當悉知昨問義不肯言汝盍言之如朕未知汝輩慮有離間之罪朕既知矣汝何慮對曰漢王始受冊封國雲南不肯行改青州又堅不行今朝廷將徙都惟欲留守南京天下皆疑其心惟陛下善處之乃詔削其兩護衛處之樂安州曰此去北京甚邇即其作禍可朝發而夕擒也宣德元年高煦果反車駕親征罪人既得師還六部遣尚書陳山迎駕山見上言宜乘勝移師向彰德襲執趙王則朝廷永安矣上召楊榮蹇義夏原吉楊士竒謀之有以為言者上令士竒草敕士竒執不從遂還京一日問士竒曰言者論趙王日益多奈何士竒請遣駙馬廣平侯袁容賫璽書往開諭之上從其請王喜即獻護衛且上奏表謝而言者頓息自是上待趙王日益親厚而薄陳山踰數月召士竒至南宫齎諭之曰吾待趙叔不失親親之禮爾有力焉自今毋以見忤為嫌遂賜白金寶楮文綺若士竒者可謂善調護朝廷骨肉之間者矣惟景泰中易儲一事當國者有靦顔焉而大學士陳循輩猶自以為功何也論薦洪武中學士宋濓侍聖祖嘗問及廷臣臧否濓惟舉薦名士稱其善者不置問否者為誰對曰善者與臣為友故知之否者縱有臣不知也自是每用人多命本院官舉而用之宣德三年六月朝退命光祿賜近臣食畢召楊榮楊士竒謂曰祖宗時朝臣無貪者年來貪濁之風滿朝因問其甚者榮以都御史劉觀對士竒曰風憲所以警肅百寮憲長如此則不肖御史皆效之不肖御史差出四方則不肖有司皆效之上撫掌歎曰除惡務本又問廷臣中今誰可使掌憲二人久未對上曰未必都無一人士竒對曰通政使顧佐亷公有威曾任御史及按察司皆有風采榮曰佐亦嘗為京兆尹能防禁下吏政清弊革上喜曰顧佐乃能如此命賜茶而退數日擢佐右都御史而治觀罪及士竒寢疾英宗遣內侍詢人才舉檢討李紹等五人以對皆至大用天順中李賢在內閣奬進亷介之士首舉耿九疇為都御史軒輗為刑部尚書年富為戶部尚書九疇為權臣所排輗不得志去賢屢言於上還之禮部缺侍郎有求近習薦升者上問賢賢曰不知其人臣所知者學士李紹可任此因言士風不振多夤緣求進如用紹請於黼座召吏部面命之庶幾士類知警上從之命下之日傾朝戄然初石亨以文臣總軍務於邊使武臣不得逞因請罷之居無何邊徼騷然上悟其非命賢舉可任巡撫者賢以都御史李秉芮釗白圭王宇陳翌薦一時號得人後松潘寇發薦都督許貴果往平靖之成化中編修陳音抗疏言言路日塞異端日熾宜召還致仕吏部尚書李秉修撰羅倫編修張元禎評事章懋給事中王徽新㑹舉人陳獻章置之臺諫革去法王佛子真人位號禁止創建寺觀則正人用言路開妖妄息矣不報景泰末學士商輅薦司直郎林聰先任刑科給事中學優識長操持端潔存心公正遇事敢言見今吏科都給事中久病不出宜以聰兼之俸祿無增品秩仍舊事體無損而政務有益詔復前職後聰忤宰執欲加重辟輅力辨之乃得降京職歷憲宗朝聰遂大拜南京禮部右侍郎姚䕫考滿至京輅又特本薦留後䕫洊歷禮吏二部尚書亦輅汲引之故也大臣固當以人事君而能不自以為功乃見其功茍以此攬權賈利獨何心哉申救洪武初朝臣有上疏萬餘言者太祖厭其迂衍欲罪之有阿意者指疏曰此不敬此詆謗罪當誅上怒未解學士宋濓對曰彼應詔上疏其心為朝廷耳烏可深罪乎上乃覽疏中有足采者召阿意者罵曰吾怒時若等不能諫乃激吾誅之何異以膏沃火向非濓之言幾不誤罪言者耶洪熙初大理少卿弋謙數言事有言其賣直沽名者大學士楊士竒對曰主聖則臣直惟陛下容之不然進言者將懼矣仁廟雖不罪謙然免其朝參令專坐司視事自是一月餘言事者少仁宗諭士竒曰自弋謙免朝言者不至豈果無事可言遂令士竒就榻前書敕引過命謙如舊朝參令百官言事毋以謙為戒景泰五年十月給事中有忤執政者執政欲害之乃諷御史劾其私而羅織其罪大學士高穀請從輕典卒得左遷七年順天府鄉試太常卿兼侍讀劉儼為考官時大學士陳循之子英王文之子倫入試不中二人交章奏儼去取不公欲置於法乞詔翰林六科十三道覆考榖時以病不出聞之即强起預考畢入言曰大臣子與寒士並進已不可况又不安於命欲殺考官可乎由是儼得釋而詔以英倫為特賜舉人榖由此與二人者不合屢求退天順中彭時在內閣上方倚任李賢日與賢面議賢退乃咨商於時有不可者時每執不肯初或相忤久之乃相協後錦衣衛指揮使門達用事忌賢隂中傷之上怒曰賢且得罪行當專用彭時中貴以語時時戄然曰李公何遽至此因為力辨其誣語聞得釋一日欽天監湯序言變異由奸臣未盡之故上以問修撰嶽正正曰奸臣未有聞於朝著者若求之人人自危耳序術疏淺不足信事遂寢𢎞治中武岡知州劉遜為岷府所奏訐被逮至京師科道奏乞寬貸上怒俱下之詔獄大學士劉健等言遜誠情輕譴重言官為國盡忠而槩以為罪後有大利害大闕失誰肯言者上乃釋之正德二年尚寶卿崔璿御史姚祥張彧主事張偉給事中安奎各因事被繫時劉瑾用事欲俱令枷號大學士李東陽等奏各官所坐有本法枷號重典不宜濫施俱得寬釋三年六月二十六日早朝有文書一卷投於御路録瑾過惡上命瑾等詰問無肯承者遂執朝官三百六十餘人送詔獄東陽暨王鏊奏此事必一人隂謀所為同朝諸臣倉卒拜起豈能知之一人之外蓋皆無罪之人也乃盡得釋其後瑾益凶橫羅織之使四出動輒籍沒朝臣家産駢首死於獄間因東陽言或釋一二焉諍得失凡被顧問諍及得失必關於國家大體而後言之不宜毛舉細事永樂五年冬廣東布政徐竒朝京師載嶺南藤簟諸物將以遺廷臣或得其單以進上閲視無楊士竒名乃獨召之問故將以私交罪之士竒曰竒自都給事中受命赴廣時衆皆作詩文贈之故有此餽臣不預者以當時病未有所作不然亦不免今衆名雖具然受否未可知且物微意當無他上意解即付中官單目令燬之一無所問二十年閏十二月甲子詔復西征方以士馬糧餉為艱有以建文間江西垜集民兵與餽運夫十餘萬可徴用為言上以其奏示學士楊榮榮對曰此兵夫昔有詔令復業今復徴之是失信也上曰卿言是也遂寢其奏洪熙元年四月有㫖故東宫官鄒濟徐善述王汝玉皆贈官賜諡令官建祠於墓四時賜祭士竒進曰禮貴得中朝廷惟宗廟以四時享雖社稷孔子亦止皆春秋二祀濟等雖有勞祀之乃與宗廟等可乎上曰吾過矣遽召禮部改春秋祭其他審法正度議禮考文士竒多據理爭之皆此類也景泰元年八月太上皇帝車駕自北狩還方議奉迎禮衆涉疑未定千户龔遂榮寓書於大學士高榖言奉迎當從厚榖即袖其書以進且曰武夫尚如此况儒臣乎已而朝廷以遂榮非分下錦衣獄㑹車駕至百官郊迎榖復上章以伸前議聞者韙之而遂榮亦釋後太上居南宫指揮盧忠妄言南內事景帝欲窮治之學士商輅請止罪忠一人以全大體上從之天順初錦衣衛官校邏得一僧自言當大貴衆惑之至妻以女以覬非分獄具當坐反及太監牛玉援近例請官邏者內閣修撰嶽正言事縱得實不過合妖言律治其從十數人邏者准應捕律而已時忠國公石亨與太監曹吉祥怙寵擅權有投匿名書指斥朝政者獨不及亨緝捕甚急舉朝惶駭亨勸上出榜募能捕告者賞以三品職上令內閣撰榜格嶽正與吕原見上曰為政自有體式盜賊責兵部奸宄責法司豈有天子自出榜購募之理且堯建進善之旌舜立誹謗之木秦始皇護短杜諫乃下誹謗妖言之令由此過失不聞卒至國亡陛下新復寶祚正當以堯舜為法以秦為戒縱欲窮治其事緩則人情怠忽事自覺露急則人情危懼愈求韜晦不如勿究吉祥從旁請究甚力上徐謂曰正言是也成化初太監劉永成死言其有軍功宜追封為伯大學士彭時力爭之或曰自古有封侯王者時曰此盛世事耶祖宗成憲具在誰敢違之事遂寢十二年七月上建玉皇閣於宫北别創禮儀樂章將有事焉學士商輅論毁之十三年四月太監汪直創西厰立威擬至尊內外官卧不帖席輅與同寅疏其擅自抄沒三品以上京官擒械邊將換易近侍等十罪以聞上即命革罷而輅亦致仕去斥奸佞永樂中上與學士解縉論羣臣御筆書蹇義等十人名命各疏於下十人皆上所信任亦多與縉善而具以實對於義曰其資厚重而中無定見於夏原吉曰有德有量不遠小人於劉俊曰雖有才幹不知顧義於鄭賜曰可為君子頗短於才於李至剛曰誕而附勢雖才不端於黃福曰秉心易直確有執守於陳瑛曰刻於用法好惡頗端於宋禮曰戅直而苛人怨不恤於陳洽曰疏通警敏亦不失正於方賔曰簿書之才駔儈之心既奏上以授仁宗曰李至剛朕洞燭之矣餘徐驗之問尹昌隆王汝玉對曰昌隆君子而量不𢎞汝玉文翰不易得所惜者有市心耳後十餘年仁宗出其所奏示楊士竒曰人率謂縉狂士縉非狂士向所論皆定見也宣宗為皇太孫時宫寮左庶子陳山邪佞得寵同列戴綸林長懋以直諫為山所讒害上即位始知之宣德四年十月一日朝罷楊士竒侍上於左順門遙望見山上曰汝試言山為人對曰君父有問不敢不盡誠以對山雖侍從陛下久然其人寡學多欲而昧於大體非君子也上曰然趙王事幾為所誤朕以此甚薄之近聞渠於諸司日有干求不厭當不令溷內閣也蓋上初臨御以山及張瑛東宫舊臣俱升內閣視事二人行相類至是浸聞於上數日後有㫖調瑛南京禮部山專教內𥪡俱罷內閣之任朝士皆頌上明决山自此不復得近扆前矣天順初內閣修撰嶽正間為上極言曹石勢太盛慮有變宜早為節制上曰汝可以朕意告之正徑造亨諷令稍自斂戢二人怨之正遂被斥竄及二人誅上召李賢謂曰向者嶽正固言之他日又思正曰嶽正倒好只是大膽因召還焉武宗時逆瑾用事凶焰張甚大學士劉健等率諸大臣伏上前請誅之內有隂為瑾地者事遂沮而健與遷輩皆引去於此見君子勝小人之難也當其事者必先事豫而後可雖然天實為之將奈何哉計事永樂初太宗一日晚出右順門召內閣諸臣獨楊榮一人在出江西三司奏章示之言吉安鄉民之嘯聚者已悉復業朝廷初有聞即遣行人許子謨齎敕撫諭子謨行將一月又遣都督韓觀率兵繼之如撫諭不下即加兵及是奏至上曰非觀至不下宜降敕褒觀榮讀訖奏曰計發奏之日觀尚在中道未足褒也從之後詢之果然榮自是益見重邉人阿嚕台既納欵欲收女直吐蕃諸部聽其約束請朝廷刻制詞於金定集諸部長磨酒飲之以盟上以問翰林諸臣黃淮對曰邊人心地質實使各自為心則力易制若併為一則力大難制矣此舉實其祕奸謀也上顧左右曰黃淮如立高岡無逺不見爾等如立平地所見惟目前耳天順初石亨從子彪鎮大同遣使獻捷內閣詢其狀其人盛陳戰伐且稱斬首無算皆梟於林木不能悉致嶽正取地圖指示曰某地至某地四面皆沙漠梟於何所其人驚伏成化四年平凉土人穆蘇反官軍連失利遣都御史項忠往撫捕之大學士彭時商輅料其必成功而朝議洶洶咸欲再遣將出師時等執不可或以危言動之時等不為動未幾獻俘至上喜甚各賜俘奴一人籌邊洪武十七年侍講李翀論武事重在任將上曰任將固重必任之專信之篤而後成功齊用穰苴魏用樂羊可謂專且篤矣故皆有功若唐用魚朝恩吐突承璀為監軍使將掣肘故敗事也永樂以來邊事長勞廟算經略永樂五年諭德楊榮奉命往甘肅同總兵議邊務察視守備還奏稱㫖七年春榮扈從北京甘肅總兵何福奏托克托布哈等率部來歸命榮往同福處置還奏上悅遂奉命持節往額齊諾之地封福為寧遠侯十年冬甘肅守帥西寧侯宋琥奏叛寇婁達衮逃居齊勤䝉古衛將為邊患時豐城侯李彬鎮陜西遂敕彬率師剿之且命榮往與彬計度十二月還奏餉道險阻今沍寒人疲馬瘠不可行且小醜不足以煩王師遂敕彬旋師無幾叛者復歸二十一年秋榮復扈從西征駐萬全一切軍務悉付榮掌之寧陽侯陳懋奏畨主額森圖噶來歸命榮往議定降歸奏稱㫖二十二年復從北征中道軍餉不繼上聞之命榮與金幼孜總計其數遂如所言遣使諭之釋其不臣之罪下令班師宣德二年十月交址黎利遣人進前安南陳王三世嫡孫高表乞立為陳氏後其辭懇惻上密以示英國公張輔輔請發兵討之輔退乃召尚書蹇義夏原吉謂曰何以處之二人對曰舉以與之無名徒示弱耳二人退召楊榮楊士竒出表示之且諭以三人所對曰今日與爾兩人决之榮曰永樂中費數萬人命得此至今勞者未息困者未蘇發兵之說必不可從不若因其請而與之可旋禍為福上顧問士竒云何對曰榮言當從求立陳氏後者太宗皇帝之初心求之不得乃郡縣其地十數年來兵民困於交址之役極矣此皆祖宗之赤子行祖宗之初心以保祖宗之赤子此正陛下之盛德何謂無名且漢弃珠崖前史為榮何謂示弱臣侍仁宗皇帝久聖心數追憾此事臣願陛下今日明决上曰汝兩人言正合吾意皇考言吾亦聞之屢矣今吾三人可謂同心同德遂令尚膳賜酒饌明旦罷朝出高表示文武羣臣皆曰從之便遂赦交址命羣臣舉奉使者僉舉安衆上聞已定明日蹇義欲易以伏伯安莫敢異之士竒私謂夏原吉曰此無藉小人用之必辱朝廷公當榻前力主張蓋時上多主夏言已而有㫖召衆皆入蹇義遂奏用伏上顧問夏夏對曰不可用蹇曰伏善言語非衆所及士竒曰伏有穢行而無學識遣之必辱國遂不用英宗北狩郕王即大位有倡議南遷者中外洶洶大學士陳循高榖侍講商輅等上言聖駕一移大勢去矣乃出榜曉諭人心稍安無何冦大舉進迫京城衆論戰守不一循等皆言兵敗之餘只宜固守且彼乘勝遠來勢必難久宜伏兵歸路擊之時京師戒嚴內閣諸臣運謀設䇿迄昏乃出至忘寢食外諭諸將奬其忠義之心日令操練軍馬整飭器械以備戰守遣官分投安輯畿內降人以防不虞嚴督邊關固守要害然敵攻益急總兵官石亨折弓矢厲聲曰宰臣不出計䇿我莫能支矣循與輅乃上疏發敕宣府遼東令總兵官楊洪曹義各選徑騎刻期以進與京軍夾擊又為張榜各營有能擒獲也先者加大爵厚賞復寫作喜寧與司禮太監興安云約誘也先入寇宜乘其孤軍合兵剿殺蓋喜寧非漢種為內侍至太監與敵通謀者也敕與書為也先邏卒所獲未幾宣府遼東兵至我軍大振敵聞夕遁去京師遂定時聞江浙兩廣雲貴皆盜發羽書絡繹內閣籌畫之功居多天順中兩廣用兵編修丘濬條用兵事宜內閣具本繳進行之𢎞治十七年六月北敵小王子遣使求貢甚急大同守臣以聞已許二十人入貢既而不來或報冦有異謀內閣具揭帖乞㑹同司禮監及兵部尚書照成化年例於左順門詳審上朝退召劉健李東陽至暖閣上曰各邊關糧草須與劉大夏說用心整理大夏者兵部尚書也健奏曰京營官軍亦須整㸃聽征上曰然東陽曰令總兵官管事固可領兵則未知如何健曰須用曾經戰陳者上曰未必要用經戰陳但要有謀略耳東陽對曰聖諭甚當有謀略與經戰陳者須兼用乃可耳但京軍有名無實初設團營時有十二萬今消耗過半前年選聽征一萬便不能及數矣古人云足食足兵今食不足兵不足臣等每思及此寢食不安上曰軍士須管軍官撫恤不可剝削東陽對曰誠如聖諭但近年官軍做工太多既纍身力又陪錢使用外衛輪班皆過期不至正為此耳上曰宣德以前軍士皆不做工內官監自有匠人云云此句聽不能悉東陽叩頭對曰皇上明見朝廷養軍本以拱衛京畿不為工役今後工程望乞減省不令軍士受纍養其鋭氣庶緩急有濟上曰然又曰京營軍士都著劉大夏用心整理先生輩亦傳得㫖可以朕意語之健等對曰諾上又曰先生輩是腹心大臣有事須說如昨日所進揭帖不說時朕不得知東陽曰臣等有所聞見固不敢不盡心陳說惟望皇上斷而行之耳上又曰然遂叩頭出於左順門㑹審走回男子一人云在敵中聞有議者欲搶黃裡黃裡謂京城也又三人云諾延衛頭目額爾竒木領三百人往北敵通和小王子與一小女寄養似有引誘入寇之跡各具揭帖以聞二十四日健與東陽廷議進禦敵事宜又計處差官整理邊關糧草缺乏七月初四日復召至暖閣上袖出大同鎮巡官奏言北敵勢重近又掘墩殺軍上曰邊軍皆我赤子被彼殺者苦何可言朕當與作主京軍已選聽征二萬須再選一萬整理齊備定委領軍名目即日啓行健等對曰皇上重念赤子一言誠宗社之福京軍亦須整㸃但未宜輕動遷曰邊事固急京師尤重居重馭輕亦須內顧家當上猶未釋東陽曰近日北敵與諾延交通潮河川甚為可慮健因備言大同險遠本鎮尚可支持潮河川去京師不過一日最為切近誠宜先慮上曰今亦未便出軍但須預備停當待報乃行免致臨期失措皆對曰聖慮甚當退擬通選京軍三萬令兵部推委領軍官臨期酌量地方事勢具奏定奪不可輕出大意與內閣同師乃不出已而沿邊將帥殺獲次第捷報而敵謀亦沮嘗觀守成之世武事大率不振而國勢亦隨以弱其故何也委大柄於私門以官軍為私役雖欲張皇其將能乎誦聖祖之彛訓體孝皇之遠憂籌邊者不可不早為之所也建言自本院儒臣既遠黼座所謂近侍之職一切玩愒從事於是朝廷以傳㫖為顧問而疏奏以批答為都俞雖或因事建言少輸忠藎特取罪爾考之永樂二十年三殿灾金幼孜楊榮等陳便宜十數事皆見施行而他官建言如蕭儀輩多獲罪死侍讀李時勉自刑曹入院即慨然疏論天下事被繫兩歲不死洪熙初復抗言極諫被廷撲不死改交址道御史又三上章下詔獄不死蓋未始有申救之者修撰羅汝敬亦言時政十五事降雲南道御史蕭時中言致灾八事侍講謝璉上治安十五事皆不見用正統八年四月雷震奉天殿鴟吻詔求直言時宦官王振專恣侍講劉球上疏謂權不可下移振怒欲嫁禍無由適修撰董璘自求為太常卿下錦衣衛獄而球所言有謂太常卿必得儒者衛使馬順迎合振意誣球與璘朋奸亦下獄竟死焉學士劉定之因京師大水上十事土木之變復上十事皆不行景泰初上皇將至自北朝廷惟具報禮不及迎復滿朝不敢言惟檢討邢讓奏言前次敕書不具迎復上皇之意聞者壯之然讓坐是不通顯時方春久旱兩京灾異迭見南京學士周叙建言大臣之罪固不可辭臺諫之臣緘默無補各處鎮守中官病民尤重皆致灾之由也有㫖內官不動㑹叙考滿至京師命留本院辦事叙辭不允吏部具奏南京翰林院缺官視事乃命叙往編修周洪謨始授官即上疏條陳十二事繼是歷官兩京以至為學士凡有所見即封章具聞前後無慮數十宣德正統以館閣之臣章奏之多未有踰之者而或訾其多言憲宗初即位編修張元禎上疏勸行三年喪又上疏言治道大本大原曰講學曰定治曰用人曰厚風化行此四者則庶政畢舉未幾與時宰議不合乞歸家居者二十餘年修撰羅倫編修章懋黃孔昭檢討莊昶相繼言事皆遠貶及復用則皆官南京慈懿皇太后之喪修撰羅璟上疏言宜合葬裕陵又與諸學士合章以請其後亦左遷南京員外郎嗟乎聖祖不設言官以廣聰明而惟以盡言責諸近侍近侍莫如翰林之見重者其意蓋可暏矣因襲之弊汲引申救罔攸賴焉則誰肯逆龍鱗以犯天禍者近世議者以翰林建言為出位然則聖祖之詒訓非耶出使言事宣宗初元大學士金幼孜奉命持節冊封安化真寧二王妃歷河南北關東西之境所過兵民休戚既還具言於上景泰五年南京灾上念祖宗陵寢所在大學士高榖往祭事竣録被灾者千餘家悉發廪賑之歸奏稱㫖𢎞治十七年閏四月闕里因重建孔廟落成遣大學士李東陽祭告五月事竣還朝以所經過天災民瘼上奏詔查議行之致仕言事正統中李時勉自學士為祭酒致仕家居己巳之變手疏選將練兵奬忠節正名分三事上之時年七十有六矣忠臣雖在畎𤱔其不忘君如此庶吉士言事洪武二十一年四月上謂庶吉士解縉曰朕今命爾義則君臣恩猶父子當知無不言縉於是上封事萬言皆人所諱者上嘉奬之景泰初西北用兵庶吉士劉清上封事多見採録清由是知名纍擢兵部侍郎成化二十三年十月庶吉士鄒智因灾異上疏略曰星變見於朝廷蓋陽不能制隂之象也宜進君子而退小人其原當先於內閣少師萬安恃權怙寵殊無厭足少師劉吉附下罔上漫無可否太子少保尹直挾詐懷奸恬無亷恥世之所謂小人也南京兵部尚書致仕王恕素志忠直可任大事兵部尚書致仕王竑秉節剛徑可寢大奸右都御史彭韶學識純正可决大疑世之所謂君子也然君子之所以不進小人之所以不退者豈無自哉大抵宦官有以隂主之也自古君子小人進退之機未嘗不决於此曹之盛衰也願陛下凡待宦官一以太祖為法凡任內閣一以太宗為法則君子可進小人可退而天下之治成矣疏上不省權臣中傷之謫石城千户所吏目而死伏闕伏闕泣諫自唐宋以來有之成化四年六月慈懿皇太后錢氏崩憲廟嫡母也詔大臣議葬所衆相視莫敢先發大學士彭時謂同朝曰梓宫當合葬裕陵主當祔廟此一定禮無可議即與禮部尚書姚䕫定議且疏引漢文帝合葬吕后宋仁宗合葬劉后故事乞念綱常之大體先帝之心必求其至當此莫大典禮萬一有違在廷百辟將有言之宗室親王將有言之天下之大萬世亦將有言之豈能保其終無據理改而從正者乎上猶重違母后之意未允時率羣臣伏文華殿以請號哭不起上聞之使中官宣諭使衆官退翰林中有呵中官使還者衆官皆曰死不敢奉詔且不得命不敢退時與學士商輅劉定之進曰人心如此實天理所在望朝廷俯從羣臣下情於是中官入奏上感動母后亦悟即傳㫖諭羣臣曰卿等昨者㑹議大行慈懿皇大后合祔陵廟固朕素志但聖母疑事有相妨未即俞允朕心終不自安再三據禮所幸聖慈開喻特賜允諾卿等其如前議施行勿有所疑故諭衆聞命咸呼萬歲而退蓋此事非上曲全孝道何以至此真盛德主也正德中伏闕請誅逆瑾及跪門號泣諫止南巡皆不見聽蓋此乃先朝典故上或未知之爾雖然上下之情相親相信如宣德以前則衮職之闕自當潛消而默補亦何至是哉進諫旌賞大學士楊士竒輩在仁宣二朝言聽諫行每被旌賞初永樂中御史李祥舒仲成奉敕理木植歲課之弊王汝玉預焉汝玉上監國時所愛者令㫖命祥等削其名勿奏二人力言不可萬一太宗有聞得罪反重既忤意遂已犯者後皆茍免上嗣位尚書蹇義因奏仲成他事上曰是嘗為御史查得南京木植稅課乎對曰然曰李祥安在曰丁母憂去時仲成已升湖廣憲副即命都察院捕治仲成士竒聞之進疏曰向來小人得罪者多陛下即位以來皆已宥之今又追理前事即詔書不信漢景帝為太子時召衛綰稱病不赴即位進用綰前史韙之上覽之喜即有㫖罷治仲成而降敕奬諭士竒且賜米及鈔幣又面諭之曰卿盡心如此朕復何憂宣德六年七月時上好微行一夕漏下二十刻以四騎出過士竒家時報者言范太監來士竒倉皇出迎上巳入門立月中士竒俯伏悚懼言陛下奈何以宗廟社稷之身而自輕擾塵埃昏暗誰識至尊萬一或有識者變起倉卒何以備之上笑曰思見卿一言故來耳遂屏左右語竟顧謂士竒曰此居且敝當為汝葺理士竒叩頭懇辭曰陛下宫殿未建臣必不敢當且車駕今夕俯臨外間明日必有知者萬萬自此慎出事變不測當慮也駕還宮明旦遣太監范𢎞密問士竒車駕幸臨曷不謝曰至尊夜出愚臣逮今中心惴栗未已豈敢言謝又數日遣𢎞問士竒曰今天下平靖上時一微行何足慮堯不微行乎士竒對曰陛下尊居九重恩澤豈能遍洽幽隱萬一有寃夫怨卒窺伺竊發誠不可無慮後旬餘錦衣衛獲至二盜蓋盜嘗殺人官捕之急私結約候車駕之玉泉寺挾弓矢伏道邊林莽中作亂時有捕盜校尉亦變服如盜入盜羣真盜不疑以其謀告之遂為所獲上既誅二盜嘆曰士竒言不虛即日遣范太監賜白金文綺士竒明旦入謝上諭以盜謀且曰愛朕莫如汝自今如汝言不復微行他如楊溥密疏獲賞之類不可枚舉自是以來蹇諤之風漸少而言之亦未必不干怒也惟𢎞治五年四月大學士丘濬奏疏萬餘言大槩謂上改元之初歲在戊申與太祖洪武初元同符今天災迭見宜釐革庶政盡復太祖之舊以應天意因擬為二十二條歷指竒邪之輩上覽奏甚悅批答以為切中時弊行之自此聖心嚮用恆加賞賚然濬時年已耄矣其後上日英明頗遠近習而信聽內閣亦濬有以啓之也武宗時逆瑾柄國雖大臣言出禍從大學士劉健等極言時弊以為即位之初詔書一下天下延頸想望太平而朝令夕改訖無寧日百官庶府倣效成風非惟廢格不行抑且變易殆盡建言者以為多言幹事者以為生事纍章執奏則謂之奏擾查革舊弊則謂之紛更憂在於民生國計則若罔聞知事涉於近幸貴戚則牢不可破以一二人之私恩壞百年之定制而不顧以一二人之邪說違滿朝之公論而不恤臣等叨居重地徒擁虛銜或㫖從中出略不預聞或有所擬議徑行改易尋又奏言政令十失言甚剴切瑾怒遂皆謝去已而宸逰欲遍海內進諫有杖死者嗚呼回視仁宣之世若越宇宙而邈不可及也旌賞直言以成至治天意其將有待於今日乎翰林記卷八
