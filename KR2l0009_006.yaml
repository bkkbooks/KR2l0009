body:
  text: 翰林記卷六明黃佐撰朝參凡朝參洪武中常朝御謹身華蓋奉天三殿命本院官序立居文武第一班之後稍近上便於觀聽不許攙越每遇上御奉天門則立御榻之左皆常服朝朔望上御奉天殿具公服隨班行禮畢詣文華殿朝東宫云永樂初令內閣儒臣侍朝立金臺東御三殿皆升殿賜燕宅憂則御西角門如常朝奉天門之制正統初內閣官始移下貼御道東序立本院官則序立丹墀之東第一班後御西角門亦如之若午朝晚朝之儀洪武時無可考者永樂中午朝御左順門既升御座內官設案內閣及本院侍班官俱于案西序立晚朝或御右順門儀節亦如之宣德以後止御早朝退御便殿景泰中復御午朝而晚朝遂廢大學士王鏊論視朝曰在易泰之象曰上下交而其志同否之象曰上下不交而天下無邦下之情達於上上之情達於下所以為泰不然雖有國若無國矣故曰無邦也交則泰不交則否自古皆然而不交之弊未有如近世之甚者也君臣相見不過視朝數刻遙相唯諾君或不識其臣臣或不交一言於君上下從事不過章疏批答相關接刑名法度相把持而已非獨沿襲故常亦其地使然何也本朝視朝於奉天門未嘗一日廢可謂勤矣然堂陛懸絶威嚴赫奕將軍持鈲御史紏儀鴻臚舉不如法通政司奏上特是之命所司知之而已謝恩見辭惴惴而退上何嘗問一事下何嘗進一言哉此無他地勢懸絶雖欲言無由言也愚以為欲上下之交莫若復古內朝之法蓋周之時有三朝庫門之外曰外朝詢大事在焉路門之外為治朝日視朝在焉路門之內曰內朝亦曰燕朝玉藻云君日出而視朝退適路寢聽政説者以為視朝而視羣臣所以通上下之情聽政而適路寢所以決可否之計漢制大司馬左右前後將軍侍中散騎諸吏為中朝丞相以下至六百石為外朝蓋外朝為尊中朝為親也唐皇城之南一門曰承天正旦冬至受萬國之朝貢則御焉蓋古之外朝也其北曰太極門其內曰太極殿朔望視朝在焉蓋古之中朝也又北曰兩儀門其內曰兩儀殿常日聽朝而視事蓋古之內朝也宋時常朝則文德殿五日一起居則垂拱殿正旦冬至聖節稱賀則大慶殿賜宴則紫宸殿或集武英殿試進士則崇政殿侍從以下五日一員上殿謂之輪對則必及時政利害內殿引見亦或賜坐或免穿執蓋亦三朝之遺意焉夫天有三垣天子象之中朝象太微也外朝象天市也內朝象紫微也國朝朔望正旦冬至大朝會則奉天殿即古之正朝也常朝則奉天門即古之治朝也而內朝獨缺然非缺也太祖太宗時華蓋謹身武英等殿筵宴奏事則內朝也而今久不御三殿深嚴人臣鮮或窺焉故上下之交絶而不通天下之弊由是而積臣愚欲於常朝之外於便殿之側倣古內朝之法或三日或五日一御焉外朝或可間歇而內朝必以時舉六部諸司以次奏事上隨意決之難決者或從容問之大臣五日一次起居侍從臺諫五日一員上殿輪對或不時召見凡謝恩朝見之類皆得上殿咫尺相對略去威嚴上不難於問下不難於對人才之賢否政事之得失風俗之美惡閭閻之疾苦古今之治亂皆得畢陳於前如此則上下之情可通內外之壅蔽可決天下之事將無不可為者侍坐洪武三年七月禮部尚書崔亮奏準凡大朝會賜宴文官三品以上武官四品以上上殿者賜坐墩其退朝燕間行幸之處勛舊之臣文學之官賜坐者仍加絨罽繡褥九年定學士承旨於六部尚書之上學士在光祿卿之上侍講學士在侍郎之上時正官列卿先侍郎故也其後學士雖五品猶先尚書焉十六年十一月甲寅詔定朝參官員坐次凡奉天門賜坐六部侍郎應天府尹國子監祭酒翰林院官諫官僉都御史坐於西角門東向若華蓋殿坐於鹿頂外東西向永樂以後御三殿或便殿行幸無不賜坐者惟仁宣二朝始以尚書侍郎兼學士官於是學士非兼三品以上職者乃坐其下英廟以來接見儒臣之日少故侍坐之儀遂廢若大祀天地次日慶成大宴羣臣學士升殿侍坐在文職四品之上本院及詹事府坊局經筵官在六科都給事中之上中左門序坐修撰等官在六科給事中之上本院帶俸官在太常寺博士之上詹事府主簿通事舍人在鴻臚寺署丞之上丹墀中序坐正統二年特命侍講一人升殿列學士之下成化四年令修撰等官凡近侍風憲者另别於丹陛下之東西稍北而庶吉士與焉殿上侍班常朝御謹身華蓋奉天三殿百官行叩頭禮畢本院官用學士侍讀學士侍講學士侍讀侍講修撰編修升殿侍班洪武二十四年三月辛未詔文武官除分詣文華殿啓事外凡遇升殿合用履鞋照依品級侍班有違越失儀者從監察御史儀禮司紏劾東班則六部等掌印官本院官及春坊學士尚寶司西班則五府等武官及給事中中書舍人正統以後惟萬壽聖節冬至正旦大朝賀及頒詔進實録册立册封始御奉天殿其侍班惟用修撰編修檢討等官四員是日早具朝服履鞋偕禮部鴻臚寺及導駕給事中紏儀御史等官最先入循殿旁至華蓋殿前候上出鴻臚寺官奏執事官行禮禮甫畢即趨出復從殿旁趨出奉天殿內北向立候雙炬自中前導則駕至矣及上升寶座導駕官分東西立定趨至寶座之東西向與中書舍人對立候行禮畢自殿門以次趨出若東宫千秋節及冬至正旦朝賀亦用修撰等官二員與春坊司經局官對立侍班於文華殿行禮云奏事洪武三年七月己亥禮部尚書崔亮奏凡諸儒官於御前奏事或進呈文字恐有口氣體氣須退立二三步毋輒近御案凡立必於東西隅不得直前制曰可永樂四年令六部及近侍官有事當商略者皆於晚朝陳奏景泰二年令午朝翰林院先奏事學士周敘嘗言於景帝曰臣自永樂以來職叨班行伏見太宗仁宗宣宗臨御之時大班既退即於門上説事各衙門官輪流向前君臣相與商確政務罄盡所言人懷畏憚而事幾不泄成密勿廟堂之美自正統以來王振擅權獨立在旁於是輔弼大臣及近侍官員不得召對或有召對亦不敢詳盡以致釀成今日之禍宜令羣臣依舊制輪流向前説事上止與對者相知他人皆不得預聞庶得吐露肝膽而不宣泄於外然竟莫能行今按三朝聖諭録所載曰翰林諸臣奏事右順門又曰上御西角門翰林諸臣奏事退如此之類不一而足當時君臣相與蓋可見也便殿入奏國初信用儒臣謁見無時每出御奉天門諸司有奏事常規退御便殿有特以事入奏者許徑入洪武二十九年五月戊寅初命詹事府翰林院尚寶司中書舍人六科給事中儀禮司於午門內出入者各給牌為驗已而罷之使近侍官得日至便殿奏事永樂二十二年八月楊士竒新改華蓋殿大學士謝恩畢聞惜薪司奏準循歲例賦北京山東棗八十萬斤供宫中香炭之用士竒入將奏之時蹇義夏原吉奏事未退上望見士竒笑謂蹇夏曰新華蓋學士來奏事必有理試共聽之士竒言詔下裁兩日今聞惜薪司傳旨賦棗八十萬斤得無過多是雖嵗例然詔書所減除者皆歲例上喜曰吾固知學士言有理吾數日來宫中事叢脞此是急遽中答之不暇致審即命減除四十萬斤即其事也至正統時遂廢景泰中侍講劉定之抗疏言凡政事有早朝未及決者宜日御便殿使近臣侍於側大臣奏於前言官察其邪而加糾彈史官書其言動以示懲勸君臣之間詢謀疇咨互相可否以求至當此前代故事祖宗成法也遵而行之則剖決萬幾日益以熟審察百官日益以明聖政益新天命益隆矣若乃仍如前日無事但以奏本進入旨意批出臣恐偏聽生姦獨任成亂治化無由底於雍熙也疏上不省今按聖祖時出入禁籞以至臨朝侍臣無不從者有所擬議欲修播告則翰林院官承旨草制中書舍人當御謄寫謂之副墨尚寶官用寶即時發行若有憸邪在側或事當參駁則六科給事中十三道御史抗聲於御前執奏謂之對仗彈劾定之所云與王鏊論視朝互相發然猶未詳及於此採而行之以復成憲是在今日入直洪武永樂洪熙宣德四朝近侍官輪班入直若本院官則日在館閣吳沉劉三吾胡廣楊士竒胡儼王英王直輩嘗有內直倡和詩偶記曽棨東華門內新館初成入直有作云東華樓觀鬱岧嶤高閣新成抗碧霄祕府圖書金作匱御溝流水玉為橋草分翠色承殷輅鳥弄歌聲和舜韶儤直幾回清坐久隔簾時有御香飄蓋當時車駕嘗臨幸館閣故也不獨宣召燕對與供奉文字而已留宿洪武三年將剖符封功臣下學士宋濓議五等封爵召宿大本堂討論逹旦永樂中內閣七人者常召至燕寢論事或命假寐至達旦乃出及太宗上賔仁宗命尚書蹇義夏原吉學士楊榮楊士竒侍讀王直侍講王英同定大喪禮議國政宿內閣者凡七日正統中三殿新成學士楊溥受命草詔夜直東閣作詩紀其事有奎宿光臨東閣邃觚稜影接北辰高之句云侍逰禁苑聖祖製大誥首以君臣同逰為言故當時儒臣每得侍上逰觀禁苑而亭臺樓閣靡不登眺相與笑談一如家人父子凡以通上下之情而成天地之交也學士宋濓嘗侍上後苑觀穫上曰農事成矣對曰國以民為本民以食為天陛下知稼穡之艱難而念生民之良苦實盛德也洪武六年正月丙午上御武樓之便閣召御史中丞陳寧太子贊善大夫宋濓賜坐左右上談嘉祥之應敕中貴人取所儲膏露於宫中俄盛以翠罌跪進玉潔珠圓世所未覩也已而詔畀爨器至用金杓煉水二升火既勻水勢成濤上起自龍帳中親啓罌以投須臾融化與水為一上取杓傾㵼二內侍舉幕承之查滓已淨重漉以絳紗囊上飲一爵而分賜寧與濓焉且曰此天地至和所凝也卿等服之去沉痾而享遐齡寧等飲畢奠爵於几頓首而退賦甘露漿詩以侈其榮濓在上前所陳説不為隱蔽雖家事茍有問亦一一道之嘗曰君猶父也天也其可欺邪一日上問曰卿昨飲酒座客為誰饌為何物濓悉以其實對上笑曰卿飲時朕令人視之果如卿言卿信不欺我久益厚之每燕見必命茶賜坐每旦令侍膳詢訪舊章講求治道或至夜分乃退永樂中學士解縉胡廣等七人從上幸北京每令節燕間扈駕登萬歲山侍宴廣寒殿泛太液池以為常廣等多為歌詩以紀之宣宗時宸逰尤多宣德三年三月庚辰上命尚書蹇義內閣學士楊士竒楊榮等十有八人同逰萬歲山許乘馬及將從者二人既入東上北門乘馬及乾寧門下馬步出度橋中官導引登山周覽復賜登御舟泛太液池賜茶及素羞十餘品而凡蕩槳持楫者皆中使倡和合律既而抵新建圓殿地勢竒勝金碧照耀恍若身在蓬萊宫闕有間上乘馬至慰勞甚周皆叩首稱萬歲上大喜徘徊久之特召士竒榮諭以天下無事不可流於安逸而政務之暇命卿等至此以開豁心目庶幾古人逰豫之樂不在拘檢也士竒榮叩首稱謝而退傳諭羣臣方憑檻觀中官拿舟網魚復有旨人賜御釀玉醅一甌飲既復命乘馬逰小山行一里許上乘馬繼至羣臣匆促將下馬迎特旨勿下諭中官人賜鈔三千貫從者人三錠且令中官陪至小山飲饌盡醉而歸駕遂回未半里遇池中水鳥羣飛上親發一矢中一鳥墜馬前諸臣方入小山門遙見中官持鳥至傳命賜義等炙食之羣臣望闕叩首謝遂遍逰小山觀二獅子滚毬并金龍噴水水簾及曲水流觴之處皆雕琢竒異布置神巧莫不讚歎良久乃退坐松柏間享酒饌皆珍竒之品中官相與勸酬甚歡酒未闌人賜鸚鵡杯將徹復賜從者酒食皆醉飽而歸及出西安門天已暝抵家則漏初下矣朔旦義等方相率詣御前稱謝而中官傳旨免謝云士竒與榮皆為詩以紀之七月十有一日召尚書蹇義夏原吉楊士竒楊榮同逰東苑夾路皆嘉植前至一殿棟宇宏壯金碧焜耀其後瑤臺玉砌竒石森聳環植花卉香豔穠郁引泉為方池上玉龍高盈丈噴激下注入於石渠直透殿內兩旁石溝之首圓轉各有二竅並列其一水貫其中委曲縈回復流至第二竅乃入於池直通殿外石池之中竒石屹立不假雕琢宛若升龍之狀上四竅以通泉脈而常閉之啓其竅則水皆湧出直上盈丈與殿後石龍吐水相應池南又有臺高數尺森列異石植以花卉紛披掩映殿陛前有二石左如龍翔右如鳳舞天然竒巧宛若生成初上御殿中召義等語政務良久乃曰此旁復有草舍一區乃朕致齋之所非敢比古人茅茨不翦之意然庶幾不忘乎儉矣卿等可遍觀於是中官引至一小殿梁棟椽桷皆以山木為之而覆之以草四面闌楯亦然不加斫削少西有路迂回入荆扉則有河石甃之河南有小橋覆以草亭左右復有草亭亦東西相望宛若台星枕橋而渡其下皆水遊魚牣躍可觀中為小殿有東西齋有軒以為彈琴讀書之所悉以草覆之四圍編竹籬籬下皆蔬茹匏瓜之類觀畢上臨河命舉網得魚數尾命中官具酒饌賜魚羮既而召至前賜以金帛縧環玉鈎等物遂賜宴於東廡珍羞異味不可勝紀復被旨令各盡醉而歸則暝矣士竒賦四言詩九章曰齋宫曰圓亭曰方沼曰翠渠曰黛峰曰靈泉曰御苑曰嘉魚曰瑞匏榮亦賦長歌次早進謝焉七年七月上登萬歲山坐廣寒殿召翰林儒臣侍命周覽都畿山川形勢既畢上諭以元興替之故曰兹山兹宇順帝所日宴逰者也豈不可感侍臣叩首曰紂之迹周之監也上曰然正統景泰中蓋鮮聞矣英宗復辟始與諸大臣同逰天順四年四月十六辰刻上御南薰殿召尚書王翺李賢馬昻學士彭時吕原五人入侍命內侍三人鼓琴上曰琴音和平足以養性曩在南宫自撫一二曲今不暇矣所傳曲調得於太監李永昌永昌經事先帝最精於琴是三人者皆不及也賢等對曰由此不輟亦可精矣因皆叩首曰願皇上歌南風之詞以解民愠幸甚上起人賜鑲鶴頂博帶一條皆親舉授五人者皆叩首而出嘗觀君臣之際上貴致其禮下貴盡其誠若私昵媟褻流連光景殆非聖祖所謂同逰之初意也已燕飲賡和洪武二年十一月二十有二日上御外朝召學士宋濓侍講學士危素侍讀學士詹同直學士陳桱待制王禕起居注魏觀吳琳列坐左右既而命本官進饌賜封酒飲之上屢盡觴中官承旨宣勸甚力濓數以弗勝杯杓固辭上曰卿但飲無傷也酒終上親御翰墨賦冬日詩一章復繫小序于首命各以詩進濓最先禕次之觀琳桱同又次之素最後詩以民瘼為言上曰素終老成其有軫憂蒼生之意乎於是各沾醉而退六年開局禁中修大明日厯十一月十五日前御史中丞誠意伯劉基偕學士宋濓詹同侍上燕乾清宫之便閣同被酒而還時繕書監生黃昶在館同愛其有俊才賦詩贈之字大如斚少選奉御傳宣召濓等赴右順門會上適乘步輦而至同餘醒猶未解上謂之曰卿醉猶未醒耶同對曰臣雖醉猶能賦詩贈黃秀才謂昶也上曰詩何在同對曰在史館中上顧濓亟取之既上奏上笑謂濓曰朕即和同詩卿當為朕書之濓於是受命書焉同詩不過稱昶才美而御製之詩則并及君臣燕飲之故濓歸與昶言之以為詞壇盛事八年八月甲午上觀於水陋尹程秋水賦言不契道乃更為之賦成召學士宋濓等觀之且令各撰賦以進濓率同列撰成詣東閣次第投獻上皆親覽焉復置品評於其間已而賜坐敕大官進天厨竒珍內臣行觴觴已上顧濓曰卿何不盡飲濓出跪奏曰臣荷陛下聖慈賜以醇酎敢不如詔第臣年衰邁恐不勝杯酌志不攝氣或愆於禮度無以上承寵光爾上曰卿姑試之濓即席而飲將徹上復顧曰卿宜更釂一觴濓再起固辭上曰一觴豈解醉人乎卒飲之濓舉觴至口端又復瑟縮者三上嘆曰男子何不慷慨為對曰天威咫尺間不敢重有所瀆勉強一吸至盡上大悅濓顔面變頳頓覺精神遐漂若行浮雲中上復嘆曰卿宜自述一詩朕亦為卿賦醉歌二奉御捧黃綾案進上揮翰如飛須臾成楚辭一章濓既醉下筆傾欹字不成行列甫綴五韻上遽召至前命編修朱右重書以遺濓遂諭曰卿藏之以示子孫非惟見朕寵愛卿亦可見一時君臣道合安樂太平之盛也濓行五拜禮叩首以謝上更敕給事中宋善等賦醉學士歌云宣宗尤喜為詩初即位起學士李時勉而任用之一日幸文淵閣賜諸學士飲呼時勉謂曰卿非朕安得飲此酒時勉頓首謝他日侍逰東苑上賜時勉酒酌以上所御金甌時勉頓首辭曰臣可與陛下同飲不敢與陛下同器上悅命易以銀爵既醉上出御製詩俾賡之宣德六年萬壽聖節上御製詩一章賜尚書胡濙蹇義大學士楊士竒楊榮且曰朕茂膺天命惟爾四人贊翼之功賜宴盡歡而罷明日士竒榮各奉和睿制以獻又嘗與大學士黃淮燕飲於萬歲山淮獻詩他日陛辭復燕飲於太液池御製長歌以贈焉語在第五卷嗟乎虞廷喜起卷阿逰歌其響不聞久矣至我朝而續夫燕所以示慈惠也詩所以道性情也燕飲賡和之際而至情藹然迥出千古祖宗盛時上下之交有如是哉召對祖宗以來於凡燕間之際執政大臣左右近侍時常皆得接見自英宗以幼沖嗣位此禮遂廢惟有大事則傳奉召之問對一二語遽出因襲以為故事景帝時壅蔽尤甚及英宗復辟始知其由乃親決章奏日與大學士李賢議之賢據便殿入奏舊規每朝退獨留不待呼召徑詣上燕間入見以承顧問然同列彭時吕原恆不得與焉上嘗謂景泰全然不理政務或用人升官明日謝恩不知所以文武大臣未嘗接言上下之情如何得通賢曰自古明君未嘗不與大臣相接商確治天下之道所謂接賢士大夫之時多親宦官宫妾之時少也上曰如此天下豈不治安觀英宗聖志蓋勵精求治而賢不能同人致交有功為可憾耳李東陽曰東陽自乙卯承乏內閣時孝宗皇帝臨朝淵默自朝參復命經筵日講之外罕接天顔凡有擬奏陳説答問之類每用本票揭帖大則具題本雖日積月纍往往不能盡𢎞治十年三月二十二日朝食前忽遣司禮監太監韋泰馳至閣亟呼曰宣四先生叩其故曰不知臣溥臣健臣東陽臣遷亟具衣冠至文華殿叩頭畢上曰近前於是直叩御榻司禮監諸太監皆環跪於案側上曰看文書諸太監取本付臣溥臣健又分置硃硯硃筆授片紙數幅於臣東陽臣遷每一本上曰與先生輩計較臣溥等看畢相與議定批辭以次陳奏得允乃録於紙上以進上覽畢親批本面或更定二三字或刪去一二句皆應手疾書宸翰清逸略無凝滯有山西巡撫官本上顧曰此欲提問一副總兵該提否臣溥等對曰此事輕副總兵恐不必提止提都指揮以下三人可也上曰然邊情事重小官亦不可不提耳又禮部本擬一是字上曰天下事亦還看本內事情若止批一是字恐有遺失因取本閲之則曰是只須一是字足矣又一本臣健奏曰此本事多臣等將下細看擬奏上曰文書尚多都要一看下去也是間就此商量豈不好皆應曰諾上指餘本謂左右曰此皆常行事不過該衙門知道耳乃皆叩頭退上復謂左右曰喫茶出文華門尚膳監官捧茶以俟韋太監喜曰茶已具矣蓋時出急召未有宿辦也自天順至今四十年先帝及今上之初間嘗召內閣不過一二語是日經筵罷有此召因得以窺天質之明睿廟算之周詳聖心之仁厚有不可測量者如此自是平臺暖閣稍稍召對并及部院大臣詢其政務若欲復祖宗之舊者及孝肅太皇太后之喪議禮考文久或移晷多或連月藹然家人父子之情顧上既明習國事天語嚴密議論層出或纍數十句臣下雖承造膝欲藎一二語至無間可入或不竟其辭而退退而尋繹所受亦不能悉記也議者以為孝宗若久於天位非惟奏事之制可復而隆平之治且成矣召慰編修楊士竒始入內閣每敷對望見天威猶有懼色太宗召而慰之曰朕知爾文學親擢於此爾但盡心勿自疑畏英廟既復位退御文華殿召大學士高榖學士商輅謂曰朕在南京知爾二人無偏向心如今正要用爾好用心辦事成化四年彗見言官劾內閣大臣商輅等遂求退奉旨朕用卿不疑何恤人言至詰責言者曰唐太宗用王魏朕用商輅有何不可欲加譴調輅奏言臣嘗勸陛下優容言官已荷嘉納如修撰羅倫輩復請召用今因論臣而又責之如公論何上以為然乃釋言官不問而召輅至御榻前慰勉再三祖宗之禮貌儒臣往往如此召示文翰太祖皇帝嘗出御製詩文以示詞臣太子正字桂彥良即於上前大聲誦之琅然左右驚愕學士承旨詹同私戒之上知之謂曰儒者事君正當誠意毋事矯揉也又嘗出御製敕使彥良指摘彥良受命盡言稱上意焉洪武二十年二月甲辰御注尚書洪範成先是命儒臣書洪範揭於御座之右朝夕觀覽乃自為注至是成召贊善劉三吾曰朕觀洪範一篇帝王為治之要道也所以敘彛倫立皇極保萬民敘四時成百穀本於天道而驗於人事箕子為武王陳之武王猶自謙曰五帝之道我未能焉朕每為惕然遂疏其指為注朝夕省覽三吾對曰陛下留心是書上明聖道下福生民為萬世開太平者也宣德七年七月宣宗燕間閲內庫書畫得元趙孟俯所繪豳風圖因賦長詩一章召翰林詞臣示之曰豳詩周公陳后稷公劉致王業之由與民事早晚之宜以告成王使知稼穡艱難萬世人君皆當鑒此朕愛斯圖為賦詩欲揭於便殿之壁朝夕在目有所警勵爾書於圖之後九年十二月宣宗退朝御文華殿召少傅楊士竒等出御書洪範篇及御製序文示之且諭之曰所論或未當卿等當直言勿隱士竒等對曰聖論皆當直得古人精藴上曰朕在宫中雖寒暑不廢書册士竒等對曰帝王勤學問則宗社生民有賴矣惟願陛下始終此心上笑曰卿等亦常須直言朕不為忤翰林記卷六
