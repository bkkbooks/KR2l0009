body:
  text: 翰林記卷四明黄佐撰文華堂肄業洪武六年開文華堂禁中以為儲材蓄徳之所鄉貢舉人至京師詔免㑹試擇年少俊異者俾肄業其中正月甲寅有司以河南第一人張唯等名上召見便殿親命題俾賦詩詩成稱旨唯及王輝李端張翀皆擢編修蕭韶為秘書監直長賜帶冠衣服又明日以山東第三人王璉等見召試如之璉及張鳯任敬馬亮陳敏皆擢編修賜予之受命入堂讀書詔詞林名臣分教之太子贊善大夫宋濓太子正字桂彦良等與焉上謂曰昔許魯齋諸生多為宰輔卿其勉之于是聴政之暇輙幸堂中取其文親評優劣命光禄寺日給酒饌毎食皇太子親王迭為之主唯等侍食左右冬夏賜衣時賜白金弓矢鞍馬寵錫甚厚濓輩雖司啟迪顧諸生皆上所親教不敢以師道自居一日侍燕間詢及肄業孰進益濓對曰無如張唯者因備述其雋才請録為弟子員上笑而許之盖同時進者凡十有七人又選成均之秀入武英堂俾練習政事方徴彭通宋善王惟吉等皆拜給事中禮遇雖不及唯等然侍從車駕應制備顧問未始異也其後多至執政有聲光云文淵閣進學永樂三年正月壬子先是太宗命學士兼右春坊大學士解縉等新進士中選材質美敏者俾就文淵閣進學至是縉等選修撰曾棨編修周述周孟簡庶吉士楊相王訓王直吾紳彭汝器劉子欽余學䕫童朴盧翰熊直王道羅汝敬沈升柴廣敬王英全鼎楊流洪順段民楊勉章敞李時勉倪維哲陳敬宗袁添禄二十八人入見上諭勉之曰人須立志志立則功就天下古今之人未有無志而能建功成事者汝等簡拔於千百人中為進士又簡拔於進士中至此固皆今之英俊然當立志逺大不可安於小成為學必造道徳之㣲必具體用之全為文必並驅班馬韓歐之間如此立心日進不已未有不成者古之文學之士豈皆天成亦積功所至也汝等勉之朕不任爾以事文淵閣古今載籍所萃爾各食禄日就閣中恣爾玩賞務實得於已庶國家將來皆得爾用不可自怠以孤朕期待之意時庶吉士周忱自陳年少願進學上喜曰有志之士也命增忱為二十九人遂命司禮監月給筆墨紙光禄寺給朝暮膳禮部月給膏燭鈔人三錠工部擇近第宅居之且命縉領其事數召至便殿問以經史諸子故實或至抵暮方退五日一休沐使内臣道之校尉備騶從人莫不歆其榮艶上時搜竒書僻事以驗所學棨等多對誦如流上甚喜之多所奬賚恒顧羣臣曰秀才輩性子直可親近縉嘗以鍾山蟠龍詩試諸人甚稱彭汝器所作一日上問捕蛇者說汝器即朗誦於前上竒其才王訓以大江遶金陵賦進上最稱之且程試課業大嚴賞罰之典而王英王直尤為儕輩所推讓云盖是時庶吉士𨽻本院者尚多如孫子良洽順李昌祺蕭省身江銕張宗璉田忠等無慮數十人皆不得與其與者皆被選者也後上嘗親征廵狩雖有庶吉士之選詔如甲申例車駕不及親莅焉宣廟末年銳志儲材合臨御以來三科進士數百人拔其尤者凡二十八人以應二十八宿時癸丑丙辰諸進士發各衙門觀政或既奉使出外矣詔追還選之皆入文淵閣進學其優禮給賜一循永樂甲申之制仍賜御製詩以示勸勵東閣進學景帝興自藩邸議者謂與太宗同故在御恒思復太宗之舊景泰二年詔選庶吉士并首甲柯潛等二十八人命進學於東閣賜居第給大官酒饌及膏燭紙費命内閣大臣典領之盖不别立師不出就外公署一如永樂初科故事然車駕未嘗親莅教也五年亦選庶吉士暨首甲孫賢等十八人遂遵正統時例矣公署教習庶吉士在外公署教習始自正統初年大明㑹典云凡庶吉士内閣奏請學士等官二員教習本院仍行户部給燈油錢兵部撥皂𨽻刑部給紙劄工部撥房屋順天府給筆墨光禄寺給酒飯内閣按月考試俟有成效送吏部銓注本院并除各衙門職事竊謂庶吉士教習寖與文華堂文淵閣時舊規不同其所撥給第虛應故事耳本院不以上請朝廷曷由知之自今宜依祖宗時入禁中侍燕屢承顧問上以儲才蓄徳而為教則下亦必涵養進脩而自朂不惟人才造就而君徳贊輔有攸賴焉若不得已就外教習領其事者宜奏請專使校讐中秘書日令有所撰述以為九重之獻暇則演習經筵講章日久與之討論古今商確經史同異得失且究竟名理歸諸身心以行誼相砥勵務得真儒以為國家之用若其學業高下宜黙識之其或求見邀名則斥而退之勿收匪人以招物議則非惟育材有成效抑亦奉祖宗之遺訓也茍舍大綱而先末藝以詩文記誦為學而道徳政學則忽棄焉授受之際既近於學究而乃設㑹簿稽勤惰惟嚴聲厲色以督責之亦淺乎哉其待士矣正統以來在公署讀書者大都從事詞章内閣所謂按月考試則詩文各一篇第其高下俱揭帖開列名氏發本院立案以為去留之地致使卑陋者多至奔競有志者甚或謝病而去不能去者多稱病不徃將近三年則紛然計議邀求解館最可笑也𢎞治癸丑學士李東陽程敏政教庶吉士至院閱㑹簿悉注病假而去乃賦一絶云回廊寂寂鎖齋居白日都消病歴餘竊食大官無寸補緑隂庭上看醫書其流弊一至於此又聞之前輩云天順甲申庶吉士次年相率入内閣求解館大學士李賢謂曰賢輩教養未久奈何遽欲入仕計禮抗聲對曰今日比永樂時何等教養且老先生從何處教養來賢稍責之即曰吾輩教習雖例該三年已燒却一年矣謂癸未春闈災故也賢怒甚明日請㫖各授職罰禮觀政刑部又數月拜南京刑部主事禮之言雖近不恭然不可謂無稽者觀此則教法不復祖宗之舊其能服英俊之心乎作人秉鈞者宜加之意庶寮召試聖祖時南昌縣學訓導朱善以學行聞本府以名上於朝陞教授洪武八年起取天下教職曾被薦擢者赴京師上廷試之擢善第一除修撰十六年十月東昌府學教授馮獻考最召試稱㫖除左贊善二十年十一月戊子以河南府學訓導葛鈞為侍講學士鈞學行著聞上召試之果不謬故有是命三十年六月召試行人司副陳性善行人陳成稱㫖皆擢檢討他如傅藻袁渙雎稼唐肅等擢應奉孫蕡等擢典籍皆起自州縣庶寮召試云壬午太祖聞桐城知縣胡儼有文學召試之稱㫖改除檢討仁宣以後無聞焉惟正統四年進士錢溥由楷書得為檢討自云召試非其實也文華殿考藝永樂中召試庶吉士文藝多在文華殿宣徳八年冬宣宗御文華殿召諸庶吉士詣文淵閣試以諸葛孔明可與興禮樂論親第其高下取十三人翰林以徐珵為首賜寳鏹百錠餘有差盖因永樂之舊也已而别選尹昌等六人蕭鎡等二人及齋宫所選者八人以足二十八人之數時多需次於家及在諸司觀政俱得召試云正統元年詔以前二十八人分等第官中外復宣徳故事於新科進士百人中選十四人補其處而考藝則大臣司之自是遂為例齋宫考藝宣徳五年三月詔取庶吉士三十人分𨽻近侍諸衙門如洪武乙丑之制次日引入齋宫御試與進士九十七人命題出取士何以得真材論止選八人入翰林薩琦為首次第皆上親裁在前列者賜白金五兩紵幣五十緡餘有差其𨽻六科為庶吉士者有廖莊之屬楊寧等令歸鄉讀書至八年復合前後科進士二十八人入翰林焉正統後庶吉士止𨽻翰林然考藝岀於當宁者自是罕矣幼童教習㑹典云凡各處舉到幼童奉㫖送本院讀書習字者月給米食内閣稽考課業俟有成效奏請擢用其願科舉出身者聽按竒童被薦入翰林讀中秘書者始自英宗朝兵部尚書程信之子敏政後以本院秀才中順天府郷試第二名成化丙戌進士及第第二人繼而雲南竒童楊一清亦以薦為本院秀才中成化辛卯順天府鄉試高等明年登進士第成化末崇仁洪鍾七歲善書有司以竒童薦憲宗召見嘉嘆命入翰林充秀才讀中秘書𢎞治己酉中順天府鄉試第六明年舉進士授中書舍人時年十八云選充秀才秀才之選始自太祖時然未始𨽻翰林也英宗時始選竒童及善書者充本院秀才天順時有姜立剛之屬俸糧凡本院官吏及帶俸官俸糧舊於禮部帶支後奏准本院自行收支學士正五品月支米十六石歲該一百九十二石侍讀學士侍講學士從五品月支米十四石歲該一百六十八石侍讀侍講正六品月支米十石歲該一百二十石修撰從六品月支米八石歲該九十六石編修正七品月支米七石五斗歲該九十石檢討從七品月支米七石歲該八十四石五經博士正八品月支米六石五斗歲該七十八石典籍從八品月支米六石歲該七十二石侍書正九品月支米五石五斗歲該六十六石待詔從九品月支米五石歲該六十石其内閣大臣隨所帶職銜支俸不在此例洪武中俱給全俸其後始有折色永樂十九年以行在衙門裁革令隨從在京官員一品至五品三分米七分鈔六品至九品四分米六分鈔而本院官有被特恩全支本色者二十年始定毎司給米一石於折鈔内扣除餘以椒米折鈔若南京翰林院官吏俸糧與本院同宣徳六年始有折絹之令七年始有贓罰庫物件折俸之令正統七年始定仍給本色之令天順元年始定照舊於南京本色之令七年始定折絹為四月五月之數成化四年令折色俸錢鈔兼支三分鈔四分錢錢二文准鈔一貫十六年折俸錢折支三梭布毎一疋折米二十石𢎞治十年始定三分四分本色俸自後毎石折銀七錢而凡在任患病三月者住俸公差無家小者明白開報囬日補支詹事府春坊司經局官吏俸糧景泰三年始令於本衙門收放詳見㑹典供需㑹典云凡内閣官光禄寺日逐給料物撥厨役製造酒飯司禮監撥匠作裝製書籍紙劄工部輪撥班匠供役本院官酒飯俱於光禄寺支給宣徳以前講讀史官歲撥班匠一名其後寢凡内閣合用筆墨及雌黄硃墨俱於司禮監闗給紙劄本監及刑部闗給木炭惜薪司及工部闗給南京翰林院合用匠役於南京工部撥給詹事府合用紙劄毎月於刑部闗給筆墨印色順天府買辦送用若食鹽毎日例支一觔乃祖設各衙門以來常例本院該吏於各官處先各領銀三錢送户部折鈔謂之扛擡費兼職支俸國朝設官有兼職者如本院學士承㫖兼吏部尚書之類其俸皆二職兼支洪熙初元楊士竒黄淮楊榮金幼孜皆以三孤或太子三少兼尚書及大學士三俸例皆兼支始士竒固辭尚書不拜上厲色曰黄淮楊榮金幼孜皆三職卿獨二職人將謂何卿勿辭因請辭俸上曰卿於朕勞勤二十年故賙以此禄何用辭士竒曰尚書月俸六十石可養壯士六十人臣受二俸已過分安敢復加時尚書蹇義在側言宜聽士竒辭學士俸士竒言辭禄當辭厚何用取虛名上曰朕成卿志及聽辭顧義謂曰亷貪之風士竒有焉於是黄淮亦辭戸部尚書俸其後内閣大學士帶銜三孤仍兼太子三師與尚書凡四俸兼支或止支二俸用士竒故事也其本院官與詹事府坊局互兼職者支俸或兼或否悉取自上裁分俸養親洪武四年詔許中外官員有父母者分俸於原籍供奉養仁宗即位詔復因之遂為令時大學士黄淮父性進封少保奏請分俸於鄉如例上從之宣徳初侍講學士王英奏乞分俸養母於家上亦從之自是多所祈允不能悉記辦事帶俸本院辦事帶俸官以書辦為職起自内閣三楊用事時於制詔制勅二房聽用多由秀才儒士譯字生舉任始授鴻臚寺序班稍遷至中書舍人陞授大理寺卿正寺副評事尚寳司卿少卿司丞太常寺卿少卿寺丞各部左右侍郎郎中員外主事等職至三品而止獨華亭沈度善書馳聲永樂時自典籍累遷學士景泰中中書舍人趙昻陞編修進通政司㕘議為特異其後亦有由官生及舉人進士入者𢎞治中林章官至三品遇恩加勲階至榮禄大夫前此未有也吏役本院司吏一名由在外州與縣司撥詹事府令史二名由在外府司吏撥左右春坊司吏各一名經局司吏一名其由撥俱與本院同辦事舊制以三年為限後遞減至二年若急辦撥與本院及詹事府坊局各官者不限在外府州縣司典或多至五六人以一年為限有互相借用者其在内閣則又益多矣庶吉士及本院辦事帶俸官毎員止撥一名皂𨽻皂𨽻之役出自兵部撥送宣徳間令隨從皂𨽻係不願應當者毎名月辦柴薪銀一兩說者謂出於大學士楊士竒所建議正統間定五品六品四名七品至九品二名内本院編修檢討中書舍人係近侍官各加一名本院譯字官一名其後奏准庶吉士欽與一名本院直堂十五名詹事府左春坊直堂各八名右春坊直堂五名司經局直堂六名詹事府主簿㕔直㕔一名制勅房看朝房皂𨽻四名若内閣大臣則隨所帶銜撥與非復本院例也成化初修撰羅倫獨不受皂𨽻柴薪銀嘗論咎楊東里之失或謂出自君命受之無害於義然或有署印互争直堂至成隙者有之其視倫賢不肖抑又逺矣輿馬本院官皆乘馬遷至三品例乘肩輿獨掌署南京院印者與三品同盖舊規也前輩質朴庶吉士多步行或有乘驢者若途次相遇洪武中學士遇公侯引馬却避四品引馬側立三品分道而行永樂以後本院雖六品以下官惟前輩在内閣官尊者引馬側立餘舉手而已成化中有史官遇尚書為所呵内閣聞而使人讓之謝過乃已盖本院職雖卑而倚任則重故與公卿抗禮而不避自太宗時始也雖然行脩名彰足為輿衛誰敢侮之若過自貶損怯媚權勢則不可爾翰林記卷四
