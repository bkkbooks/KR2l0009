body:
  text: 翰林記卷十明黃佐撰大本堂授經國初置大本堂取古今圖書充其中召四方名儒教皇太子親王用學士宋濓待制兼編修王禕修撰王僎耆儒陶凱輩分畨夜直選才俊之士充伴讀所授經書上親督之嘗命禕采故實韻為四言詩以授皇太子上時時賜燕賦詩商𣙜古今評論文字無虛日尋命勳舊之子執經入侍于是鄭國公常茂曹國公李景隆蘄春侯康鐸等與焉洪武元年十一月辛丑燕東宫官及儒士各賜冠服是日上命大本堂諸儒作鍾山蟠龍賦置酒歡甚乃自作時雪賦故有是賜其後皇太子讀書在文華殿而親王則出就所居府十二年三月戊辰朔上御華蓋殿皇太子侍上問比日所讀何書對曰昨看書至商周之際上曰看書亦知古人為君之道否因諭曰君道以事天愛民為重其本在敬身人君一言一行皆上通於天下繫於民必敬以將之而後所行無不善蓋善天必鑒之一言而善四海蒙福一行不謹四海罹殃言行如此可不敬乎聖祖之始訓如此真可謂得其大本矣諸儒授經惟奉行上意而已嚴君在上賢師友輔之睿德之懋斯可望矣東宫師友太祖始令宋濓為王世子師庚子年十月奉命入內授經遇綱常大義再三言之乙巳年三月濓以起居注告病詔還家調治仍賜金帛世子致賜有加焉六月濓上箋謝恩復奉書東宫勉以孝友恭敬謹敏讀書無怠惰無驕縱修德進業以副天下之望上覽書喜甚召東宫語以書意具賜書答之其略曰曩昔先生教吾子以嚴相訓是為不佞也以聖人文法變俗言教之是為疏通也所守者忠貞所用者節儉是為得體也昔聞古人今則見之復以文綺侑書洪武元年設東宫師傅官令勳臣兼之十月以耆儒梁王儀為太子賓客秦鏞盧明德張昌為太子諭德上以東宮師傅皆勳舊大臣當待以殊禮朝賀東宫難同庶僚命禮部考古定議禮部及翰林諸儒臣議令凡遇大朝賀前期設皇太子座於大本堂設答拜褥位於堂中設三師賓客諭德拜位於堂前贊禮二人於三師之北內贊禮二人於堂中俱東西相向至日皇太子常服升座三師賓客諭德常服入位北向立皇太子起立南向贊禮唱鞠躬四拜皇太子受前二拜答後二拜禮畢而出五年太子贊善大夫宋濓輔導東宫一言一動皆以禮法諷諭使歸於道每讀書至切於政教及前代興亡必拱手揚言曰君國子民之道當如是不當如彼且推人情物理以明其義皇太子每斂容嘉納敬禮未嘗少衰言則必曰師父師父云且書舊學二字以賜二十六年七月戊申選秀才張宗濬等隨詹事府左右春坊官班分入直文華殿侍講畢近前説民間利害田里稼穡等事開陳古今孝弟忠信文學材藝諸故事日以為常永樂二年春詔簡東宫官屬時詹事春坊司經局其長二以廷臣兼之次簡六科中書及大學郡縣學官升而用之於是以尚書蹇義兼詹事侍郎郭進等兼少詹事黃宗載兼府丞尚書李至剛內閣七人者皆兼春坊大學士庶子諭德等官修撰梁潛等兼贊善而國子博士徐善述助教朝鑄等升左右司直郎有差尋又以贊善王汝玉等兼編修善述暨汝玉東宫尤見親禮嘗令善述擇選詩二十餘首分類賦比興以為法又與之書言欲作表卿可一如詩題立例具詩題與表題間日封進且問其疾勞慰備至且曰卿今年邁恐輔余為學有日似卿朴直苦口者百無一二面諛順顔者比比有之趂卿康健無憚勞勩弼余成業惟望藥石之言一日甚一日毋務犯鱗觸諱之慮其所與書必字之曰好古或曰致書贊善好古先生云其與汝玉書有曰願求致治之方又曰善政之音如至有如暗逐明之諭其望啓沃之切如此每遇節序燕勞東朝之臣起居慰問煦濡諄切一如家人父子焉然太宗常恐東駕親近匪人每北巡必訓戒之又命學士胡廣楊士竒楊榮侍讀學士王逹洗馬楊溥等廣求名儒分直講讀而典籍金實郎中葉砥等與焉每講罷必從容以正心務德親賢去邪尚儉戒逸之言進及訪以政事必陳其切要及先後緩急之序懇切無少避忌故仁宗之為皇太子也監國視朝之暇専意文字手不釋卷被服寬博大類儒者畜經籍法書甚富云大明會典曰永樂初定東宫講讀儀春坊官與翰林院官日分二員講書以四書春秋通鑑大學衍義貞觀政要等書進講須要纂其事之始終直述大義輯成篇章進呈御覽畢然後赴文華殿講説三師三少及詹事府官鴻臚寺并每科給事一員侍立進講畢衆官齊出及有召問亦須前項官員一同進出如有獨退并獨員留者許給事中并鴻臚寺官并司直郎清紀郎糾劾凡講讀畢每遇五府軍政六部緊要事務及撫諭四裔恩意其大經大法詹事府掌同春坊官將緣由於衆官未退之時一一敷陳為三朝聖諭録云永樂二年七月侍讀學士王逹講乾之九四舉儲二為説講畢東駕召楊士竒問曰於此恐無儲二之説逹不含譏否士竒對曰諸臣非正道不陳豈敢含譏此出宋儒胡瑗之説殿下曰對我言此常人得此爻亦用此説乎士竒因舉程子云凡卦中六爻人人有用聖賢有聖賢用衆人有衆人用君有君用臣有臣用無所不通又舉王昭素對宋太祖之言以對殿下説又對曰今翰林春坊諸臣分撰諸經講章有上旨命內閣之臣閲校未當處悉與改正然後呈御覽允當然後以講內閣解縉專閲書胡廣閲詩金幼孜閲春秋臣士竒閲易昨日進至此條上問儲二説有據否臣士竒對以胡瑗之説上甚喜蓋講臣非有據不敢妄出意見殿下喜自是講義有疑處必召解胡等四人相與辨折暢而後已遂作數巨册命春坊司經局臣分録講章以備常閲東宫出閣講書凡東宫年八嵗即出閣講學永樂以前東宫皆年長英宗未及出閣遂登大寶故出閣之儀至天順二年始定其講學師友惟用東宫官及本院官分班講讀內閣提督之不别選他職其講讀侍班及教書正字官從內閣具名奏請每日講書直解先送內閣看定講畢補進與經筵同列以史官修撰編修兼校書正字則以制敕房官兼之會典載初出閣儀云是日早侍衛侍儀如常儀執事等官於文華殿行四拜禮畢鴻臚寺官請皇太子升文華殿執事官導引至殿升座師保等官於丹陛上行四拜禮畢各官退出內侍官導皇太子至後殿升座以書案進每日侍班侍讀講官以次進讀叩頭而退每日講讀儀云一每日早朝退後皇太子出閣升座內侍以書案進不用侍衛侍儀執事等官惟侍班侍讀講官入侍叩頭禮畢分班向東西立內侍展書先讀四書則東班侍讀官向前伴讀十數遍退復原班次讀經或讀史則西班侍讀官向前伴讀亦如之務要字音正當句讀分明讀畢各官退一每日巳時侍班侍讀侍講及侍書官俟皇太子升座畢入東西向立侍班內侍展書先讀早所讀四書則東班侍講官進講一遍退復原班次講早所讀經史則西班侍講官進講亦務要直言解説明白易曉講畢內侍收書訖侍書官向前侍習寫字務要開説筆法點畫端楷寫畢各官叩頭而退一午膳後從容遊息或習騎射一每日晚讀本日所授書各數遍至熟而止一凡讀書三日後一溫須背誦成熟遇溫書日免授新書講讀官通講須曉大義一凡寫字春夏秋月每日寫一百字冬月每日寫五十字一凡遇朔望節假及大雨雪隆冬盛暑暫停講讀寫字今按此儀稍變永樂之舊矣成化中孝宗出閣最勤學十九年御製文華大訓成少詹事兼學士彭華進講東宫加從二品祿左中允周經亦預講是書東宫每起立拱聽內閣大臣或以為勞謂經宜跪請坐聽經不從竟得如禮蓋將以隆君父之道也𢎞治中武宗在東宫學士吳寬率同僚上疏曰竊惟東宫講學自寒暑風雨朔望令節外一嵗之中不過數月一日之內不過數刻况其間又多間歇人生八嵗出就外傅居宿於外誠欲離近習親正人也庶民且然况有天下者乎借曰習讀於內終不若出就外傅親近儒臣講明治道所得為多也其意甚美然講讀之後敷陳時政如永樂時最為要務惜寬建明未之及耳東宫禮儀凡東宫禮儀官詹事府者皆宜諳練洪武中定奏事之儀具有次第獨於文華殿啓事則詹事府在先餘依奏事次第每皇太子御文華殿官員人等承旨召入者方許入凡啓事者稱臣會典載東宫朝儀云永樂二年定文武官員常朝行叩頭禮畢三師三少詹事府官左右春坊官翰林院鴻臚寺官六科給事中錦衣衛官左右序立於文華殿門之外鴻臚寺序班通事舍人引文武百官於丹陛上丹墀內東西序立照依衙門資次啓事監察御史二員司直郎清紀郎日輪二員北向侍立糾儀啓事畢百官齊退及有召問亦須前項官員一同進出如獨進并獨員留後者許監察御史鴻臚寺官司直郎清紀郎糾核一合啓事務在京衙門止用奏本在外衙門務要奏本一本啓本一本其詹事府主簿録事同春坊司直郎清紀郎司諫分為六科將本內啓過事件同六科給事中逐一奏聞主簿録事司直郎清紀郎司諫仍於司禮監共關揭帖開寫逐日啓過本內事件略節緣由六科給事中亦具題帖各另奏進凡遇正旦冬至節行慶賀禮并進厯進春等事詹事府例啓皇太子知必先奏聞俟得旨方具啓本進凡遇皇太子千秋節行慶賀禮奏啓本同進侍班用坊局官見第六卷正旦冬至千秋節禮部官進箋并進厯進春通事二員舉案又有監國等儀以非常典故不悉記皇太孫輔導講讀皇太孫輔導講讀在洪武時無可考者太宗以東宫官僚兼之永樂六年七月命內閣胡廣等輔導皇長孫賜敕曰朕為令德所成本乎天賦養正之學實𢎞聖功故有聰明純一之資必有詩書禮樂之教所以充其德性而廣其器識也朕嫡長孫天章日表玉質龍姿孝友英明寬仁大度年未一紀體具志寧動必中規言必中道好道之篤夙夜孜孜日誦萬言心領要義朕嘗試之以事輒能裁決得中斯實宗廟之靈上天錫慶篤生異質以福佑天下而基命於無窮然宏材之建必由匠石之功圭瓚之成必假琢磨之力卿皆茂簡德藝職輔東宫東宫之子必資兼弼宜協同心志輔導於成推廣仁義道德之源開陳二帝三王之治與太祖髙皇帝之大經大法凡創業守成之難生民稼穡之事朝夕講論以涵養本源恢𢎞智量充其盛大之器以為宗社生民之福國家有無窮之休卿等亦有無窮之聞欽哉九年九月皇太子命楊榮等侍諸皇孫讀書文華後殿且諭諸皇孫曰此皇祖近臣汝輩當加禮敬又謂榮等曰他日學成即汝訓迪之功也後皇太子復傳上命召吏部翰林院官令舉老成正大儒者侍皇太孫講讀明日東宫特召尚書蹇義及楊士竒問已得人否義對曰臣兩人共舉禮部侍郎儀智然衆鮮知之議尚未決東宫曰往者吾舉李鼎大誤後悔無及智甚端正但覺老矣士竒對曰智雖頗老然起家學官道理明執守正精神不衰目前廷臣中老成正大未見其比是日午朝上問東宫曰太孫處侍從講讀已得人否對曰已舉禮部侍郎儀智然議尚未決上喜曰此得人矣雖年老然識朝廷大體能直言不阿向之元正日食吕震等皆欲行賀禮惟此老與楊士竒言宜免賀朕從之智誠可用遂召禮部翰林諸臣諭曰儀智甚好朕知之矣令侍太孫講讀又令尚書蹇義選廷臣行止端慎語音明正者以充講官於是給事中林長懋張瑛陳山戴綸等得入侍皇太孫已而宣宗正儲位長懋等俱授春坊左右中允其講讀儀雖不可考要之當與東宫無大異也親王出閣讀書洪武中親王出閣命選儒士授本院博士等職事令於各王府講説永樂中妙簡宫僚以輔諸王於是以詹事府丞周孟簡為襄王府左長史司直郎金實為衛王府左長史俾輔導侍講讀其後親王出閣止除進士之老成有學問者除檢討及王就封即拜長史不復升轉𢎞治三年進士被是選者恣出怨言吏部聞之實人情不堪之故也茍行通融之法升轉如常格自當無不效命者會典云諸王讀書用內閣提督檢討等官講讀為擬定經書起止所習倣學每日進看其儀天順二年定一初入書堂其日早王至右順門之北書堂面東中坐提督講讀并講讀官行四拜禮畢內官捧書展於案上就案左立講讀官進立於案右伴讀十遍叩頭退每一日講讀清晨王至書堂講讀官行叩頭禮伴讀十遍出飯後復詣書堂伴讀看寫字畢講書直説大意畢仍叩頭退內侍以所寫字送內閣點看習書習書雖六學之一藝然事屬經筵頒為帝制亦不可以為末務洪武時無可考太宗喜楷書時典籍沈度書法豐潤上深愛之每有大制作必命度謄寫纍遷至學士惟食學士俸仍事書辦賜象笏鏤金刻度姓名其上以寵耀之其弟粲亦起自書辦纍官侍讀自此沈字盛行於朝然上習書尚未以度字為式宣宗自沖齡習古法帖宸翰妙絶蓋始學趙孟俯而加以遒徑真所謂精能之至出神入化者孝宗亦愛沈度書宫中妙習焉嘗求其後官之物色得其孫世隆授之中書舍人故今朝廷制誥猶用沈體云翰林記卷十
