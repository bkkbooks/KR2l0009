body:
  text: 翰林記職官類一官制之屬提要臣等謹案翰林記二十卷原本不著撰人名氏專載有明一代翰林掌故始自洪武迄於正德嘉靖間每事各有標目凡二百二十六條本末賅具首尾貫穿叙次頗為詳悉如所紀殿閣卿寺轉銜與明㑹典諸書互有同異又㑹議繕寫諸條制度甚詳均足以備考核其十七十八兩卷具列館閣題名尤足以見一代人材升降之概案明史藝文志載黃佐有翰林記二十卷而廖道南殿閣詞林記序有與泰泉黃佐纂翰林雜記之語則是書為出佐手無疑蓋道南與佐同年進士又同在詞垣故九卷以後多採佐書以足成之而以此本互相檢核則其文不盡相合蓋道南又有所㸃竄惟此為佐原本較為完贍以繼李肇程俱陳騤王士㸃諸人所作而唐宋以來詞林故事乃略備矣佐字才伯香山人正德辛巳進士改庶吉士授編修厯官詹事府少詹事諡文裕事蹟具明史文苑𫝊所著有樂典諸書俱别著録云乾隆四十三年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:a15b44cfb884bc53651edf5a022186d77fe9026d843beb8c6313e2b1861c80d7
